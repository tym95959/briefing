<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Koveli Lounge | Tablet Hub – 5 Core Tools</title>
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #d9e2ec, #cbd5e1);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 28px;
        }

        /* Premium tablet container – soft, modern look */
        .tablet-dashboard {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255,255,255,0.6) inset;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Main content – spacious, no extra bars */
        .app-container {
            padding: 48px 40px 56px 40px;
        }

        /* 5‑button grid: responsive + centered elegance */
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 32px 28px;
            margin: 0 auto;
        }

        /* Refined card design – generous tap target */
        .app-card {
            background: #ffffff;
            border-radius: 48px;
            padding: 34px 16px 28px 16px;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 14px 28px -12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255,255,255,0.9);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        /* Depth effect on hover */
        .app-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 25%, rgba(29,111,143,0.03), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .app-card:hover::after {
            opacity: 1;
        }
        .app-card:active {
            transform: scale(0.97);
            background: #fbfeff;
            transition: 0.05s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 36px -16px rgba(29, 111, 143, 0.28);
            border-color: #cce3ef;
            background: #ffffff;
        }

        /* Icon bubble – sleek gradient */
        .icon-bg {
            width: 110px;
            height: 110px;
            background: linear-gradient(145deg, #f0f6fe, #e9f0f8);
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.6rem;
            color: #1f6f90;
            transition: all 0.28s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 12px 18px -10px rgba(0,0,0,0.12);
        }
        .app-card:hover .icon-bg {
            background: linear-gradient(135deg, #1d6f8f, #165f7a);
            color: white;
            transform: scale(0.94);
            box-shadow: 0 12px 22px -8px rgba(0,0,0,0.2);
        }

        .app-name {
            font-weight: 800;
            font-size: 1.25rem;
            color: #1a3e52;
            letter-spacing: -0.3px;
            margin-top: 4px;
        }

        /* Subtle description line (optional, adds polish) */
        .app-hint {
            font-size: 0.7rem;
            font-weight: 500;
            color: #7c9abb;
            margin-top: -6px;
            letter-spacing: -0.2px;
        }

        /* No secondary tools — completely removed */
        .secondary-section {
            display: none;
        }

        /* Responsive: adapts perfectly from 5 columns to 2 on smaller tablets */
        @media (max-width: 760px) {
            body {
                padding: 20px;
            }
            .app-container {
                padding: 32px 24px 40px 24px;
            }
            .icon-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 24px;
            }
            .icon-bg {
                width: 88px;
                height: 88px;
                font-size: 2.8rem;
                border-radius: 38px;
            }
            .app-name {
                font-size: 1rem;
            }
        }

        @media (min-width: 761px) and (max-width: 1024px) {
            .icon-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
                max-width: 600px;
                margin-left: auto;
                margin-right: auto;
            }
            .app-container {
                padding: 44px 32px 52px 32px;
            }
        }

        @media (min-width: 1025px) {
            .icon-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 28px;
            }
        }

        /* clean tap highlight removal */
        .app-card {
            -webkit-tap-highlight-color: transparent;
        }

        /* ensure no hidden footers or headers */
        .no-extra {
            display: none;
        }
        
        /* optional elegant fade in */
        .tablet-dashboard {
            animation: softAppear 0.4s ease-out;
        }
        @keyframes softAppear {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
<div class="tablet-dashboard">
    <div class="app-container">
        <!-- EXACTLY 5 PRIMARY BUTTONS – no additional tools, no secondary grid -->
        <div class="icon-grid">
            <!-- 1. Daily Tasks -->
            <a href="checklisthk.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-clipboard-list"></i></div>
                <div class="app-name">Daily Tasks</div>
                <div class="app-hint">checklist & duties</div>
            </a>
            
            <!-- 2. Shower Log -->
            <a href="shower.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-shower"></i></div>
                <div class="app-name">Shower Log</div>
                <div class="app-hint">track hygiene</div>
            </a>

            <!-- 3. Briefing Log -->
            <a href="breifing.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-chalkboard-user"></i></div>
                <div class="app-name">Briefing Log</div>
                <div class="app-hint">daily updates</div>
            </a>

            <!-- 4. Handover Log -->
            <a href="handover.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-exchange-alt"></i></div>
                <div class="app-name">Handover Log</div>
                <div class="app-hint">shift交接</div>
            </a>

            <!-- 5. Survey -->
            <a href="survey.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-poll-h"></i></div>
                <div class="app-name">Survey</div>
                <div class="app-hint">feedback & insights</div>
            </a>
        </div>

        <!-- Absolutely no additional tools, no secondary section, no header/footer -->
        <div style="height: 0;"></div>
    </div>
</div>

<script>
    (function() {
        // ============================================================
        // KOVELI LOUNGE | TABLET HUB – CLEAN 5‑BUTTON EXPERIENCE
        // No extra sections, no supervisor toggle, no date picker,
        // no footer, no header, no secondary tools.
        // Designed for fast tablet access.
        // ============================================================

        // Gather exactly 5 main buttons
        const mainButtons = document.querySelectorAll('.app-card');
        
        // List of target files (for console reference only, not restrictive)
        const expectedPages = [
            'checklisthk.html', 'shower.html', 'breifing.html',
            'handover.html', 'survey.html'
        ];
        
        // validation info for devs
        function logLinkStatus() {
            mainButtons.forEach((btn, idx) => {
                const href = btn.getAttribute('href');
                if (href && expectedPages.includes(href)) {
                    console.log(`✅ [${idx+1}] ${href} ready`);
                } else if (href) {
                    console.log(`📁 [${idx+1}] linked to: ${href} (verify file exists)`);
                }
            });
            console.log("🎯 Koveli Lounge – Tablet Hub | Exactly 5 core buttons, no additional tools.");
        }
        
        // Interactive click tracking + subtle haptic feedback
        mainButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const destination = button.getAttribute('href');
                if (destination && destination !== '#') {
                    console.log(`🖱️ Tablet selection → ${destination}`);
                    // micro UX: slight shrink effect already done via CSS, just log
                }
            });
            
            // optional touch ripple simulation (no extra DOM, just style)
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.98)';
            }, { passive: true });
            button.addEventListener('touchend', () => {
                button.style.transform = '';
            });
            button.addEventListener('touchcancel', () => {
                button.style.transform = '';
            });
        });
        
        // ensure no hidden elements from legacy (header / footer / secondary bar anywhere)
        function sanitizeLegacyElements() {
            const unwantedSelectors = [
                '.dashboard-header', '.hub-header', '.info-footer', '.role-badge',
                '.welcome-footer', '.bottom-bar', '.secondary-grid', '.secondary-header',
                '.sec-card', '.additional-tools', '.footer-links', '.status-bar'
            ];
            unwantedSelectors.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    if (el && el.parentNode && !el.closest('.icon-grid')) {
                        // safety: double-check if element is part of original hidden structure
                        if (el.style.display !== 'none') {
                            console.warn(`🧹 Cleanup: removed lingering element (${selector})`);
                            el.remove();
                        }
                    }
                });
            });
            
            // also manually verify that .secondary-grid or extra containers are gone
            const secondaryContainer = document.querySelector('.secondary-section, .secondary-grid, .additional-panel');
            if (secondaryContainer) secondaryContainer.remove();
        }
        
        // adaptive grid check: if screen width allows beautiful 5 column layout
        function adjustGridSpacing() {
            const grid = document.querySelector('.icon-grid');
            if (!grid) return;
            const width = window.innerWidth;
            if (width >= 1025) {
                grid.style.gap = '32px';
            } else if (width <= 760) {
                grid.style.gap = '24px';
            } else {
                grid.style.gap = '28px';
            }
        }
        
        // ensure no visible footer/header text appears (pure)
        function removeAnyTextFooters() {
            const allElements = document.querySelectorAll('div, span, p');
            allElements.forEach(el => {
                if (el.innerText && (el.innerText.includes('Footer') || el.innerText.includes('Copyright') || 
                    el.innerText.includes('All rights reserved') || el.innerText.includes('Additional tools'))) {
                    // careful: do not remove legitimate button labels. only if it's outside primary grid & matches extra wording.
                    if (!el.closest('.app-card') && !el.closest('.icon-grid')) {
                        if (el.innerText.trim().length < 50 && (el.innerText.includes('tool') || el.innerText.includes('extra'))) {
                            el.remove();
                        }
                    }
                }
            });
        }
        
        // Final polish: no header, no footer, no extra buttons. Exactly five visible cards.
        const ensureFiveOnly = () => {
            const allCards = document.querySelectorAll('.app-card');
            if (allCards.length !== 5) {
                console.warn(`⚠️ Expecting exactly 5 main buttons, found ${allCards.length}. But UI already shows 5 cards.`);
            } else {
                console.log(`✨ Perfect: ${allCards.length} primary buttons — no secondary clutter.`);
            }
            // Hide any stray section that resembles "additional"
            const straySecondary = document.querySelector('.secondary-header, .secondary-grid, .sec-card');
            if (straySecondary) {
                straySecondary.style.display = 'none';
                straySecondary.remove();
            }
        };
        
        // run on load and after any dom mutation (but simple load is enough)
        window.addEventListener('load', () => {
            logLinkStatus();
            sanitizeLegacyElements();
            adjustGridSpacing();
            removeAnyTextFooters();
            ensureFiveOnly();
            
            // final visual check: make sure no unwanted container appears
            const container = document.querySelector('.app-container');
            if (container && !container.querySelector('.secondary-header') && !container.querySelector('.secondary-grid')) {
                console.log("🧼 Verified: No additional tools / secondary section present. Clean tablet dashboard.");
            }
        });
        
        window.addEventListener('resize', () => {
            adjustGridSpacing();
        });
        
        // Also run after small delay for dynamic sanitization
        setTimeout(() => {
            sanitizeLegacyElements();
            ensureFiveOnly();
        }, 50);
        
        // extra style: guarantee that any possible "Additional tools" text in DOM is removed
        const styleTag = document.createElement('style');
        styleTag.textContent = `
            /* HIDE any residual extra-tool containers forcefully */
            .secondary-header, .secondary-grid, .sec-card, .additional-section, 
            .tools-panel, .extra-actions, .footer-tools {
                display: none !important;
                visibility: hidden !important;
                height: 0 !important;
                width: 0 !important;
                overflow: hidden !important;
                pointer-events: none !important;
            }
            /* ensure main grid stays untouched */
            .icon-grid {
                display: grid !important;
            }
            body, .tablet-dashboard, .app-container {
                background-attachment: local;
            }
        `;
        document.head.appendChild(styleTag);
        
        console.log("📱💎 Koveli Lounge | Tablet mode active — Showing ONLY 5 essential buttons, all extra tools removed.");
    })();
</script>
</body>
</html>
