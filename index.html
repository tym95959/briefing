<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Koveli Lounge | Complete Hub</title>
    
    <!-- ===== iOS PWA META TAGS ===== -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Koveli Hub">
    
    <!-- ===== iOS ICONS ===== -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='56' fill='%231d6f90'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='280' font-family='sans-serif' fill='white'%3EK%3C/text%3E%3C/svg%3E">
    
    <!-- ===== iOS SPLASH SCREENS ===== -->
    <link rel="apple-touch-startup-image" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1242 2208'%3E%3Crect width='1242' height='2208' fill='%231d6f90'/%3E%3Ctext x='50%25' y='45%25' dominant-baseline='central' text-anchor='middle' font-size='120' font-family='sans-serif' fill='white'%3EKoveli Lounge%3C/text%3E%3Ctext x='50%25' y='55%25' dominant-baseline='central' text-anchor='middle' font-size='60' font-family='sans-serif' fill='%23cce3ef'%3ELounge Operations%3C/text%3E%3C/svg%3E">
    
    <!-- Google Fonts + Font Awesome 6 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- PWA Manifest (Android/Chrome) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1f6f90">
    
    <style>
        /* ... (all your existing styles) ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #d9e2ec, #cbd5e1);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 28px;
            flex-direction: column;
        }

        .tablet-dashboard {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(255,255,255,0.6) inset;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .app-container {
            padding: 48px 40px 56px 40px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 28px 24px;
            margin: 0 auto;
        }

        .app-card {
            background: #ffffff;
            border-radius: 48px;
            padding: 30px 12px 24px 12px;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 14px 28px -12px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255,255,255,0.9);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .app-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 25%, rgba(29,111,143,0.03), transparent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .app-card:hover::after {
            opacity: 1;
        }
        .app-card:active {
            transform: scale(0.97);
            background: #fbfeff;
            transition: 0.05s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 36px -16px rgba(29, 111, 143, 0.28);
            border-color: #cce3ef;
            background: #ffffff;
        }

        .icon-bg {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #f0f6fe, #e9f0f8);
            border-radius: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            color: #1f6f90;
            transition: all 0.28s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 12px 18px -10px rgba(0,0,0,0.12);
        }
        .app-card:hover .icon-bg {
            background: linear-gradient(135deg, #1d6f8f, #165f7a);
            color: white;
            transform: scale(0.94);
            box-shadow: 0 12px 22px -8px rgba(0,0,0,0.2);
        }

        .app-name {
            font-weight: 800;
            font-size: 1.15rem;
            color: #1a3e52;
            letter-spacing: -0.3px;
            margin-top: 4px;
            line-height: 1.3;
        }

        .app-hint {
            font-size: 0.65rem;
            font-weight: 500;
            color: #7c9abb;
            margin-top: -4px;
            letter-spacing: -0.2px;
        }

        .maintenance-badge {
            background: linear-gradient(135deg, #f5a62320, #f5a62310);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #b45f06;
            margin-top: 2px;
        }

        .install-wrapper {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            width: 100%;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        #installBtn, #iosInstallBtn {
            background: #1f6f90;
            border: none;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 14px 40px;
            border-radius: 60px;
            box-shadow: 0 12px 24px -10px rgba(29,111,143,0.4);
            display: inline-flex;
            align-items: center;
            gap: 14px;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.25);
            letter-spacing: -0.2px;
        }
        
        #installBtn i, #iosInstallBtn i {
            font-size: 1.4rem;
        }
        
        #installBtn:hover, #iosInstallBtn:hover {
            background: #165f7a;
            transform: scale(1.02);
            box-shadow: 0 16px 28px -8px #1d6f8f80;
        }
        
        #installBtn:active, #iosInstallBtn:active {
            transform: scale(0.96);
        }
        
        #installBtn.hidden, #iosInstallBtn.hidden {
            display: none;
        }

        /* iOS-specific install instructions */
        .ios-install-hint {
            background: rgba(29, 111, 143, 0.08);
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 0.9rem;
            color: #1a3e52;
            text-align: center;
            border: 1px solid rgba(29, 111, 143, 0.15);
            max-width: 500px;
            margin: 0 auto;
        }
        .ios-install-hint i {
            color: #1f6f90;
            margin: 0 4px;
        }
        .ios-install-hint .highlight {
            background: #1f6f90;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        @media (max-width: 760px) {
            body { padding: 20px; }
            .app-container { padding: 28px 20px 36px 20px; }
            .icon-grid { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 18px; }
            .icon-bg { width: 75px; height: 75px; font-size: 2.2rem; border-radius: 32px; }
            .app-name { font-size: 0.85rem; }
            .app-hint { font-size: 0.55rem; }
            #installBtn, #iosInstallBtn { 
                padding: 12px 24px; 
                font-size: 0.95rem;
                width: 100%;
                justify-content: center;
            }
            .ios-install-hint { 
                font-size: 0.8rem; 
                padding: 12px 16px;
            }
        }

        @media (min-width: 761px) and (max-width: 1024px) {
            .icon-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 720px; margin-left: auto; margin-right: auto; }
            .app-container { padding: 40px 32px 48px 32px; }
        }

        @media (min-width: 1025px) and (max-width: 1280px) {
            .icon-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
        }

        @media (min-width: 1281px) {
            .icon-grid { grid-template-columns: repeat(7, 1fr); gap: 22px; }
        }

        .app-card { -webkit-tap-highlight-color: transparent; }
        .tablet-dashboard { animation: softAppear 0.4s ease-out; }
        @keyframes softAppear {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .secondary-section { display: none; }
    </style>
</head>
<body>
<div class="tablet-dashboard">
    <div class="app-container">
        <div class="icon-grid">
            <a href="checklist.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-clipboard-list"></i></div>
                <div class="app-name">Daily Tasks</div>
                <div class="app-hint">checklist</div>
            </a>
            <a href="shower.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-shower"></i></div>
                <div class="app-name">Shower Log</div>
                <div class="app-hint">hygiene</div>
            </a>
            <a href="briefing.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-chalkboard-user"></i></div>
                <div class="app-name">Briefing Log</div>
                <div class="app-hint">updates</div>
            </a>
            <a href="handover.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-exchange-alt"></i></div>
                <div class="app-name">Handover Log</div>
                <div class="app-hint">shift notes</div>
            </a>
            <a href="survey.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-poll-h"></i></div>
                <div class="app-name">Survey</div>
                <div class="app-hint">feedback</div>
            </a>
            <a href="maintenance.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-wrench"></i></div>
                <div class="app-name">Maintenance<br>Activity Log</div>
                <div class="maintenance-badge"><i class="fas fa-tools"></i> Track Issues</div>
            </a>
            <a href="roster.html" class="app-card" target="_self">
                <div class="icon-bg"><i class="fas fa-calendar-alt"></i></div>
                <div class="app-name">Roster</div>
                <div class="app-hint"><i class="fas fa-users"></i> staff schedule</div>
            </a>
        </div>
        <div style="height:0;"></div>
    </div>
</div>

<!-- ===== INSTALL BUTTONS ===== -->
<div class="install-wrapper">
    <!-- Android/Chrome install button -->
    <button id="installBtn" class="hidden"><i class="fas fa-download"></i> Install App</button>
    
    <!-- iOS install hint (shows when not in standalone mode) -->
    <div id="iosInstallHint" class="ios-install-hint hidden">
        <i class="fas fa-apple"></i> 
        To install on iPhone/iPad: tap 
        <span class="highlight"><i class="fas fa-share-alt"></i> Share</span> 
        then 
        <span class="highlight"><i class="fas fa-plus-circle"></i> Add to Home Screen</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ===== DETECT iOS =====
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                     (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        const isStandalone = window.navigator.standalone === true;
        const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches;

        // ===== INSTALL BUTTON (Android/Chrome) =====
        let deferredPrompt = null;
        const installBtn = document.getElementById('installBtn');
        const iosHint = document.getElementById('iosInstallHint');

        // Show iOS hint if on iOS and NOT in standalone mode
        if (isIOS && !isStandalone && !isInStandaloneMode) {
            iosHint.classList.remove('hidden');
            console.log('📱 iOS device detected - showing Add to Home Screen instructions');
        }

        // Chrome/Android install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
            console.log('📲 PWA: beforeinstallprompt fired');
            
            // Hide iOS hint on Android
            iosHint.classList.add('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                console.log(`📲 User choice: ${result.outcome}`);
                if (result.outcome === 'accepted') {
                    installBtn.classList.add('hidden');
                }
                deferredPrompt = null;
            } else {
                // Fallback for browsers that support PWA but no prompt
                if (!isIOS) {
                    alert('To install, open this page in Chrome and use "Add to Home Screen" from the menu.');
                }
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.classList.add('hidden');
            iosHint.classList.add('hidden');
            console.log('✅ Koveli Lounge installed as PWA');
        });

        // ===== SERVICE WORKER =====
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => {
                    console.log('✅ Service Worker registered successfully:', reg);
                })
                .catch(err => {
                    console.warn('⚠️ Service Worker registration failed:', err);
                });
        }

        // ===== CLEANUP & VALIDATION =====
        const mainButtons = document.querySelectorAll('.app-card');
        const expectedPages = ['checklist.html', 'shower.html', 'briefing.html', 'handover.html', 'survey.html', 'maintenance.html', 'roster.html'];
        
        function logLinkStatus() {
            mainButtons.forEach((btn, idx) => {
                const href = btn.getAttribute('href');
                if (href && expectedPages.includes(href)) {
                    console.log(`✅ [${idx+1}] ${href} ready`);
                } else if (href) {
                    console.log(`📁 [${idx+1}] linked to: ${href} (verify file exists)`);
                }
            });
            console.log("🎯 Koveli Lounge – 7-core buttons including Roster + Maintenance.");
        }

        function sanitizeLegacyElements() {
            const unwantedSelectors = [
                '.secondary-header', '.secondary-grid', '.sec-card', '.additional-section',
                '.tools-panel', '.extra-actions', '.footer-tools', '.supervisor-toggle',
                '.date-picker', '.extra-footer', '.dashboard-header', '.hub-header',
                '.info-footer', '.role-badge', '.welcome-footer', '.bottom-bar'
            ];
            unwantedSelectors.forEach(selector => {
                const elements = document.querySelectorAll(selector);
                elements.forEach(el => {
                    if (el && el.parentNode && !el.closest('.icon-grid')) {
                        if (el.style.display !== 'none') {
                            el.remove();
                        }
                    }
                });
            });
            const secondaryContainer = document.querySelector('.secondary-section, .secondary-grid, .additional-panel');
            if (secondaryContainer) secondaryContainer.remove();
        }

        function ensureSevenOnly() {
            const allCards = document.querySelectorAll('.app-card');
            if (allCards.length !== 7) {
                console.warn(`⚠️ Expecting 7 main buttons, found ${allCards.length}.`);
            } else {
                console.log(`✨ ${allCards.length} primary buttons — including Roster + Maintenance.`);
            }
        }

        window.addEventListener('load', () => {
            logLinkStatus();
            sanitizeLegacyElements();
            ensureSevenOnly();
            console.log("📱💎 Koveli Lounge | 7-button hub + PWA ready (manifest.json, sw.js)");
            console.log(`📱 iOS: ${isIOS}, Standalone: ${isStandalone || isInStandaloneMode}`);
        });

        const styleTag = document.createElement('style');
        styleTag.textContent = `
            .secondary-header, .secondary-grid, .sec-card, .additional-section, 
            .tools-panel, .extra-actions, .footer-tools, .supervisor-toggle,
            .date-picker, .extra-footer { display: none !important; visibility: hidden !important; height: 0 !important; width: 0 !important; overflow: hidden !important; pointer-events: none !important; }
            .icon-grid { display: grid !important; }
        `;
        document.head.appendChild(styleTag);
    })();
</script>
</body>
</html>
