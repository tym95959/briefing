<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>View Roster - Firebase Data</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- External Firebase config -->
    <script src="fireduty.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; padding: 24px 20px; color: #1a3e50; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header-card { background: white; border-radius: 28px; padding: 20px 28px; margin-bottom: 32px; border: 1px solid #e0eef6; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header-title h1 { font-size: 1.5rem; color: #1f5e7e; }
        .header-title p { font-size: 0.8rem; color: #7c9bb0; }
        .btn { border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; }
        .btn-primary { background: #2c7da0; color: white; }
        .btn-primary:hover { background: #1e627f; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; background: white; padding: 18px 24px; border-radius: 24px; margin-bottom: 28px; border: 1px solid #e2ecf3; }
        .filter-group { display: flex; flex-direction: column; gap: 8px; min-width: 170px; }
        .filter-group label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #3d6e8b; }
        select, input { padding: 10px 14px; border-radius: 60px; border: 1px solid #caddf0; font-family: inherit; font-size: 0.85rem; }
        .stats-badge { background: #eef3f8; border-radius: 40px; padding: 6px 18px; font-size: 0.8rem; font-weight: 500; }
        .sync-status { padding: 8px 16px; border-radius: 40px; font-size: 0.75rem; background: #eef2f5; }
        .sync-status.success { background: #e0f2e9; color: #1e6f3f; }
        .sync-status.error { background: #ffe6e2; color: #c0392b; }
        .sync-status.syncing { background: #fff0db; color: #b85c1a; }
        .group-section { margin-bottom: 32px; background: white; border-radius: 24px; overflow: hidden; border: 1px solid #e2ecf3; }
        .group-header { background: #f2f8fc; padding: 14px 24px; font-weight: 700; font-size: 1.2rem; color: #1f5e7e; border-bottom: 2px solid #d4e3ef; display: flex; justify-content: space-between; }
        .group-count { font-size: 0.8rem; font-weight: normal; background: white; padding: 4px 12px; border-radius: 40px; }
        .table-wrapper { overflow-x: auto; }
        .roster-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 800px; }
        .roster-table th { background: #f8fbfe; padding: 12px 8px; border-bottom: 1px solid #dae9f2; text-align: center; position: sticky; top: 0; }
        .roster-table td { padding: 10px 6px; border-bottom: 1px solid #ecf3f8; text-align: center; }
        .staff-name-cell { font-weight: 700; background: #fafdff; border-right: 1px solid #e2edf5; text-align: left; padding-left: 16px; position: sticky; left: 0; background: white; }
        .rcno-cell { font-size: 0.7rem; color: #4a6f8a; border-right: 1px solid #e2edf5; position: sticky; left: 0; background: white; }
        .shift-chip { display: inline-block; padding: 5px 12px; border-radius: 40px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
        .shift-morning { background: #FFF2B3; color: #4e3208; border-left: 3px solid #c8ac00; }
        .shift-evening { background: #C0E0F7; color: #184a66; border-left: 3px solid #2874a6; }
        .shift-midnight { background: #FFE0E0; color: #c0392b; border-left: 3px solid #e74c3c; }
        .shift-off { background: #eef2f5; color: #7f8c8d; border-left: 3px solid #bdc3c7; }
        .shift-leave { background: #f3e5f5; color: #7b2d8e; border-left: 3px solid #9b59b6; }
        .shift-default { background: #eef2f5; color: #3a6b8c; }
        .empty-state { text-align: center; padding: 56px 24px; color: #7c9bb0; font-style: italic; }
        .footer-note { margin-top: 18px; text-align: right; font-size: 0.7rem; color: #7f9bb2; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-card">
        <div class="header-title">
            <h1>📋 Staff Roster Viewer</h1>
            <p>Data loaded from Firebase Realtime Database</p>
        </div>
        <div style="display: flex; gap: 12px;">
            <div id="syncStatus" class="sync-status">Loading...</div>
            <button class="btn btn-primary" id="refreshBtn">🔄 Refresh</button>
        </div>
    </div>

    <div id="filterSection" style="display: none;">
        <div class="filter-bar">
            <div class="filter-group">
                <label>👥 STAFF NAME</label>
                <select id="staffFilterSelect"><option value="ALL">All Staff</option></select>
            </div>
            <div class="filter-group">
                <label>📅 DATE RANGE</label>
                <div style="display: flex; gap: 12px;">
                    <input type="date" id="startDateFilter">
                    <input type="date" id="endDateFilter">
                    <button class="btn btn-primary" id="applyDateBtn">Apply</button>
                </div>
            </div>
            <div class="filter-group">
                <label>⏰ SHIFT TYPE</label>
                <select id="shiftTypeFilter">
                    <option value="ALL">All Shifts</option>
                    <option value="MORNING">🌅 Morning</option>
                    <option value="EVENING">🌙 Evening</option>
                    <option value="MIDNIGHT">🌃 Midnight</option>
                    <option value="OFF">🚫 OFF</option>
                    <option value="LEAVE">🌿 Leave</option>
                </select>
            </div>
            <div class="stats-badge" id="statsInfo">—</div>
            <button class="btn btn-primary" id="resetFiltersBtn" style="background: #6c757d;">Reset</button>
        </div>
    </div>

    <div id="groupsContainer"></div>
    <div class="footer-note">✅ Dates shown exactly as in uploaded Excel | Use date filter to view specific ranges</div>
</div>

<script>
    let database = null;
    let ROSTER_REF = 'rosterData';
    let groupedStaff = {};
    let allStaffFlat = [];
    let masterDateList = [];
    let currentFilters = { staffName: "ALL", startDate: null, endDate: null, shiftType: "ALL" };
    let dataLoaded = false;

    const dayNames = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

    function initFirebaseFromConfig() {
        return new Promise((resolve, reject) => {
            if (typeof firebaseConfig !== 'undefined') {
                try {
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    database = firebase.database();
                    resolve(true);
                } catch (err) { reject(err); }
            } else {
                const checkInterval = setInterval(() => {
                    if (typeof firebaseConfig !== 'undefined') {
                        clearInterval(checkInterval);
                        try {
                            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                            database = firebase.database();
                            resolve(true);
                        } catch (err) { reject(err); }
                    }
                }, 100);
                setTimeout(() => { clearInterval(checkInterval); reject(new Error('Firebase config not loaded')); }, 5000);
            }
        });
    }

    function setSyncStatus(message, type = 'info') {
        const el = document.getElementById('syncStatus');
        el.textContent = message;
        el.className = 'sync-status';
        if (type === 'success') el.classList.add('success');
        else if (type === 'error') el.classList.add('error');
        else if (type === 'syncing') el.classList.add('syncing');
    }

    function getShiftCategory(shiftRaw) {
        if (!shiftRaw) return "UNKNOWN";
        let upper = String(shiftRaw).trim().toUpperCase();
        if (upper === "OFF") return "OFF";
        if (upper.includes("LEAVE")) return "LEAVE";
        let match = shiftRaw.match(/(\d{4})/);
        if (match) {
            let hour = parseInt(match[1].substring(0, 2));
            if (hour >= 7 && hour <= 11) return "MORNING";
            if (hour >= 15 && hour <= 18) return "EVENING";
            if (hour === 0) return "MIDNIGHT";
        }
        return "UNKNOWN";
    }

    function getShiftClass(cat) {
        if (cat === "MORNING") return "shift-morning";
        if (cat === "EVENING") return "shift-evening";
        if (cat === "MIDNIGHT") return "shift-midnight";
        if (cat === "OFF") return "shift-off";
        if (cat === "LEAVE") return "shift-leave";
        return "shift-default";
    }

    function formatShiftDisplay(raw) {
        if (!raw) return "—";
        let v = String(raw).trim();
        if (v.toUpperCase() === "OFF") return "🚫 OFF";
        if (v.toUpperCase().includes("LEAVE")) return "🌿 Leave";
        return v;
    }

    function formatDateWithDay(isoDate) {
        if (!isoDate) return "";
        let d = new Date(isoDate + 'T12:00:00Z'); // Force noon UTC to avoid timezone shift
        if (isNaN(d.getTime())) return isoDate;
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = monthNames[d.getUTCMonth()];
        const day = d.getUTCDate();
        const dayName = dayNames[d.getUTCDay()];
        return `${month} ${day} ${dayName}`;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function getDisplayGroupName(groupKey) {
        const map = { 'Snr_Executive': '👔 Snr. Executive', 'Executive': '📋 Executive', 'Supervisors': '⭐ Supervisors', 'Officers': '👮 Officers', 'Housekeepers': '🧹 Housekeepers' };
        return map[groupKey] || groupKey;
    }

    function getGroupOrder(groupKey) {
        const order = { 'Snr_Executive': 1, 'Executive': 2, 'Supervisors': 3, 'Officers': 4, 'Housekeepers': 5 };
        return order[groupKey] || 999;
    }

    function populateStaffDropdown() {
        let select = document.getElementById("staffFilterSelect");
        select.innerHTML = '<option value="ALL">All Staff Members</option>';
        allStaffFlat.forEach(s => {
            let opt = document.createElement("option");
            opt.value = s.staffName;
            opt.textContent = s.rcNo ? `${s.rcNo} - ${s.staffName}` : s.staffName;
            select.appendChild(opt);
        });
        select.value = currentFilters.staffName;
    }

    function shiftMatchesType(shiftRaw, filter) {
        if (filter === "ALL") return true;
        let cat = getShiftCategory(shiftRaw);
        if (filter === "MORNING" && cat === "MORNING") return true;
        if (filter === "EVENING" && cat === "EVENING") return true;
        if (filter === "MIDNIGHT" && cat === "MIDNIGHT") return true;
        if (filter === "OFF" && cat === "OFF") return true;
        if (filter === "LEAVE" && cat === "LEAVE") return true;
        return false;
    }

    function getFilteredDates() {
        if (!masterDateList.length) return [];
        let filtered = [...masterDateList];
        if (currentFilters.startDate) filtered = filtered.filter(d => d >= currentFilters.startDate);
        if (currentFilters.endDate) filtered = filtered.filter(d => d <= currentFilters.endDate);
        return filtered;
    }

    function renderAllGroups() {
        if (!dataLoaded || !masterDateList.length) {
            document.getElementById("groupsContainer").innerHTML = `<div class="empty-state">📭 No data loaded. Click Refresh to load from Firebase.</div>`;
            return;
        }

        let filteredDates = getFilteredDates();
        if (filteredDates.length === 0) {
            document.getElementById("groupsContainer").innerHTML = `<div class="empty-state">⚠️ No dates in selected range. Available: ${masterDateList.join(', ')}</div>`;
            return;
        }

        let totalStaffDisplayed = 0, totalCells = 0, html = "";
        let sortedGroups = Object.keys(groupedStaff).sort((a, b) => getGroupOrder(a) - getGroupOrder(b));

        for (let groupKey of sortedGroups) {
            let staffList = groupedStaff[groupKey] || [];
            let filteredStaff = currentFilters.staffName !== "ALL" ? staffList.filter(s => s.staffName === currentFilters.staffName) : staffList;
            
            let visibleStaff = filteredStaff.filter(staff => {
                return filteredDates.some(date => {
                    let shiftRaw = staff.shifts[date] || "";
                    return currentFilters.shiftType === "ALL" || shiftMatchesType(shiftRaw, currentFilters.shiftType);
                });
            });

            if (visibleStaff.length === 0) continue;
            totalStaffDisplayed += visibleStaff.length;
            
            visibleStaff.forEach(staff => {
                filteredDates.forEach(date => {
                    let shiftRaw = staff.shifts[date] || "";
                    if (currentFilters.shiftType === "ALL" || shiftMatchesType(shiftRaw, currentFilters.shiftType)) totalCells++;
                });
            });

            html += `<div class="group-section"><div class="group-header"><span>${getDisplayGroupName(groupKey)}</span><span class="group-count">${visibleStaff.length} staff</span></div>
                    <div class="table-wrapper"><table class="roster-table"><thead><tr><th style="position:sticky;left:0;">RC No.</th><th style="position:sticky;left:80px;">Staff Name</th>`;
            filteredDates.forEach(date => { html += `<th>${formatDateWithDay(date)}</th>`; });
            html += `</tr></thead><tbody>`;
            
            visibleStaff.forEach(staff => {
                html += `<tr><td class="rcno-cell">${escapeHtml(staff.rcNo || "—")}</td><td class="staff-name-cell">${escapeHtml(staff.staffName)}</td>`;
                filteredDates.forEach(date => {
                    let shiftRaw = staff.shifts[date] || "";
                    let category = getShiftCategory(shiftRaw);
                    let chipClass = getShiftClass(category);
                    let matches = (currentFilters.shiftType === "ALL") || shiftMatchesType(shiftRaw, currentFilters.shiftType);
                    html += `<td>${matches ? `<span class="shift-chip ${chipClass}">${escapeHtml(formatShiftDisplay(shiftRaw))}</span>` : `<span class="shift-chip shift-default" style="opacity:0.4;">${escapeHtml(formatShiftDisplay(shiftRaw))}</span>`}</td>`;
                });
                html += `</td>`;
            });
            html += `</tbody></table></div></div>`;
        }

        if (totalStaffDisplayed === 0) {
            document.getElementById("groupsContainer").innerHTML = `<div class="empty-state">⚠️ No staff match the current filters</div>`;
        } else {
            document.getElementById("groupsContainer").innerHTML = html;
        }

        const shiftDisplay = currentFilters.shiftType === "ALL" ? "All" : currentFilters.shiftType;
        document.getElementById("statsInfo").innerHTML = `${totalStaffDisplayed} staff · ${filteredDates.length} days · ${totalCells} ${shiftDisplay} shifts`;
    }

    async function loadFromFirebase() {
        if (!database) { setSyncStatus('Firebase not initialized', 'error'); return; }
        setSyncStatus('Loading from Firebase...', 'syncing');
        try {
            const snapshot = await database.ref(ROSTER_REF).get();
            if (!snapshot.exists()) {
                setSyncStatus('No roster data found. Please upload first.', 'error');
                document.getElementById("groupsContainer").innerHTML = `<div class="empty-state">📭 No roster data in Firebase.</div>`;
                document.getElementById("filterSection").style.display = "none";
                return;
            }
            const data = snapshot.val();
            masterDateList = data.dateList || [];
            console.log('Dates from Firebase:', masterDateList);
            groupedStaff = data.groups || {};
            
            allStaffFlat = [];
            for (let g in groupedStaff) {
                groupedStaff[g].forEach(s => allStaffFlat.push({ ...s, groupKey: g }));
            }
            dataLoaded = true;
            populateStaffDropdown();
            renderAllGroups();
            document.getElementById("filterSection").style.display = "block";
            setSyncStatus(`✓ Loaded ${allStaffFlat.length} staff · ${masterDateList.length} days`, 'success');
        } catch (err) {
            console.error(err);
            setSyncStatus('✗ Load failed: ' + err.message, 'error');
        }
    }

    document.getElementById("refreshBtn").addEventListener("click", () => loadFromFirebase());
    document.getElementById("applyDateBtn").addEventListener("click", () => {
        if (!dataLoaded) return;
        currentFilters.startDate = document.getElementById("startDateFilter").value || null;
        currentFilters.endDate = document.getElementById("endDateFilter").value || null;
        renderAllGroups();
    });
    document.getElementById("staffFilterSelect").addEventListener("change", e => {
        if (!dataLoaded) return;
        currentFilters.staffName = e.target.value;
        renderAllGroups();
    });
    document.getElementById("shiftTypeFilter").addEventListener("change", e => {
        if (!dataLoaded) return;
        currentFilters.shiftType = e.target.value;
        renderAllGroups();
    });
    document.getElementById("resetFiltersBtn").addEventListener("click", () => {
        if (!dataLoaded) return;
        document.getElementById("staffFilterSelect").value = "ALL";
        document.getElementById("startDateFilter").value = "";
        document.getElementById("endDateFilter").value = "";
        document.getElementById("shiftTypeFilter").value = "ALL";
        currentFilters = { staffName: "ALL", startDate: null, endDate: null, shiftType: "ALL" };
        renderAllGroups();
    });

    initFirebaseFromConfig().then(() => loadFromFirebase()).catch(err => {
        console.error(err);
        setSyncStatus('⚠️ Firebase config error', 'error');
    });
</script>
</body>
</html>
