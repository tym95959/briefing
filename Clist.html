<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Staff Portal | Pattern + Numeric Password Modal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f9e7b3 0%, #f5dc9c 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* main card – warm light gold */
        .app-card {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: #fffcf0;
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(120, 80, 20, 0.25);
            overflow: hidden;
            border: 1px solid #f3de9f;
        }

        .tabs-header {
            display: flex;
            background: #fff7e8;
            border-bottom: 1px solid #f1e2bc;
            padding: 8px 24px 0 24px;
            gap: 20px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.35rem;
            font-weight: 600;
            padding: 16px 8px 14px 8px;
            color: #b8860b;
            cursor: pointer;
            transition: 0.2s ease;
            border-radius: 32px 32px 0 0;
            letter-spacing: -0.3px;
        }

        .tab-btn.active {
            color: #8b6508;
            background: #fffcf0;
            border-bottom: 3px solid #e4b822;
            font-weight: 700;
        }

        .tab-content {
            padding: 28px 26px 32px 26px;
            background: #fffcf0;
        }

        .view-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .view-panel.active-panel {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .field-group {
            margin-bottom: 28px;
        }

        .field-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
            color: #7a5c1a;
            margin-bottom: 12px;
        }

        select {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 500;
            background-color: #fffcf0;
            border: 1.5px solid #e8d6a8;
            border-radius: 36px;
            color: #5c4311;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%23c9a03e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            transition: 0.2s;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: #e4b53e;
            box-shadow: 0 0 0 3px rgba(228, 185, 62, 0.25);
        }

        .info-card {
            background: #fffef7;
            border-radius: 32px;
            padding: 22px 26px;
            margin-top: 8px;
            border: 1px solid #f3e5bd;
            box-shadow: 0 6px 14px rgba(110, 70, 10, 0.05);
        }

        .info-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            color: #c49a2b;
            margin-bottom: 18px;
        }

        .detail-row {
            display: flex;
            flex-wrap: wrap;
            padding: 12px 0;
            border-bottom: 1px solid #f4e9cf;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            width: 110px;
            font-weight: 600;
            color: #8b691b;
        }

        .detail-value {
            flex: 1;
            color: #5c4311;
            word-break: break-word;
            font-weight: 500;
        }

        .badge-role {
            background: #fcf2dc;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #b57c1c;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #b28b44;
            border-top: 1px solid #f1e4c4;
            padding-top: 16px;
        }

        .error-message {
            color: #c25d2e;
            background: #fff2e6;
            border-radius: 28px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }

        /* ---------- MODAL STYLES (light gold theme) ---------- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: #fffef5;
            border-radius: 56px;
            max-width: 480px;
            width: 90%;
            padding: 24px 20px 30px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid #f5e2b0;
            text-align: center;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .modal-header h3 {
            color: #b87c1a;
            font-weight: 700;
            font-size: 1.4rem;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #c29a46;
            padding: 0 8px;
        }

        .modal-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid #f0e0bc;
            padding-bottom: 8px;
        }

        .modal-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 12px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ba8b2c;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.2s;
        }

        .modal-tab-btn.active-tab {
            background: #fbefd4;
            color: #986b1a;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .tab-pane {
            display: none;
            animation: fadeQuick 0.2s;
        }

        .tab-pane.active-pane {
            display: block;
        }

        @keyframes fadeQuick {
            from { opacity: 0; transform: translateY(4px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* pattern grid */
        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
            align-items: center;
            margin: 20px auto;
            width: 260px;
        }

        .dot {
            width: 70px;
            height: 70px;
            background: #f9efdc;
            border-radius: 50%;
            border: 2px solid #e4bc78;
            transition: 0.1s;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .dot.selected {
            background: #e5c48a;
            border-color: #c9912e;
            transform: scale(0.96);
        }

        .pattern-canvas-area {
            position: relative;
            display: flex;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .pattern-wrapper {
            position: relative;
            width: 260px;
            margin: 0 auto;
        }

        .pattern-status {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #a57334;
        }

        .pattern-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 10px;
        }

        /* numeric keypad */
        .numeric-display {
            background: #fcf5e6;
            border: 1px solid #eedbba;
            border-radius: 48px;
            padding: 16px 20px;
            font-size: 1.8rem;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: #754e16;
        }

        .keypad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .key-btn {
            background: #fcf3e2;
            border: 1px solid #eedbbc;
            border-radius: 50px;
            padding: 16px 0;
            font-size: 1.6rem;
            font-weight: 600;
            color: #825e24;
            cursor: pointer;
            transition: 0.1s;
        }

        .key-btn:active { background: #ecdcaa; transform: scale(0.96);}
        .action-btn {
            background: #f8e9cf;
            border-radius: 50px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
        }

        .modal-submit {
            background: #e7c882;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #543d12;
            margin-top: 18px;
            width: 100%;
            cursor: pointer;
        }

        .modal-cancel {
            background: #f2e2c6;
            border: none;
            border-radius: 60px;
            padding: 12px 16px;
            margin-top: 10px;
            width: 100%;
            font-weight: 500;
            cursor: pointer;
        }

        @media (max-width: 550px) {
            .dot { width: 55px; height: 55px; }
            .pattern-grid { gap: 12px; width: 210px; }
            .pattern-wrapper { width: 210px; }
            .modal-container { padding: 18px; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="tabs-header">
        <button class="tab-btn active" data-tab="staff">👤 Staff View</button>
        <button class="tab-btn" data-tab="supervisor">🛡️ Supervisor Tab</button>
    </div>
    <div class="tab-content">
        <!-- STAFF VIEW PANEL -->
        <div id="staffViewPanel" class="view-panel active-panel">
            <div class="field-group">
                <label>📋 Select staff member</label>
                <select id="staffSelect" class="staff-dropdown"></select>
            </div>
            <div class="info-card">
                <div class="info-title">👁️ STAFF INFORMATION (limited)</div>
                <div id="staffDetailsArea">
                    <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                </div>
                <div class="footer-note">🔒 Password required (pattern / numeric)</div>
            </div>
            <div id="staffErrorMsg" class="error-message" style="display: none;"></div>
        </div>

        <!-- SUPERVISOR VIEW PANEL -->
        <div id="supervisorViewPanel" class="view-panel">
            <div class="field-group">
                <label>🔐 Select staff member (supervisor)</label>
                <select id="supervisorSelect" class="staff-dropdown"></select>
            </div>
            <div class="info-card">
                <div class="info-title">🛡️ SUPERVISOR DASHBOARD · full credentials</div>
                <div id="supervisorDetailsArea">
                    <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">🔑 Password:</span><span class="detail-value">—</span></div>
                </div>
                <div class="footer-note">🛡️ Supervisor view shows full pass after auth</div>
            </div>
            <div id="supervisorErrorMsg" class="error-message" style="display: none;"></div>
        </div>
    </div>
</div>

<!-- PASSWORD MODAL (pattern + numeric) -->
<div id="passwordModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="modalStaffName">Verify identity</h3>
            <button class="modal-close" id="modalCloseBtn">&times;</button>
        </div>
        <div class="modal-tabs">
            <button class="modal-tab-btn active-tab" data-modal-tab="pattern">🔐 Line Pattern</button>
            <button class="modal-tab-btn" data-modal-tab="numeric">🔢 Numeric</button>
        </div>
        <!-- Pattern Tab -->
        <div id="patternTab" class="tab-pane active-pane">
            <div class="pattern-wrapper">
                <div class="pattern-grid" id="patternGrid"></div>
                <canvas id="patternCanvas" width="260" height="260" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none;"></canvas>
            </div>
            <div class="pattern-status" id="patternStatus">Draw a pattern (connect dots)</div>
            <div class="pattern-actions">
                <button id="resetPatternBtn" class="action-btn">⟳ Reset</button>
            </div>
        </div>
        <!-- Numeric Tab -->
        <div id="numericTab" class="tab-pane">
            <div class="numeric-display" id="numericInput">____</div>
            <div class="keypad-grid" id="keypad"></div>
            <div style="display: flex; gap: 12px;">
                <button id="clearNumericBtn" class="action-btn" style="flex:1">Clear</button>
                <button id="deleteNumericBtn" class="action-btn" style="flex:1">⌫</button>
            </div>
        </div>
        <button id="modalSubmitBtn" class="modal-submit">✓ Verify access</button>
        <button id="modalCancelBtn" class="modal-cancel">Cancel</button>
    </div>
</div>

<script type="module">
    import { staffList } from './staff.js';

    // ---------- helper utils ----------
    function escapeHtml(str) { return String(str??'').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function getStaffById(id) { return staffList.find(s => s.id === id); }

    // ----- global modal state -----
    let pendingAuth = { resolve: null, staff: null, viewType: null };  // viewType: 'staff' or 'supervisor'
    let currentPatternSequence = [];   // array of dot numbers (1-9)
    let currentNumericValue = '';
    let isDrawing = false;
    let dotElements = [];
    let ctx = null, canvas = null, patternWrapper = null, gridRect = null;

    // ----- pattern lock (3x3) numbers 1-9 -----
    function initPatternLock() {
        const grid = document.getElementById('patternGrid');
        if (!grid) return;
        grid.innerHTML = '';
        dotElements = [];
        for (let i = 1; i <= 9; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.dataset.value = i;
            dot.addEventListener('mousedown', (e) => startPattern(e, i));
            dot.addEventListener('touchstart', (e) => { e.preventDefault(); startPattern(e, i); });
            grid.appendChild(dot);
            dotElements.push(dot);
        }
        canvas = document.getElementById('patternCanvas');
        ctx = canvas.getContext('2d');
        patternWrapper = document.querySelector('.pattern-wrapper');
        resizeAndDrawCanvas();
        window.addEventListener('resize', () => resizeAndDrawCanvas());
        attachGlobalEvents();
    }

    function resizeAndDrawCanvas() {
        if (!patternWrapper || !canvas) return;
        const rect = patternWrapper.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawPatternLines();
    }

    function getDotCenter(value) {
        const idx = value - 1;
        const dot = dotElements[idx];
        if (!dot) return null;
        const parentRect = patternWrapper.getBoundingClientRect();
        const dotRect = dot.getBoundingClientRect();
        const x = dotRect.left + dotRect.width/2 - parentRect.left;
        const y = dotRect.top + dotRect.height/2 - parentRect.top;
        return { x, y };
    }

    function drawPatternLines() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentPatternSequence.length < 2) return;
        ctx.beginPath();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#d4a13e';
        ctx.lineCap = 'round';
        for (let i = 0; i < currentPatternSequence.length - 1; i++) {
            const from = getDotCenter(currentPatternSequence[i]);
            const to = getDotCenter(currentPatternSequence[i+1]);
            if (from && to) {
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
            }
        }
        // draw dots glow
        dotElements.forEach(dot => dot.classList.remove('selected'));
        currentPatternSequence.forEach(val => {
            const dot = dotElements[val-1];
            if (dot) dot.classList.add('selected');
        });
    }

    function startPattern(e, dotVal) {
        e.preventDefault();
        if (!pendingAuth.staff) return;
        isDrawing = true;
        const index = currentPatternSequence.indexOf(dotVal);
        if (index === -1) {
            currentPatternSequence.push(dotVal);
        } else {
            // if already visited, trim after that point (like typical pattern)
            currentPatternSequence = currentPatternSequence.slice(0, index+1);
        }
        drawPatternLines();
        updatePatternStatus();
    }

    function onPatternMove(e) {
        if (!isDrawing || !pendingAuth.staff) return;
        const touch = e.touches ? e.touches[0] : e;
        const elem = document.elementsFromPoint(touch.clientX, touch.clientY);
        for (let el of elem) {
            if (el.classList && el.classList.contains('dot')) {
                const val = parseInt(el.dataset.value);
                if (val && currentPatternSequence[currentPatternSequence.length-1] !== val) {
                    if (!currentPatternSequence.includes(val)) {
                        currentPatternSequence.push(val);
                        drawPatternLines();
                        updatePatternStatus();
                    } else {
                        // revisit - reset from that point?
                        const idx = currentPatternSequence.indexOf(val);
                        if (idx !== -1 && idx !== currentPatternSequence.length-1) {
                            currentPatternSequence = currentPatternSequence.slice(0, idx+1);
                            drawPatternLines();
                            updatePatternStatus();
                        }
                    }
                }
                break;
            }
        }
    }

    function endPattern() { isDrawing = false; }
    function attachGlobalEvents() {
        window.addEventListener('mouseup', endPattern);
        window.addEventListener('touchend', endPattern);
        window.addEventListener('mousemove', onPatternMove);
        window.addEventListener('touchmove', (e) => { e.preventDefault(); onPatternMove(e); });
    }

    function resetPattern() {
        currentPatternSequence = [];
        drawPatternLines();
        updatePatternStatus();
    }

    function updatePatternStatus() {
        const statusDiv = document.getElementById('patternStatus');
        if (statusDiv) statusDiv.innerText = currentPatternSequence.length ? `Pattern: ${currentPatternSequence.join(' → ')}` : 'Draw a pattern (connect dots)';
    }

    function getPatternString() { return currentPatternSequence.join(''); }

    // ----- numeric keypad -----
    function buildKeypad() {
        const pad = document.getElementById('keypad');
        if (!pad) return;
        pad.innerHTML = '';
        for (let i = 1; i <= 9; i++) {
            const btn = document.createElement('div');
            btn.className = 'key-btn';
            btn.innerText = i;
            btn.addEventListener('click', () => appendNumeric(i.toString()));
            pad.appendChild(btn);
        }
        const zeroBtn = document.createElement('div');
        zeroBtn.className = 'key-btn';
        zeroBtn.innerText = '0';
        zeroBtn.addEventListener('click', () => appendNumeric('0'));
        pad.appendChild(zeroBtn);
        const dummy = document.createElement('div'); dummy.style.visibility = 'hidden'; pad.appendChild(dummy);
    }

    function appendNumeric(digit) {
        if (currentNumericValue.length < 8) currentNumericValue += digit;
        updateNumericDisplay();
    }

    function clearNumeric() { currentNumericValue = ''; updateNumericDisplay(); }
    function deleteNumeric() { currentNumericValue = currentNumericValue.slice(0, -1); updateNumericDisplay(); }
    function updateNumericDisplay() {
        const disp = document.getElementById('numericInput');
        if (disp) disp.innerText = currentNumericValue || '____';
    }

    // ----- modal UI logic with tabs -----
    let activeModalTab = 'pattern';
    function switchModalTab(tabId) {
        activeModalTab = tabId;
        document.querySelectorAll('.modal-tab-btn').forEach(btn => btn.classList.remove('active-tab'));
        document.querySelector(`.modal-tab-btn[data-modal-tab="${tabId}"]`).classList.add('active-tab');
        document.getElementById('patternTab').classList.toggle('active-pane', tabId === 'pattern');
        document.getElementById('numericTab').classList.toggle('active-pane', tabId === 'numeric');
        if (tabId === 'pattern') resizeAndDrawCanvas();
    }

    function openPasswordModal(staff, viewType) {
        return new Promise((resolve) => {
            pendingAuth = { resolve, staff, viewType };
            document.getElementById('modalStaffName').innerText = `🔐 ${escapeHtml(staff.name)}`;
            // reset pattern & numeric
            resetPattern();
            currentNumericValue = '';
            updateNumericDisplay();
            activeModalTab = 'pattern';
            switchModalTab('pattern');
            document.getElementById('passwordModal').classList.add('active');
        });
    }

    async function verifyAndClose() {
        const { resolve, staff, viewType } = pendingAuth;
        if (!staff || !resolve) {
            closeModal(false);
            return;
        }
        let inputPass = '';
        if (activeModalTab === 'pattern') {
            inputPass = getPatternString();
        } else {
            inputPass = currentNumericValue;
        }
        const storedPass = staff.pass ? String(staff.pass) : '';
        if (inputPass === storedPass) {
            closeModal(true);
            resolve({ success: true, staff });
        } else {
            // wrong password: show error inside modal briefly
            const statusDiv = activeModalTab === 'pattern' ? document.getElementById('patternStatus') : null;
            if (statusDiv) statusDiv.innerText = '❌ Wrong pattern! Try again.';
            else {
                const disp = document.getElementById('numericInput');
                const original = disp.innerText;
                disp.innerText = '❌ Wrong PIN';
                setTimeout(() => { if (disp) disp.innerText = original; }, 1200);
            }
            if (activeModalTab === 'pattern') resetPattern();
            else clearNumeric();
        }
    }

    function closeModal(success = false) {
        document.getElementById('passwordModal').classList.remove('active');
        if (pendingAuth.resolve && !success) pendingAuth.resolve({ success: false });
        pendingAuth = { resolve: null, staff: null, viewType: null };
    }

    // ----- Staff view and Supervisor view handlers (using modal) -----
    let staffLastValidId = null, supervisorLastValidId = null;
    function renderStaffView(staff) {
        const container = document.getElementById('staffDetailsArea');
        if (!staff) return;
        container.innerHTML = `
            <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">${escapeHtml(staff.id)}</span></div>
            <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">${escapeHtml(staff.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value"><span class="badge-role">${escapeHtml(staff.role)}</span></span></div>
            <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">${escapeHtml(staff.contact || 'Not provided')}</span></div>
        `;
        staffLastValidId = staff.id;
    }
    function renderSupervisorView(staff) {
        const container = document.getElementById('supervisorDetailsArea');
        if (!staff) return;
        container.innerHTML = `
            <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">${escapeHtml(staff.id)}</span></div>
            <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">${escapeHtml(staff.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value"><strong>${escapeHtml(staff.role)}</strong></span></div>
            <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">${escapeHtml(staff.contact || 'Not provided')}</span></div>
            <div class="detail-row"><span class="detail-label">🔑 Password:</span><span class="detail-value"><code>${escapeHtml(staff.pass)}</code></span></div>
        `;
        supervisorLastValidId = staff.id;
    }
    function resetStaffPlaceholder() { 
        document.getElementById('staffDetailsArea').innerHTML = `<div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>`;
        staffLastValidId = null;
    }
    function resetSupervisorPlaceholder() {
        document.getElementById('supervisorDetailsArea').innerHTML = `<div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div><div class="detail-row"><span class="detail-label">🔑 Password:</span><span class="detail-value">—</span></div>`;
        supervisorLastValidId = null;
    }

    async function onStaffSelect(staff, dropdown) {
        const auth = await openPasswordModal(staff, 'staff');
        if (auth.success) {
            renderStaffView(staff);
        } else {
            if (staffLastValidId) {
                dropdown.value = staffLastValidId;
                const validStaff = getStaffById(staffLastValidId);
                if (validStaff) renderStaffView(validStaff);
            } else {
                resetStaffPlaceholder();
                if (staffList.length) dropdown.value = staffList[0].id;
            }
        }
    }
    async function onSupervisorSelect(staff, dropdown) {
        const auth = await openPasswordModal(staff, 'supervisor');
        if (auth.success) {
            renderSupervisorView(staff);
        } else {
            if (supervisorLastValidId) {
                dropdown.value = supervisorLastValidId;
                const validStaff = getStaffById(supervisorLastValidId);
                if (validStaff) renderSupervisorView(validStaff);
            } else {
                resetSupervisorPlaceholder();
                if (staffList.length) dropdown.value = staffList[0].id;
            }
        }
    }

    function populateNameDropdown(selectEl) {
        selectEl.innerHTML = '';
        staffList.forEach(s => { const opt = document.createElement('option'); opt.value = s.id; opt.textContent = s.name; selectEl.appendChild(opt); });
        if (staffList.length) selectEl.selectedIndex = 0;
    }

    function initViews() {
        const staffDropdown = document.getElementById('staffSelect');
        const supDropdown = document.getElementById('supervisorSelect');
        populateNameDropdown(staffDropdown);
        populateNameDropdown(supDropdown);
        resetStaffPlaceholder();
        resetSupervisorPlaceholder();
        staffDropdown.addEventListener('change', async (e) => {
            const id = e.target.value;
            const staff = getStaffById(id);
            if (staff) await onStaffSelect(staff, staffDropdown);
        });
        supDropdown.addEventListener('change', async (e) => {
            const id = e.target.value;
            const staff = getStaffById(id);
            if (staff) await onSupervisorSelect(staff, supDropdown);
        });
    }

    // Tabs switching (main)
    function initMainTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        const staffPanel = document.getElementById('staffViewPanel');
        const supPanel = document.getElementById('supervisorViewPanel');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const which = btn.dataset.tab;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (which === 'staff') { staffPanel.classList.add('active-panel'); supPanel.classList.remove('active-panel'); }
                else { supPanel.classList.add('active-panel'); staffPanel.classList.remove('active-panel'); }
            });
        });
    }

    // Modal events
    function bindModalEvents() {
        document.getElementById('modalCloseBtn').onclick = () => closeModal(false);
        document.getElementById('modalCancelBtn').onclick = () => closeModal(false);
        document.getElementById('modalSubmitBtn').onclick = verifyAndClose;
        document.querySelectorAll('.modal-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchModalTab(btn.dataset.modalTab));
        });
        document.getElementById('resetPatternBtn').onclick = () => resetPattern();
        document.getElementById('clearNumericBtn').onclick = () => clearNumeric();
        document.getElementById('deleteNumericBtn').onclick = () => deleteNumeric();
    }

    // Start
    document.addEventListener('DOMContentLoaded', () => {
        if (!staffList || staffList.length === 0) return;
        initPatternLock();
        buildKeypad();
        bindModalEvents();
        initMainTabs();
        initViews();
    });
</script>
</body>
</html>
