<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Staff Portal | Dual View with External staff.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e0e8 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* main card – iPad friendly */
        .app-card {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* tabs */
        .tabs-header {
            display: flex;
            background: #ffffffea;
            border-bottom: 1px solid #e2edf2;
            backdrop-filter: blur(2px);
            padding: 8px 24px 0 24px;
            gap: 20px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.35rem;
            font-weight: 600;
            padding: 16px 8px 14px 8px;
            color: #4a627a;
            cursor: pointer;
            transition: 0.2s ease;
            border-radius: 32px 32px 0 0;
            letter-spacing: -0.3px;
        }

        .tab-btn.active {
            color: #1f4f8b;
            background: #ffffff;
            border-bottom: 3px solid #1f4f8b;
            font-weight: 700;
        }

        .tab-content {
            padding: 28px 26px 32px 26px;
            background: #ffffff;
        }

        .view-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .view-panel.active-panel {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* dropdown – large touch target */
        .field-group {
            margin-bottom: 28px;
        }

        .field-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
            color: #1e2a44;
            margin-bottom: 12px;
        }

        select {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 500;
            background-color: #f8fafd;
            border: 1.5px solid #cbdde9;
            border-radius: 36px;
            color: #0f172a;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%23334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            transition: 0.2s;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: #1f4f8b;
            box-shadow: 0 0 0 3px rgba(31,79,139,0.2);
            background-color: #ffffff;
        }

        /* info cards */
        .info-card {
            background: #f8fbfe;
            border-radius: 32px;
            padding: 22px 26px;
            margin-top: 8px;
            border: 1px solid #e3edf6;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .info-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            color: #2c628f;
            margin-bottom: 18px;
        }

        .detail-row {
            display: flex;
            flex-wrap: wrap;
            padding: 12px 0;
            border-bottom: 1px solid #e4edf5;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            width: 110px;
            font-weight: 600;
            color: #1e3a5f;
        }

        .detail-value {
            flex: 1;
            color: #0b3552;
            word-break: break-word;
            font-weight: 500;
        }

        .badge-role {
            background: #e1effa;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a0;
            border-top: 1px solid #e6eef5;
            padding-top: 16px;
        }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .tab-content { padding: 22px 18px; }
            .tab-btn { font-size: 1.2rem; }
            .detail-label { width: 90px; }
        }

        @media (max-width: 500px) {
            .detail-row { flex-direction: column; gap: 6px; }
            .detail-label { width: auto; }
            .info-card { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <!-- Tab buttons -->
    <div class="tabs-header">
        <button class="tab-btn active" data-tab="staff">👤 Staff View</button>
        <button class="tab-btn" data-tab="supervisor">🛡️ Supervisor Tab</button>
    </div>

    <div class="tab-content">
        <!-- STAFF VIEW PANEL -->
        <div id="staffViewPanel" class="view-panel active-panel">
            <div class="field-group">
                <label>📋 Select staff member</label>
                <select id="staffSelect" class="staff-dropdown"></select>
            </div>
            <div class="info-card">
                <div class="info-title">👁️ STAFF INFORMATION (limited)</div>
                <div id="staffDetailsArea">
                    <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                </div>
                <div class="footer-note">🔒 Password hidden (staff view)</div>
            </div>
        </div>

        <!-- SUPERVISOR VIEW PANEL -->
        <div id="supervisorViewPanel" class="view-panel">
            <div class="field-group">
                <label>🔐 Select staff (supervisor access)</label>
                <select id="supervisorSelect" class="staff-dropdown"></select>
            </div>
            <div class="info-card">
                <div class="info-title">🛡️ SUPERVISOR DASHBOARD · full credentials</div>
                <div id="supervisorDetailsArea">
                    <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">🔑 Password:</span><span class="detail-value">—</span></div>
                </div>
                <div class="footer-note">🛡️ Supervisor view includes password field</div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ✅ Import staffList from the external staff.js file (no inline data)
    import { staffList } from './staff.js';

    // --- Helper: populate a dropdown with staff options ---
    function populateDropdown(selectEl, staffArray) {
        if (!selectEl) return;
        selectEl.innerHTML = '';
        staffArray.forEach(staff => {
            const option = document.createElement('option');
            option.value = staff.id;
            option.textContent = `${staff.name} (ID: ${staff.id}) · ${staff.role}`;
            selectEl.appendChild(option);
        });
        if (staffArray.length) selectEl.selectedIndex = 0;
    }

    // --- Helper: escape HTML safely ---
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- Get staff object by id ---
    function getStaffById(id) {
        return staffList.find(s => s.id === id);
    }

    // --- Update Staff View (no password) ---
    function updateStaffView(staff) {
        if (!staff) return;
        const container = document.getElementById('staffDetailsArea');
        if (!container) return;
        const contactDisplay = staff.contact && staff.contact.trim() !== "" ? staff.contact : "📭 Not provided";
        container.innerHTML = `
            <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">${escapeHtml(staff.id)}</span></div>
            <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">${escapeHtml(staff.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value"><span class="badge-role">${escapeHtml(staff.role)}</span></span></div>
            <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">${escapeHtml(contactDisplay)}</span></div>
        `;
    }

    // --- Update Supervisor View (includes password) ---
    function updateSupervisorView(staff) {
        if (!staff) return;
        const container = document.getElementById('supervisorDetailsArea');
        if (!container) return;
        const contactDisplay = staff.contact && staff.contact.trim() !== "" ? staff.contact : "📭 Not provided";
        const passValue = staff.pass ? staff.pass : "❌ no pass set";
        container.innerHTML = `
            <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">${escapeHtml(staff.id)}</span></div>
            <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">${escapeHtml(staff.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value"><strong>${escapeHtml(staff.role)}</strong></span></div>
            <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">${escapeHtml(contactDisplay)}</span></div>
            <div class="detail-row"><span class="detail-label">🔑 Password:</span><span class="detail-value"><code>${escapeHtml(passValue)}</code></span></div>
        `;
    }

    // --- Wait for DOM and populate both dropdowns, attach events ---
    document.addEventListener('DOMContentLoaded', () => {
        // Get dropdown elements
        const staffDropdown = document.getElementById('staffSelect');
        const supervisorDropdown = document.getElementById('supervisorSelect');
        
        if (!staffDropdown || !supervisorDropdown) return;

        // Populate both from external staffList
        populateDropdown(staffDropdown, staffList);
        populateDropdown(supervisorDropdown, staffList);

        // Set initial details (first staff member)
        if (staffList.length) {
            const firstStaff = staffList[0];
            updateStaffView(firstStaff);
            updateSupervisorView(firstStaff);
        } else {
            // fallback empty message
            document.getElementById('staffDetailsArea').innerHTML = '<div class="detail-row">⚠️ No staff data loaded</div>';
            document.getElementById('supervisorDetailsArea').innerHTML = '<div class="detail-row">⚠️ No staff data loaded</div>';
        }

        // --- Staff view dropdown change ---
        staffDropdown.addEventListener('change', (e) => {
            const selectedId = e.target.value;
            const staff = getStaffById(selectedId);
            if (staff) updateStaffView(staff);
        });

        // --- Supervisor view dropdown change ---
        supervisorDropdown.addEventListener('change', (e) => {
            const selectedId = e.target.value;
            const staff = getStaffById(selectedId);
            if (staff) updateSupervisorView(staff);
        });
    });

    // --- Tab switching logic (iPad friendly) ---
    const tabBtns = document.querySelectorAll('.tab-btn');
    const panels = {
        staff: document.getElementById('staffViewPanel'),
        supervisor: document.getElementById('supervisorViewPanel')
    };

    function switchTab(tabId) {
        // deactivate all panels & buttons
        Object.values(panels).forEach(panel => {
            if (panel) panel.classList.remove('active-panel');
        });
        tabBtns.forEach(btn => btn.classList.remove('active'));
        
        // activate selected
        if (tabId === 'staff' && panels.staff) panels.staff.classList.add('active-panel');
        if (tabId === 'supervisor' && panels.supervisor) panels.supervisor.classList.add('active-panel');
        
        const activeBtn = Array.from(tabBtns).find(btn => btn.dataset.tab === tabId);
        if (activeBtn) activeBtn.classList.add('active');
    }

    tabBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            const tabName = btn.dataset.tab;
            if (tabName === 'staff') switchTab('staff');
            if (tabName === 'supervisor') switchTab('supervisor');
        });
    });
</script>
</body>
</html>
