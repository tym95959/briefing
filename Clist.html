<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Staff Portal | Light Gold Theme · Password Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #f9e7b3 0%, #f5dc9c 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* main card – warm light gold */
        .app-card {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: #fffcf0;
            border-radius: 48px;
            box-shadow: 0 25px 40px -12px rgba(120, 80, 20, 0.25);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid #f3de9f;
        }

        /* tabs with gold undertones */
        .tabs-header {
            display: flex;
            background: #fff7e8;
            border-bottom: 1px solid #f1e2bc;
            padding: 8px 24px 0 24px;
            gap: 20px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1.35rem;
            font-weight: 600;
            padding: 16px 8px 14px 8px;
            color: #b8860b;
            cursor: pointer;
            transition: 0.2s ease;
            border-radius: 32px 32px 0 0;
            letter-spacing: -0.3px;
        }

        .tab-btn.active {
            color: #8b6508;
            background: #fffcf0;
            border-bottom: 3px solid #e4b822;
            font-weight: 700;
        }

        .tab-content {
            padding: 28px 26px 32px 26px;
            background: #fffcf0;
        }

        .view-panel {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .view-panel.active-panel {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* dropdown – soft gold style */
        .field-group {
            margin-bottom: 28px;
        }

        .field-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
            color: #7a5c1a;
            margin-bottom: 12px;
        }

        select {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-weight: 500;
            background-color: #fffcf0;
            border: 1.5px solid #e8d6a8;
            border-radius: 36px;
            color: #5c4311;
            cursor: pointer;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="%23c9a03e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 20px;
            transition: 0.2s;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: #e4b53e;
            box-shadow: 0 0 0 3px rgba(228, 185, 62, 0.25);
            background-color: #ffffff;
        }

        /* info cards – light gold elevated */
        .info-card {
            background: #fffef7;
            border-radius: 32px;
            padding: 22px 26px;
            margin-top: 8px;
            border: 1px solid #f3e5bd;
            box-shadow: 0 6px 14px rgba(110, 70, 10, 0.05);
        }

        .info-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            color: #c49a2b;
            margin-bottom: 18px;
        }

        .detail-row {
            display: flex;
            flex-wrap: wrap;
            padding: 12px 0;
            border-bottom: 1px solid #f4e9cf;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            width: 110px;
            font-weight: 600;
            color: #8b691b;
        }

        .detail-value {
            flex: 1;
            color: #5c4311;
            word-break: break-word;
            font-weight: 500;
        }

        .badge-role {
            background: #fcf2dc;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #b57c1c;
        }

        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #b28b44;
            border-top: 1px solid #f1e4c4;
            padding-top: 16px;
        }

        .error-message {
            color: #c25d2e;
            background: #fff2e6;
            border-radius: 28px;
            padding: 12px 16px;
            margin-top: 16px;
            font-size: 0.85rem;
            font-weight: 500;
            text-align: center;
        }

        @media (max-width: 700px) {
            body { padding: 16px; }
            .tab-content { padding: 22px 18px; }
            .tab-btn { font-size: 1.2rem; }
            .detail-label { width: 90px; }
        }

        @media (max-width: 500px) {
            .detail-row { flex-direction: column; gap: 6px; }
            .detail-label { width: auto; }
            .info-card { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <!-- Tab Buttons -->
    <div class="tabs-header">
        <button class="tab-btn active" data-tab="staff">👤 Staff View</button>
        <button class="tab-btn" data-tab="supervisor">🛡️ Supervisor Tab</button>
    </div>

    <div class="tab-content">
        <!-- STAFF VIEW PANEL -->
        <div id="staffViewPanel" class="view-panel active-panel">
            <div class="field-group">
                <label>📋 Select staff member (password required)</label>
                <select id="staffSelect" class="staff-dropdown"></select>
            </div>
            <div class="info-card">
                <div class="info-title">👁️ STAFF INFORMATION (limited)</div>
                <div id="staffDetailsArea">
                    <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                </div>
                <div class="footer-note">🔒 Password required to view details (numerical only)</div>
            </div>
            <div id="staffErrorMsg" class="error-message" style="display: none;"></div>
        </div>

        <!-- SUPERVISOR VIEW PANEL -->
        <div id="supervisorViewPanel" class="view-panel">
            <div class="field-group">
                <label>🔐 Select staff member (supervisor password required)</label>
                <select id="supervisorSelect" class="staff-dropdown"></select>
            </div>
            <div class="info-card">
                <div class="info-title">🛡️ SUPERVISOR DASHBOARD · full credentials</div>
                <div id="supervisorDetailsArea">
                    <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                    <div class="detail-row"><span class="detail-label">🔑 Password (secret):</span><span class="detail-value">—</span></div>
                </div>
                <div class="footer-note">🛡️ Supervisor view requires password to reveal all fields</div>
            </div>
            <div id="supervisorErrorMsg" class="error-message" style="display: none;"></div>
        </div>
    </div>
</div>

<script type="module">
    // ✅ Import staffList from external staff.js (no inline data)
    import { staffList } from './staff.js';

    // --- Helper: escape HTML for safety ---
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- Get staff object by id ---
    function getStaffById(id) {
        return staffList.find(s => s.id === id);
    }

    // --- Numeric password validation (only digits allowed) ---
    function isValidNumericPassword(input) {
        if (!input) return false;
        return /^\d+$/.test(input.trim());
    }

    // --- Show temporary error message inside a view (auto-hide after 3 sec) ---
    function showError(containerId, message) {
        const errorDiv = document.getElementById(containerId);
        if (!errorDiv) return;
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            if (errorDiv) errorDiv.style.display = 'none';
        }, 2800);
    }

    // --- Clear error message ---
    function clearError(containerId) {
        const errorDiv = document.getElementById(containerId);
        if (errorDiv) errorDiv.style.display = 'none';
    }

    // ----- Staff View logic (limited fields, password popup) -----
    let staffLastValidId = null;      // stores last successfully authenticated staff id for Staff View
    let staffCurrentDisplayedId = null;

    // Update staff view UI with staff data (no password shown)
    function renderStaffView(staff) {
        if (!staff) return;
        const container = document.getElementById('staffDetailsArea');
        if (!container) return;
        const contactDisplay = staff.contact && staff.contact.trim() !== "" ? staff.contact : "📭 Not provided";
        container.innerHTML = `
            <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">${escapeHtml(staff.id)}</span></div>
            <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">${escapeHtml(staff.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value"><span class="badge-role">${escapeHtml(staff.role)}</span></span></div>
            <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">${escapeHtml(contactDisplay)}</span></div>
        `;
        staffCurrentDisplayedId = staff.id;
    }

    // Show empty / placeholder in staff view
    function resetStaffViewToPlaceholder() {
        const container = document.getElementById('staffDetailsArea');
        if (container) {
            container.innerHTML = `
                <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">Full name:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
            `;
        }
        staffCurrentDisplayedId = null;
    }

    // password challenge for staff view
    async function authenticateAndShowStaff(staff, selectElement, previousValidId) {
        clearError('staffErrorMsg');
        if (!staff) return false;
        
        // ask for numeric password
        let userPass = prompt(`🔐 Enter NUMERIC password for ${staff.name}:`, "");
        if (userPass === null) {
            // user cancelled: revert dropdown to previous valid staff (or first if none)
            if (previousValidId) {
                selectElement.value = previousValidId;
            } else {
                // if no previous valid, set to first staff but don't show details
                if (staffList.length) selectElement.value = staffList[0].id;
                resetStaffViewToPlaceholder();
            }
            return false;
        }
        
        userPass = userPass.trim();
        if (!isValidNumericPassword(userPass)) {
            showError('staffErrorMsg', `❌ Invalid format: only numeric digits allowed. Access denied for ${staff.name}.`);
            // revert dropdown
            if (previousValidId) {
                selectElement.value = previousValidId;
            } else {
                if (staffList.length) selectElement.value = staffList[0].id;
                resetStaffViewToPlaceholder();
            }
            return false;
        }
        
        // compare with stored pass (convert both to string for safe compare)
        if (String(userPass) === String(staff.pass)) {
            // success: render details and update last valid
            renderStaffView(staff);
            staffLastValidId = staff.id;
            return true;
        } else {
            showError('staffErrorMsg', `🔒 Wrong password for ${staff.name}. Access denied.`);
            if (previousValidId) {
                selectElement.value = previousValidId;
            } else {
                if (staffList.length) selectElement.value = staffList[0].id;
                resetStaffViewToPlaceholder();
            }
            return false;
        }
    }

    // ----- Supervisor View logic (full details + password) -----
    let supervisorLastValidId = null;
    let supervisorCurrentDisplayedId = null;

    function renderSupervisorView(staff) {
        if (!staff) return;
        const container = document.getElementById('supervisorDetailsArea');
        if (!container) return;
        const contactDisplay = staff.contact && staff.contact.trim() !== "" ? staff.contact : "📭 Not provided";
        const passValue = staff.pass ? staff.pass : "❌ no pass set";
        container.innerHTML = `
            <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">${escapeHtml(staff.id)}</span></div>
            <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">${escapeHtml(staff.name)}</span></div>
            <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value"><strong>${escapeHtml(staff.role)}</strong></span></div>
            <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">${escapeHtml(contactDisplay)}</span></div>
            <div class="detail-row"><span class="detail-label">🔑 Password (secret):</span><span class="detail-value"><code>${escapeHtml(passValue)}</code></span></div>
        `;
        supervisorCurrentDisplayedId = staff.id;
    }

    function resetSupervisorViewToPlaceholder() {
        const container = document.getElementById('supervisorDetailsArea');
        if (container) {
            container.innerHTML = `
                <div class="detail-row"><span class="detail-label">ID:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">Name:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">Role:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">Contact:</span><span class="detail-value">—</span></div>
                <div class="detail-row"><span class="detail-label">🔑 Password:</span><span class="detail-value">—</span></div>
            `;
        }
        supervisorCurrentDisplayedId = null;
    }

    async function authenticateAndShowSupervisor(staff, selectElement, previousValidId) {
        clearError('supervisorErrorMsg');
        if (!staff) return false;
        
        let userPass = prompt(`🛡️ Supervisor access · Enter NUMERIC password for ${staff.name}:`, "");
        if (userPass === null) {
            if (previousValidId) {
                selectElement.value = previousValidId;
            } else {
                if (staffList.length) selectElement.value = staffList[0].id;
                resetSupervisorViewToPlaceholder();
            }
            return false;
        }
        
        userPass = userPass.trim();
        if (!isValidNumericPassword(userPass)) {
            showError('supervisorErrorMsg', `❌ Only numeric password allowed. Access denied for ${staff.name}.`);
            if (previousValidId) {
                selectElement.value = previousValidId;
            } else {
                if (staffList.length) selectElement.value = staffList[0].id;
                resetSupervisorViewToPlaceholder();
            }
            return false;
        }
        
        if (String(userPass) === String(staff.pass)) {
            renderSupervisorView(staff);
            supervisorLastValidId = staff.id;
            return true;
        } else {
            showError('supervisorErrorMsg', `🔒 Wrong password for ${staff.name}. Supervisor access denied.`);
            if (previousValidId) {
                selectElement.value = previousValidId;
            } else {
                if (staffList.length) selectElement.value = staffList[0].id;
                resetSupervisorViewToPlaceholder();
            }
            return false;
        }
    }

    // --- Populate dropdown with ONLY staff name (no extra ID/role) ---
    function populateDropdownOnlyName(selectElement, staffArray) {
        if (!selectElement) return;
        selectElement.innerHTML = '';
        staffArray.forEach(staff => {
            const option = document.createElement('option');
            option.value = staff.id;
            option.textContent = staff.name;   // only staff name
            selectElement.appendChild(option);
        });
        if (staffArray.length) selectElement.selectedIndex = 0;
    }

    // --- Setup Staff View with password-on-change ---
    function setupStaffView() {
        const staffDropdown = document.getElementById('staffSelect');
        if (!staffDropdown) return;
        
        // initial population
        populateDropdownOnlyName(staffDropdown, staffList);
        
        // set initial placeholder (no details shown until password)
        resetStaffViewToPlaceholder();
        
        // if there is at least one staff, store the default value but do NOT show details without password
        if (staffList.length) {
            staffLastValidId = null;   // no valid authentication yet
            const firstId = staffList[0].id;
            staffDropdown.value = firstId;
            // do NOT auto-display – stay placeholder until user selects (or if they select we challenge)
            // but we need to handle initial placeholder: keep empty
            resetStaffViewToPlaceholder();
        }
        
        // handle change event: password popup
        staffDropdown.addEventListener('change', async (e) => {
            const selectedId = e.target.value;
            const selectedStaff = getStaffById(selectedId);
            if (!selectedStaff) return;
            
            // previous valid ID (if any authenticated before)
            const prevValid = staffLastValidId;
            
            // call password authentication
            const success = await authenticateAndShowStaff(selectedStaff, staffDropdown, prevValid);
            if (!success) {
                // on failure, dropdown value already reverted inside authenticateAndShowStaff
                // but we ensure consistency: if lastValidId exists, we may have reverted to that.
                // additionally, if no previous valid at all, we revert to first staff id? but we already reverted in function.
                // Sync lastvalid display:
                if (staffLastValidId) {
                    const validStaff = getStaffById(staffLastValidId);
                    if (validStaff) renderStaffView(validStaff);
                    staffDropdown.value = staffLastValidId;
                } else {
                    resetStaffViewToPlaceholder();
                    // ensure dropdown points to first staff (but not displayed)
                    if (staffList.length && !staffLastValidId) {
                        staffDropdown.value = staffList[0].id;
                    }
                }
            } else {
                // success: details already rendered, lastValidId updated
                // no further action
            }
        });
    }
    
    // --- Setup Supervisor View with password challenge ---
    function setupSupervisorView() {
        const supervisorDropdown = document.getElementById('supervisorSelect');
        if (!supervisorDropdown) return;
        
        populateDropdownOnlyName(supervisorDropdown, staffList);
        resetSupervisorViewToPlaceholder();
        
        if (staffList.length) {
            supervisorLastValidId = null;
            supervisorDropdown.value = staffList[0].id;
            resetSupervisorViewToPlaceholder();
        }
        
        supervisorDropdown.addEventListener('change', async (e) => {
            const selectedId = e.target.value;
            const selectedStaff = getStaffById(selectedId);
            if (!selectedStaff) return;
            
            const prevValid = supervisorLastValidId;
            const success = await authenticateAndShowSupervisor(selectedStaff, supervisorDropdown, prevValid);
            if (!success) {
                if (supervisorLastValidId) {
                    const validStaff = getStaffById(supervisorLastValidId);
                    if (validStaff) renderSupervisorView(validStaff);
                    supervisorDropdown.value = supervisorLastValidId;
                } else {
                    resetSupervisorViewToPlaceholder();
                    if (staffList.length && !supervisorLastValidId) {
                        supervisorDropdown.value = staffList[0].id;
                    }
                }
            } else {
                // password ok, already rendered
            }
        });
    }
    
    // --- Tab switching (iPad friendly) ---
    function initTabs() {
        const tabBtns = document.querySelectorAll('.tab-btn');
        const staffPanel = document.getElementById('staffViewPanel');
        const supervisorPanel = document.getElementById('supervisorViewPanel');
        
        function switchTab(tabId) {
            if (tabId === 'staff') {
                staffPanel.classList.add('active-panel');
                supervisorPanel.classList.remove('active-panel');
                tabBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector('.tab-btn[data-tab="staff"]').classList.add('active');
            } else if (tabId === 'supervisor') {
                supervisorPanel.classList.add('active-panel');
                staffPanel.classList.remove('active-panel');
                tabBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector('.tab-btn[data-tab="supervisor"]').classList.add('active');
            }
        }
        
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                if (tabName === 'staff') switchTab('staff');
                if (tabName === 'supervisor') switchTab('supervisor');
            });
        });
    }
    
    // --- Initialize everything once DOM ready ---
    document.addEventListener('DOMContentLoaded', () => {
        if (!staffList || staffList.length === 0) {
            console.warn("staffList is empty or not loaded correctly from staff.js");
            // show fallback message in both panels
            document.getElementById('staffDetailsArea').innerHTML = '<div class="detail-row">⚠️ No staff data loaded. Check staff.js</div>';
            document.getElementById('supervisorDetailsArea').innerHTML = '<div class="detail-row">⚠️ No staff data loaded. Check staff.js</div>';
            return;
        }
        setupStaffView();
        setupSupervisorView();
        initTabs();
    });
</script>
</body>
</html>
