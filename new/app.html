<!-- app.html – The login page markup (no scripts) -->
<div class="login-card" id="app">
  <!-- Brand -->
  <div class="brand">
    <div class="logo">✦ LineManager</div>
    <div class="sub">secure · simple · fast</div>
  </div>

  <!-- Toggle -->
  <div class="toggle-group" role="tablist">
    <button class="toggle-btn active" data-tab="password" role="tab" aria-selected="true">
      🔑 Username &amp; Password
    </button>
    <button class="toggle-btn" data-tab="linecode" role="tab" aria-selected="false">
      📟 Line Code
    </button>
  </div>

  <!-- Panel 1: Email + Password -->
  <div class="form-panel active" id="panel-password" role="tabpanel">
    <form id="form-password" autocomplete="off">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="login-btn" id="btn-password">
        <span class="btn-text">Sign In</span>
        <span class="spinner"></span>
      </button>
    </form>
    <div id="msg-password" class="message"></div>
    <div class="footer-link">
      Don't have an account? <a href="signup.html" id="signup-link">Create one <span class="signup-badge">new</span></a>
    </div>
  </div>

  <!-- Panel 2: Line Code (Pattern) -->
  <div class="form-panel" id="panel-linecode" role="tabpanel">
    <form id="form-linecode" autocomplete="off">
      <div class="form-group">
        <label for="user-select">Select User</label>
        <select id="user-select" required>
          <option value="">— choose a user —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Draw your line code pattern</label>
        <div class="pattern-wrapper">
          <div class="pattern-container" id="patternContainer">
            <div class="pattern-grid" id="patternGrid"></div>
            <svg class="pattern-svg" id="patternSvg"></svg>
          </div>
          <div class="pattern-status" id="patternStatus">Connect at least 4 dots</div>
          <button type="button" class="clear-pattern-btn" id="clearPatternBtn">✕ clear pattern</button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="btn-linecode">
        <span class="btn-text">Authenticate with Pattern</span>
        <span class="spinner"></span>
      </button>
    </form>
    <div id="msg-linecode" class="message"></div>
    <div class="footer-link">
      <span style="color:rgba(255,255,255,0.2);">draw a pattern · 3×3 grid</span>
    </div>
  </div>
</div>
