<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koveli Lounge · AI Insight Report & Analysis</title>
    <!-- Firebase SDKs (required for data) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- External config (your existing files) -->
    <script src="fire.js"></script>
    <script src="config.js"></script>
    <!-- Chart.js + GSAP + PDF libs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300,400,500,600,700,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #d4a86a 0%, #c9964e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .admin-panel { background: rgba(255,250,240,0.98); border-radius: 48px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); overflow: hidden; margin-bottom: 30px; }
        .insight-header { background: linear-gradient(135deg, #2c3e2f, #1e2a1c); padding: 30px 40px; color: #ffd966; border-bottom: 3px solid #d4a017; }
        .insight-header h1 { font-size: 2rem; display: flex; align-items: center; gap: 15px; }
        .date-range-bar { background: #fff8ed; padding: 18px 30px; display: flex; flex-wrap: wrap; align-items: center; gap: 20px; border-bottom: 1px solid #f0e2cd; }
        .filter-group { display: flex; gap: 12px; align-items: center; background: white; padding: 5px 15px; border-radius: 60px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .filter-group label { font-weight: 600; color: #6b4c1a; }
        input, select { padding: 8px 14px; border-radius: 40px; border: 1px solid #e2d5bc; background: white; }
        .btn-gold { background: #d4a017; border: none; padding: 8px 20px; border-radius: 40px; color: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-gold:hover { background: #b8860b; transform: scale(0.98); }
        .btn-outline { background: transparent; border: 2px solid #d4a017; color: #8b6914; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .insight-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; padding: 30px; }
        .insight-card { background: white; border-radius: 28px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: all 0.2s; border: 1px solid #f0e2cd; }
        .insight-card h3 { font-size: 1.3rem; margin-bottom: 15px; color: #5e3a0c; border-left: 5px solid #d4a017; padding-left: 15px; }
        .metric-big { font-size: 2.2rem; font-weight: 800; color: #d4a017; margin: 10px 0; }
        .ai-insight { background: #fef7e8; padding: 18px; border-radius: 24px; margin-top: 12px; border-left: 4px solid #e6b422; font-style: italic; color: #4a3a1a; }
        .category-badge { display: inline-block; background: #f0e6d2; border-radius: 50px; padding: 6px 14px; font-size: 0.75rem; margin: 4px; }
        .positive { color: #2e7d32; font-weight: 700; }
        .warning { color: #c62828; }
        .chart-container { height: 180px; margin: 15px 0; }
        .feedback-quote { background: #faf5e6; padding: 12px; border-radius: 20px; margin-top: 10px; font-size: 0.85rem; border-left: 3px solid #c9964e; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .export-btn { background: #2c3e2f; color: #ffd966; border: none; padding: 10px 20px; border-radius: 40px; margin: 10px 20px; cursor: pointer; }
        @media (max-width: 700px) { .insight-grid { padding: 15px; } .insight-header h1 { font-size: 1.4rem; } }
        .loading-spinner { text-align: center; padding: 60px; color: #fff; }
    </style>
</head>
<body>
<div class="container" id="reportContainer">
    <div class="admin-panel">
        <div class="insight-header">
            <h1><i class="fas fa-brain"></i> Koveli Lounge · AI-Driven Experience Analysis</h1>
            <p style="color:#f5e6c8;">Real‑time sentiment & performance intelligence — powered by guest feedback</p>
        </div>
        <div class="date-range-bar">
            <div class="filter-group"><i class="fas fa-calendar-week"></i><label>From:</label><input type="date" id="reportFromDate"></div>
            <div class="filter-group"><label>To:</label><input type="date" id="reportToDate"></div>
            <button id="applyReportFilterBtn" class="btn-gold"><i class="fas fa-chart-line"></i> Refresh Analysis</button>
            <button id="exportReportPdfBtn" class="btn-outline"><i class="fas fa-file-pdf"></i> Export Report</button>
            <span id="filterStatsBadge" style="margin-left: auto; background:#e8ddc8; padding:6px 16px; border-radius:60px; font-size:0.8rem;"></span>
        </div>
        <div id="insightContentArea">
            <div class="loading-spinner"><i class="fas fa-spinner fa-pulse fa-3x"></i><br>Loading intelligent analysis...</div>
        </div>
    </div>
    <footer style="text-align:center; color:rgba(255,250,240,0.9); margin-top:20px;">✨ Koveli Lounge · AI Interpretation of Guest Journey ✨</footer>
</div>

<script>
    // ----------------------------- GLOBALS -----------------------------
    let db = null, firestoreReady = false;
    let allQuestions = [], categories = [];
    let currentFilter = { fromDate: null, toDate: null };
    let chartsCache = {};

    // Firebase init (compat)
    if (typeof firebase !== 'undefined' && firebase.apps.length && firebase.apps[0]) {
        try { db = firebase.firestore(); firestoreReady = true; } catch(e) { console.warn(e); }
    }

    // Helper: escape HTML
    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // Load questions & config
    async function loadQuestionsAndConfig() {
        if (!firestoreReady) return [];
        const snap = await db.collection('surveyQuestions').orderBy('order', 'asc').get();
        const qs = [];
        snap.forEach(doc => qs.push({ id: doc.id, ...doc.data(), category: doc.data().category || 'General', order: doc.data().order || 0 }));
        allQuestions = qs;
        // load categories
        const catDoc = await db.collection('surveyConfig').doc('categories').get();
        if (catDoc.exists) categories = catDoc.data().list || [];
        else categories = ['General'];
        return allQuestions;
    }

    // Fetch responses with date filter
    async function fetchResponsesWithFilter(fromDate, toDate) {
        if (!firestoreReady) return [];
        let query = db.collection('surveyResponses');
        if (fromDate) {
            const from = new Date(fromDate);
            from.setHours(0,0,0,0);
            query = query.where('submittedAt', '>=', from.toISOString());
        }
        if (toDate) {
            const to = new Date(toDate);
            to.setHours(23,59,59,999);
            query = query.where('submittedAt', '<=', to.toISOString());
        }
        const snap = await query.get();
        const responses = [];
        snap.forEach(doc => responses.push({ id: doc.id, ...doc.data() }));
        return responses;
    }

    // ----- AI ANALYSIS ENGINE (rule-based + statistical + sentiment) -----
    function generateAIAnalysis(responses, questions) {
        if (!responses.length) {
            return { summary: "No feedback data available for the selected period. Please collect more responses to generate insights.", recommendations: ["Launch guest engagement campaign", "Add QR code at lounge exits"], topStrengths: [], improvementZones: [] };
        }
        // Build mapping questionId -> question object
        const qMap = new Map();
        questions.forEach(q => qMap.set(q.id, q));

        // Aggregate numeric ratings & text feedback per category
        const categoryScores = {};      // { category: { sum, count, texts: [] } }
        const categoryBreakdown = {};
        const allTextFeedback = [];

        for (let resp of responses) {
            const respArr = resp.responses || [];
            for (let r of respArr) {
                const q = qMap.get(r.questionId);
                if (!q) continue;
                const cat = q.category || 'General';
                if (!categoryScores[cat]) { categoryScores[cat] = { sum: 0, count: 0, texts: [] }; }
                // numeric conversion if rating or smiley
                let numeric = null;
                if (q.type === 'rating' && !isNaN(parseFloat(r.value))) numeric = parseFloat(r.value);
                if (q.type === 'smiley') {
                    const smileyMap = { 'very-poor': 1, 'poor': 2, 'average': 3, 'good': 4, 'excellent': 5 };
                    numeric = smileyMap[r.value?.toLowerCase()] || null;
                }
                if (numeric !== null) {
                    categoryScores[cat].sum += numeric;
                    categoryScores[cat].count += 1;
                }
                // collect textual feedback (short/long/dropdown)
                if (q.type === 'short_text' || q.type === 'long_text') {
                    if (r.value && r.value.trim().length > 0) {
                        categoryScores[cat].texts.push({ text: r.value, questionText: q.text });
                        allTextFeedback.push({ category: cat, text: r.value, question: q.text });
                    }
                }
                if (q.type === 'dropdown' && r.value && r.value.trim()) {
                    categoryScores[cat].texts.push({ text: r.value, questionText: q.text });
                    allTextFeedback.push({ category: cat, text: r.value, question: q.text });
                }
            }
        }

        // Compute average per category
        const avgPerCategory = [];
        for (let [cat, data] of Object.entries(categoryScores)) {
            const avg = data.count > 0 ? (data.sum / data.count) : 0;
            avgPerCategory.push({ category: cat, avgScore: avg, feedbackCount: data.count, texts: data.texts.slice(0, 5) });
        }
        avgPerCategory.sort((a,b) => b.avgScore - a.avgScore);
        const topStrengths = avgPerCategory.filter(c => c.avgScore >= 4.2).slice(0, 3);
        const improvementZones = avgPerCategory.filter(c => c.avgScore <= 3.5).slice(0, 3);
        
        // overall NPS-like mood (average rating)
        let totalScore = 0, totalCount = 0;
        avgPerCategory.forEach(c => { totalScore += c.avgScore * c.feedbackCount; totalCount += c.feedbackCount; });
        const globalAvg = totalCount > 0 ? (totalScore / totalCount) : 0;
        let sentimentLevel = globalAvg >= 4.2 ? "Excellent 🌟" : (globalAvg >= 3.5 ? "Good 😊" : (globalAvg >= 2.8 ? "Average 😐" : "Needs Improvement ⚠️"));
        
        // Extract key themes from text (simple keyword spotting)
        const keywordMap = { "clean":0, "comfort":0, "staff":0, "service":0, "food":0, "drink":0, "ambience":0, "wi-fi":0, "delay":0, "crowded":0, "friendly":0 };
        allTextFeedback.forEach(item => {
            const txt = item.text.toLowerCase();
            for (let kw of Object.keys(keywordMap)) {
                if (txt.includes(kw)) keywordMap[kw]++;
            }
        });
        const topKeywords = Object.entries(keywordMap).filter(([k,v]) => v>0).sort((a,b)=>b[1]-a[1]).slice(0,5).map(kv => kv[0]);
        
        // generate dynamic recommendations
        let recommendations = [];
        if (globalAvg < 3.2) recommendations.push("🔧 Prioritize service training & address cleanliness gaps — low overall sentiment detected.");
        if (improvementZones.some(z => z.category.toLowerCase().includes('clean'))) recommendations.push("🧼 Deep cleaning protocol: enhance visibility of hygiene measures in lounge.");
        if (improvementZones.some(z => z.category.toLowerCase().includes('food'))) recommendations.push("🍽️ Refresh menu variety & quality — recent feedback indicates food experience below expectations.");
        if (topKeywords.includes('crowded')) recommendations.push("👥 Manage peak hour crowding: consider capacity alerts or express zones.");
        if (topKeywords.includes('wi-fi')) recommendations.push("📶 Boost Wi-Fi bandwidth & promote fast connectivity as key amenity.");
        if (responses.length > 10 && globalAvg >= 4.0) recommendations.push("🏆 Leverage strengths: feature top-rated categories in marketing (e.g., Staff Excellence).");
        if (recommendations.length === 0) recommendations.push("✨ Continue maintaining high standards. Use guest shout-outs to motivate team.");
        
        // extract best & worst textual comments for illustration
        let positiveComments = [], criticalComments = [];
        allTextFeedback.forEach(f => {
            if (f.text.toLowerCase().includes('amazing') || f.text.toLowerCase().includes('excellent') || f.text.toLowerCase().includes('love')) 
                positiveComments.push(f.text.slice(0, 120));
            else if (f.text.toLowerCase().includes('bad') || f.text.toLowerCase().includes('poor') || f.text.toLowerCase().includes('disappoint'))
                criticalComments.push(f.text.slice(0, 120));
        });
        positiveComments = [...new Set(positiveComments)].slice(0, 2);
        criticalComments = [...new Set(criticalComments)].slice(0, 2);
        
        return {
            summary: `Based on ${responses.length} guest feedback entries, the overall lounge experience score is ${globalAvg.toFixed(1)}/5 (${sentimentLevel}). ${topStrengths.length} categories exceed expectations, while ${improvementZones.length} areas show potential uplift.`,
            globalAvg: globalAvg,
            totalResponses: responses.length,
            topStrengths: topStrengths,
            improvementZones: improvementZones,
            recommendations: recommendations,
            avgPerCategory: avgPerCategory,
            topKeywords: topKeywords,
            positiveComments: positiveComments,
            criticalComments: criticalComments,
            allTextSamples: allTextFeedback.slice(0, 6)
        };
    }
    
    // RENDER FULL AI INSIGHT DASHBOARD
    async function renderInsightDashboard() {
        const container = document.getElementById('insightContentArea');
        if (!container) return;
        container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse fa-2x"></i> Analyzing feedback with AI layer...</div>';
        
        await loadQuestionsAndConfig();
        const fromVal = currentFilter.fromDate;
        const toVal = currentFilter.toDate;
        const responses = await fetchResponsesWithFilter(fromVal, toVal);
        const analysis = generateAIAnalysis(responses, allQuestions);
        
        // Update stats badge
        const badgeSpan = document.getElementById('filterStatsBadge');
        if (badgeSpan) {
            if (fromVal || toVal) badgeSpan.innerHTML = `<i class="fas fa-filter"></i> ${analysis.totalResponses} responses (filtered)`;
            else badgeSpan.innerHTML = `<i class="fas fa-globe"></i> ${analysis.totalResponses} total responses`;
        }
        
        // Build HTML
        let html = `<div class="insight-grid">`;
        // Card 1: Overall health
        html += `<div class="insight-card">
            <h3><i class="fas fa-chart-simple"></i> Overall Experience Score</h3>
            <div class="metric-big">${analysis.globalAvg ? analysis.globalAvg.toFixed(1) : '—'}/5.0</div>
            <div>Based on ${analysis.totalResponses} submissions</div>
            <div class="ai-insight"><i class="fas fa-robot"></i> <strong>AI Summary:</strong> ${analysis.summary}</div>
        </div>`;
        
        // Card 2: Top strengths
        html += `<div class="insight-card">
            <h3><i class="fas fa-trophy"></i> Top Performing Categories</h3>`;
        if (analysis.topStrengths.length) {
            analysis.topStrengths.forEach(s => {
                html += `<div class="flex-between"><span><i class="fas fa-star" style="color:#ffc107;"></i> ${escapeHtml(s.category)}</span><span class="positive">${s.avgScore.toFixed(1)} ★</span></div>`;
            });
        } else { html += `<div class="ai-insight">No category above 4.2 yet, focus on quick wins.</div>`; }
        html += `</div>`;
        
        // Card 3: Improvement zones
        html += `<div class="insight-card">
            <h3><i class="fas fa-chart-line"></i> Priority Improvements</h3>`;
        if (analysis.improvementZones.length) {
            analysis.improvementZones.forEach(z => {
                html += `<div class="flex-between"><span><i class="fas fa-exclamation-triangle" style="color:#c62828;"></i> ${escapeHtml(z.category)}</span><span class="warning">${z.avgScore.toFixed(1)}/5</span></div>`;
            });
        } else { html += `<div class="ai-insight">✨ All categories above 3.5 — maintain excellence!</div>`; }
        html += `</div>`;
        
        // Card 4: Keyword insights (top themes)
        html += `<div class="insight-card">
            <h3><i class="fas fa-hashtag"></i> Guest Voice Themes</h3>
            <div>${analysis.topKeywords.map(k => `<span class="category-badge"><i class="fas fa-comment"></i> ${k}</span>`).join('')}</div>
            <div class="ai-insight" style="margin-top:12px;"><i class="fas fa-lightbulb"></i> Most frequent mentions: ${analysis.topKeywords.slice(0,3).join(', ') || "collect more text feedback"}</div>
        </div>`;
        
        // Card 5: AI Recommendations
        html += `<div class="insight-card">
            <h3><i class="fas fa-list-check"></i> Actionable Recommendations</h3>
            <ul style="margin-left: 20px; margin-top: 10px;">${analysis.recommendations.map(rec => `<li style="margin-bottom: 8px;">${rec}</li>`).join('')}</ul>
        </div>`;
        
        // Card 6: Guest quotes (qualitative)
        html += `<div class="insight-card">
            <h3><i class="fas fa-quote-left"></i> Guest Voices</h3>`;
        if (analysis.positiveComments.length) {
            html += `<div><strong>👍 Positive highlights:</strong></div>`;
            analysis.positiveComments.forEach(q => html += `<div class="feedback-quote">“${escapeHtml(q)}”</div>`);
        }
        if (analysis.criticalComments.length) {
            html += `<div style="margin-top:12px;"><strong>⚠️ Areas heard:</strong></div>`;
            analysis.criticalComments.forEach(q => html += `<div class="feedback-quote" style="border-left-color:#c62828;">“${escapeHtml(q)}”</div>`);
        }
        if (!analysis.positiveComments.length && !analysis.criticalComments.length) html += `<div class="ai-insight">Encourage open-ended feedback to unlock deeper insights.</div>`;
        html += `</div>`;
        
        // Card 7: Category performance chart (visual summary)
        html += `<div class="insight-card" style="grid-column: span 2;">
            <h3><i class="fas fa-chart-column"></i> Category Performance Heatmap</h3>
            <div class="chart-container"><canvas id="categoryPerformanceChart" width="400" height="180"></canvas></div>
            <div class="ai-insight">Categories scoring below 3.5 require immediate supervisor review. Focus on high-impact drivers.</div>
        </div>`;
        
        html += `</div>`;
        container.innerHTML = html;
        
        // Render chart after DOM ready
        if (analysis.avgPerCategory.length) {
            const ctx = document.getElementById('categoryPerformanceChart')?.getContext('2d');
            if (ctx) {
                if (chartsCache.categoryChart) chartsCache.categoryChart.destroy();
                const labels = analysis.avgPerCategory.map(c => c.category);
                const data = analysis.avgPerCategory.map(c => c.avgScore);
                chartsCache.categoryChart = new Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'Average Rating (1-5)', data: data, backgroundColor: '#d4a017', borderRadius: 8 }] },
                    options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: 1, max: 5, title: { display: true, text: 'Score' } } } }
                });
            }
        }
        
        // Add textual sample analysis
        if (analysis.allTextSamples.length) {
            const textInsightDiv = document.createElement('div');
            textInsightDiv.className = 'insight-card';
            textInsightDiv.style.margin = '0 30px 30px 30px';
            textInsightDiv.innerHTML = `<h3><i class="fas fa-message"></i> Recent verbatim insights</h3><div style="max-height:200px; overflow-y:auto;">`;
            analysis.allTextSamples.slice(0, 5).forEach(sample => {
                textInsightDiv.innerHTML += `<div class="feedback-quote"><strong>📌 ${escapeHtml(sample.question)}</strong><br>“${escapeHtml(sample.text.substring(0, 180))}”</div>`;
            });
            textInsightDiv.innerHTML += `</div>`;
            container.appendChild(textInsightDiv);
        }
    }
    
    // PDF export function (export insight area)
    async function exportInsightToPDF() {
        const element = document.getElementById('insightContentArea');
        if (!element) return;
        try {
            const { jsPDF } = window.jspdf;
            const canvas = await html2canvas(element, { scale: 2, backgroundColor: '#fffaf2', logging: false });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p', 'mm', 'a4');
            const imgWidth = 190;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
            pdf.save(`Koveli_Lounge_AI_Report_${new Date().toISOString().slice(0,19)}.pdf`);
        } catch(err) { alert('PDF generation failed, but data is available.'); }
    }
    
    // attach filter events
    function initFilters() {
        const fromInput = document.getElementById('reportFromDate');
        const toInput = document.getElementById('reportToDate');
        const applyBtn = document.getElementById('applyReportFilterBtn');
        const exportBtn = document.getElementById('exportReportPdfBtn');
        if (fromInput && toInput && applyBtn) {
            applyBtn.addEventListener('click', () => {
                currentFilter.fromDate = fromInput.value || null;
                currentFilter.toDate = toInput.value || null;
                renderInsightDashboard();
            });
        }
        if (exportBtn) exportBtn.addEventListener('click', exportInsightToPDF);
        // set default filter last 30 days? optional
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        if (!fromInput.value) fromInput.value = thirtyDaysAgo.toISOString().slice(0,10);
        if (!toInput.value) toInput.value = today.toISOString().slice(0,10);
        currentFilter.fromDate = fromInput.value;
        currentFilter.toDate = toInput.value;
    }
    
    // Device auth simulation (since we are inside report, we skip full device lock but ensure firebase ready)
    async function startReport() {
        if (!firestoreReady) {
            document.getElementById('insightContentArea').innerHTML = '<div class="loading-spinner" style="color:#3e2a1a;">⚠️ Firebase not connected. Please check configuration (fire.js/config.js).</div>';
            return;
        }
        initFilters();
        await renderInsightDashboard();
    }
    
    // Check if firebase is ready after small delay
    window.addEventListener('DOMContentLoaded', () => {
        // If firestore not ready after 1sec, try alternative
        const checkFirebase = setInterval(() => {
            if (typeof firebase !== 'undefined' && firebase.apps.length) {
                if (!db) { try { db = firebase.firestore(); firestoreReady = true; } catch(e) {} }
                if (firestoreReady) {
                    clearInterval(checkFirebase);
                    startReport();
                }
            } else if (document.readyState === 'complete') {
                clearInterval(checkFirebase);
                document.getElementById('insightContentArea').innerHTML = '<div class="loading-spinner">⚠️ Firebase SDK not initialized. Ensure fire.js and config.js exist with valid project.</div>';
            }
        }, 300);
        setTimeout(() => { if (!firestoreReady) clearInterval(checkFirebase); }, 5000);
    });
</script>
</body>
</html>
