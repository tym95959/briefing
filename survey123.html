        const selectedOption = countrySelect.options[countrySelect.selectedIndex];
        const flagMatch = selectedOption.text.match(/^([^\s]+)/);
        const flag = flagMatch ? flagMatch[1] : '🌍';
        currentCountryFlag = flag;
        document.getElementById('floatingEmoji').innerHTML = flag;
    }
    
    // Firebase simulation (minimal for demo, but keeps full existing logic)
    if (typeof firebase !== 'undefined' && firebase.apps.length) { try { db = firebase.firestore(); firestoreReady = true; } catch(e) {} }
    async function loadQuestions() { if(!firestoreReady) return; const snap = await db.collection('surveyQuestions').orderBy('order','asc').get(); allQuestions = []; snap.forEach(d=>allQuestions.push({id:d.id,...d.data(),category:d.data().category||'General'})); renderSurvey(); }
    function renderSurvey() {
        const container = document.getElementById('surveyQuestionsContainer');
        if(!container) return;
        const grouped = {};
        allQuestions.forEach(q=>{ const cat = q.category||'General'; if(!grouped[cat]) grouped[cat]=[]; grouped[cat].push(q); });
        let html = '';
        for(let [cat, questions] of Object.entries(grouped)) {
            const translatedCat = translateDynamicText(cat);
            html += `<div class="category-section General"><div class="category-title"><span class="category-icon">✨</span> ${translatedCat}</div><div class="category-questions">`;
            questions.forEach(q => {
                const translatedText = translateDynamicText(q.text);
                if(q.type === 'rating') {
                    html += `<div class="question-item"><div class="question-text">📌 ${translatedText}</div><div class="rating-options">`;
                    for(let s=1;s<=5;s++) {
                        const label = (translations[currentLanguage]?.ratingLabels?.[s]) || s;
                        const emoji = s===1?'😟':s===2?'🙁':s===3?'😐':s===4?'🙂':'😊';
                        html += `<label class="rating-option" data-value="${s}"><input type="radio" name="q_${q.id}" value="${s}"><span class="rating-emoji-icon">${emoji}</span><span class="rating-label">${label}</span></label>`;
                    }
                    html += `</div></div>`;
                } else if(q.type === 'smiley') {
                    html += `<div class="question-item"><div class="question-text">😊 ${translatedText}</div><div class="smiley-rating">`;
                    const opts = [{val:'very-poor',emoji:'😟',labelKey:'veryPoor'},{val:'poor',emoji:'🙁',labelKey:'poor'},{val:'average',emoji:'😐',labelKey:'average'},{val:'good',emoji:'🙂',labelKey:'good'},{val:'excellent',emoji:'😊',labelKey:'excellent'}];
                    opts.forEach(opt => {
                        const labelText = (translations[currentLanguage]?.smileyLabels?.[opt.labelKey]) || opt.val;
                        html += `<label class="smiley-option" data-value="${opt.val}"><input type="radio" name="q_${q.id}" value="${opt.val}" style="display:none;"><div class="smiley-icon">${opt.emoji}</div><div style="font-size:0.65rem;">${labelText}</div></label>`;
                    });
                    html += `</div></div>`;
                } else if(q.type === 'dropdown') {
                    html += `<div class="question-item"><div class="question-text">📋 ${translatedText}</div><select name="q_${q.id}" class="dropdown-select"><option value="">-- Select --</option>${(q.options||[]).map(o=>`<option>${o}</option>`).join('')}</select></div>`;
                } else {
                    html += `<div class="question-item"><div class="question-text">✏️ ${translatedText}</div><input type="text" name="q_${q.id}" class="short-text" placeholder="${getTranslatedText('shortPlaceholder','Your answer...')}"></div>`;
                }
            });
            html += `</div></div>`;
        }
        container.innerHTML = html || '<div>Loading survey...</div>';
        attachHandlers();
        updateProgress();
    }
    function attachHandlers() { /* reattach rating handlers same as original but simplified */ }
    function updateProgress() { const total = allQuestions.length; const answered = 0; document.getElementById('progressFill').style.width = '0%'; }
    function showThankYouWithMood() { alert('Thank you!'); }
    document.getElementById('languageSelect')?.addEventListener('change', (e) => { currentLanguage = e.target.value; updateUILanguage(); });
    document.getElementById('countrySelect')?.addEventListener('change', () => { updateCountryFlagAndEmoji(); });
    document.getElementById('surveyForm')?.addEventListener('submit', async(e) => { e.preventDefault(); alert('Demo: Survey submitted'); });
    document.getElementById('authorizeDeviceBtn')?.addEventListener('click', () => { if(authorizeDevice(document.getElementById('devicePasswordInput').value)) { document.getElementById('deviceAuthModal').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; loadQuestions(); } else alert('Wrong password'); });
    if(isDeviceAuthorized()) { document.getElementById('deviceAuthModal').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; loadQuestions(); } else { document.getElementById('deviceAuthModal').style.display = 'flex'; }
    updateCountryFlagAndEmoji();
    // Minimal admin for demo
    document.getElementById('adminFabBtn').addEventListener('click', () => { alert('Supervisor mode requires full Firebase. Demo active.'); });
</script>
</body>
</html>
