<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koveli Lounge Daily Check List | Complete System</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- External Configuration Files (ensure these exist) -->
    <script src="fire.js"></script>
    <script src="config.js"></script>
    <!-- Google Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%); padding: 16px 20px; color: #1a2c3e; min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h1 { font-weight: 700; font-size: 1.3rem; background: linear-gradient(145deg, #1a4c6e, #2c6e8f); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .role-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .role-btn { background: white; border: none; padding: 6px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .role-btn.active { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; }
        .date-bar { background: white; border-radius: 40px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .date-selector input, .date-selector select { padding: 6px 12px; border-radius: 30px; border: 1.5px solid #e2eaf2; font-size: 0.8rem; }
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .status-open { background: #e8f5e9; color: #2e7d32; }
        .status-closed { background: #ffebee; color: #c62828; }
        .reopen-btn, .close-shift-btn { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; border: none; padding: 5px 14px; border-radius: 30px; cursor: pointer; font-size: 0.7rem; }
        .pdf-btn { background: linear-gradient(135deg, #dc3545, #c82333); color: white; border: none; padding: 6px 14px; border-radius: 30px; cursor: pointer; font-size: 0.7rem; }
        .print-btn { background: linear-gradient(135deg, #28a745, #218838); }
        .staff-tabs .tabs-header, .supervisor-tabs .tabs-header { display: flex; gap: 8px; border-bottom: 2px solid #e2eaf2; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 10px 24px; font-size: 0.85rem; font-weight: 600; color: #7c9ab8; cursor: pointer; }
        .tab-btn.active { color: #1d6f8f; background: white; border-bottom: 3px solid #1d6f8f; }
        .staff-tab-content, .tab-content { display: none; }
        .staff-tab-content.active, .tab-content.active { display: block; }
        .task-card, .allocation-card, .break-card, .attendance-view-card, .handover-card, .sod-panel, .allocation-panel, .attendance-panel, .management-panel { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; border: 1px solid #e2eaf2; }
        .card-title, .panel-title, .section-title { font-size: 0.9rem; font-weight: 700; color: #1d6f8f; margin-bottom: 12px; border-left: 3px solid #2c7da0; padding-left: 10px; }
        .allocation-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 600px; }
        .allocation-table th, .allocation-table td { border: 1px solid #e2eaf2; padding: 8px; text-align: center; }
        .staff-name-badge { display: inline-block; background: #eef2fa; padding: 3px 8px; border-radius: 20px; margin: 2px; font-size: 0.7rem; }
        .sod-staff-badge { background: #eef3fc; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; margin: 3px; }
        .sod-staff-badge.selected { background: #1d6f8f; color: white; }
        .task-category { margin-bottom: 20px; border: 1px solid #e2eaf2; border-radius: 16px; overflow: hidden; }
        .category-header { background: #eef3fc; padding: 10px 16px; font-weight: 700; color: #1d6f8f; }
        .task-item { background: #fafdff; padding: 12px; margin-bottom: 8px; border-bottom: 1px solid #eef2f8; }
        .completed-info { background: #e8f5e9; padding: 6px 10px; border-radius: 14px; margin-top: 6px; font-size: 0.7rem; }
        .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .action-select, .action-dropdown { padding: 5px 10px; border-radius: 25px; border: 1.5px solid #e2eaf2; font-size: 0.7rem; }
        .action-btn { background: #4caf50; color: white; border: none; padding: 5px 14px; border-radius: 25px; cursor: pointer; font-weight: 600; font-size: 0.7rem; }
        .btn-primary, .verify-btn { background: #1d6f8f; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-size: 0.75rem; }
        .delete-attendance-btn, .edit-checklist-btn { background: #dc3545; color: white; border: none; border-radius: 20px; padding: 3px 10px; font-size: 0.6rem; cursor: pointer; margin-left: 6px; }
        .edit-checklist-btn { background: #ff9800; }
        .attendance-record { background: #f8fbfe; border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid #e2eaf2; }
        .hidden { display: none; }
        .password-modal, .device-auth-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-box, .device-auth-card { background: white; padding: 24px; border-radius: 28px; width: 320px; text-align: center; }
        .info-text { font-size: 0.65rem; color: #7c9ab8; margin-top: 8px; text-align: center; }
        .handover-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; background: white; border-radius: 12px; }
        .handover-table th, .handover-table td { border: 1px solid #e2eaf2; padding: 6px; }
        .handover-input { width: 100%; padding: 4px 6px; border-radius: 20px; border: 1px solid #ccc; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="container" id="appContainer" style="display: none;">
    <div class="header"><h1><i class="fas fa-clipboard-list"></i> Koveli Lounge Daily Check List</h1><p>Supervisor | Break System | Allocation | Handover Log</p></div>
    <div class="role-bar"><button id="staffRoleBtn" class="role-btn active"><i class="fas fa-user"></i> Staff View</button><button id="supervisorRoleBtn" class="role-btn"><i class="fas fa-user-tie"></i> Supervisor</button></div>
    <div class="date-bar"><div class="date-selector"><input type="date" id="mainDate"><select id="mainShift"><option value="">Select Shift</option><option value="Morning">🌅 Morning</option><option value="Evening">🌙 Evening</option></select></div><div><button id="exportFullPdfBtn" class="pdf-btn"><i class="fas fa-file-pdf"></i> Report</button><button id="printAllocationBtn" class="pdf-btn print-btn"><i class="fas fa-print"></i> Allocation</button></div><div><div id="shiftStatusBadge" class="status-badge status-open">Open</div><button id="closeShiftBtn" class="close-shift-btn hidden">Close Shift</button><button id="reopenShiftBtn" class="reopen-btn hidden">Reopen</button></div></div>
    <div id="staffViewSection"><div class="staff-tabs"><div class="tabs-header"><button class="tab-btn active" data-staff-tab="tasks-staff-tab">Tasks</button><button class="tab-btn" data-staff-tab="allocation-staff-tab">Allocation</button><button class="tab-btn" data-staff-tab="break-staff-tab">Break</button><button class="tab-btn" data-staff-tab="absentees-tab">Absentees</button><button class="tab-btn" data-staff-tab="handover-tab">Handover</button></div><div id="tasks-staff-tab" class="staff-tab-content active"><div class="task-card"><div id="tasksContainer"></div></div></div><div id="allocation-staff-tab" class="staff-tab-content"><div class="allocation-card"><div id="fullAllocationContainer"></div></div></div><div id="break-staff-tab" class="staff-tab-content"><div class="break-card"><div id="breakRequestContainer"></div></div></div><div id="absentees-tab" class="staff-tab-content"><div class="attendance-view-card"><div id="staffAttendanceView"></div></div></div><div id="handover-tab" class="staff-tab-content"><div class="handover-card"><div id="handoverContainer"></div></div></div></div></div>
    <div id="supervisorTabs" class="supervisor-tabs hidden"><div class="tabs-header"><button class="tab-btn active" data-tab="allocation-tab">Allocation/SOD</button><button class="tab-btn" data-tab="attendance-tab">Attendance</button><button class="tab-btn" data-tab="management-tab">Tasks/Staff</button><button class="tab-btn" data-tab="break-approve-tab">Break Approvals</button></div><div id="allocation-tab" class="tab-content active"><div class="sod-panel"><div id="sodStaffList"></div><div id="supervisorSelectPanel"></div></div><div class="allocation-panel"><div id="allocationContainer"></div></div></div><div id="attendance-tab" class="tab-content"><div class="attendance-panel"><div id="attendanceContainer"></div></div></div><div id="management-tab" class="tab-content"><div class="management-panel"><div class="section-title">Manage Tasks</div><select id="taskCategorySelectMgr"></select><input type="text" id="newTaskNameMgr" placeholder="Task Name"><select id="taskTypeSelectMgr"><option value="done">Done</option><option value="acknowledge">Acknowledge</option><option value="dropdown">Dropdown</option></select><select id="taskShiftSelectMgr"><option value="Both">Both</option><option value="Morning">Morning</option><option value="Evening">Evening</option></select><div id="dropdownOptionsDivMgr" style="display:none;"><input type="text" id="dropdownOptionsMgr" placeholder="Option1, Option2"></div><button id="addTaskBtnMgr" class="btn-primary">Add Task</button><div id="taskListManager"></div><div class="section-title">Manage Staff</div><input type="text" id="newStaffNameMgr" placeholder="Staff Name"><button id="addStaffBtnMgr" class="btn-primary">Add Staff</button><div id="staffListManager"></div></div></div><div id="break-approve-tab" class="tab-content"><div class="allocation-panel"><div id="breakRequestsList"></div></div></div></div>
</div>
<div id="passwordModal" class="password-modal hidden"><div class="password-box"><i class="fas fa-lock"></i><h3>Supervisor Access</h3><input type="password" id="supervisorPassword"><button id="verifyPasswordBtn" class="verify-btn">Verify</button><button id="cancelPasswordBtn" class="cancel-btn">Cancel</button><p id="passwordError"></p></div></div>
<div id="deviceAuthModal" class="device-auth-overlay"><div class="device-auth-card"><i class="fas fa-microchip"></i><h2>Device Authorization</h2><input type="password" id="devicePasswordInput"><button id="authorizeDeviceBtn">Authorize</button><div id="deviceAuthError"></div></div></div>

<script>
    const DEVICE_STORAGE_KEY = "koveli_lounge_device_authorized";
    let DEVICE_MASTER_PASSWORD = (typeof MASTER_PASSWORD_GLOBAL !== 'undefined' && MASTER_PASSWORD_GLOBAL) ? MASTER_PASSWORD_GLOBAL : "Admin123";
    function isDeviceAuthorized() { return localStorage.getItem(DEVICE_STORAGE_KEY) === "true"; }
    function authorizeDevice(pwd) { if(pwd === DEVICE_MASTER_PASSWORD) { localStorage.setItem(DEVICE_STORAGE_KEY, "true"); return true; } return false; }
    let db, firestoreReady = false;
    try { if(typeof firebase !== 'undefined' && firebase.apps.length > 0) { db = firebase.firestore(); firestoreReady = true; } } catch(err) { console.error(err); }
    
    let currentRole = "staff", currentDate = new Date().toISOString().slice(0,10), currentShift = "", currentTaskRecord = null, globalTasks = [], staffList = [], sodStaffNames = [], attendanceRecords = [], supervisorList = [], currentSODRecord = null, selectedStaffName = "", isSupervisor = false;
    const MORNING_SLOTS = [{ id:"slot1", name:"07:30-10:30"},{ id:"slot2", name:"10:30-13:30"},{ id:"slot3", name:"13:30-15:30"}];
    const EVENING_SLOTS = [{ id:"slot1", name:"15:30-18:30"},{ id:"slot2", name:"18:30-21:00"},{ id:"slot3", name:"21:00-23:30"}];
    const BREAK_MORNING_SLOTS = ["07:30-08:30","08:30-09:30","09:30-10:30","10:30-11:30","11:30-12:30","12:30-13:30","13:30-14:30","14:30-15:30"];
    const BREAK_EVENING_SLOTS = ["15:30-16:30","16:30-17:30","17:30-18:30","18:30-19:30","19:30-20:30","20:30-21:30","21:30-22:30","22:30-23:30"];
    
    function getTaskRecordId(d,s){ return `tasks_${d}_${s}`.replace(/\s/g,'_'); }
    function getSODStaffRecordId(d,s){ return `sod_staff_${d}_${s}`.replace(/\s/g,'_'); }
    function getSODRecordId(d,s){ return `sod_${d}_${s}`.replace(/\s/g,'_'); }
    function getAttendanceRecordId(d,s){ return `attendance_${d}_${s}`.replace(/\s/g,'_'); }
    function getBreakRecordId(d,s){ return `breaks_${d}_${s}`.replace(/\s/g,'_'); }
    function getSupervisorRecordId(d,s){ return `supervisors_${d}_${s}`.replace(/\s/g,'_'); }
    function getHandoverId(d,s){ return `handover_${d}_${s}`.replace(/\s/g,'_'); }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // Attendance Delete Function
    async function deleteAttendanceRecord(staffName, shiftToDelete) {
        if(!confirm(`Delete attendance record for ${staffName} (${shiftToDelete})? This cannot be undone.`)) return;
        attendanceRecords = attendanceRecords.filter(r => !(r.staffName === staffName && r.shift === shiftToDelete));
        const morningRecords = attendanceRecords.filter(r => r.shift === 'Morning');
        const eveningRecords = attendanceRecords.filter(r => r.shift === 'Evening');
        if(morningRecords.length) await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Morning")).set({records:morningRecords, date:currentDate, shift:"Morning"},{merge:true});
        else await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Morning")).delete().catch(()=>{});
        if(eveningRecords.length) await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Evening")).set({records:eveningRecords, date:currentDate, shift:"Evening"},{merge:true});
        else await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Evening")).delete().catch(()=>{});
        renderAttendanceRecordsList();
        renderStaffAttendanceView();
        alert("Attendance record deleted.");
    }
    
    // Edit Checklist: Acknowledge toggle or Dropdown edit via supervisor
    async function editAcknowledgment(taskId, staffName, currentStatus) {
        if(!currentTaskRecord || currentTaskRecord.status === "closed") { alert("Shift closed"); return; }
        const id = getTaskRecordId(currentDate, currentShift);
        const docRef = db.collection("taskRecords").doc(id);
        const update = await db.runTransaction(async (t) => {
            const doc = await t.get(docRef);
            const data = doc.data();
            let ackTasks = { ...(data.acknowledgedTasks || {}) };
            let acks = [...(ackTasks[taskId] || [])];
            if(currentStatus === "acknowledged") acks = acks.filter(n => n !== staffName);
            else if(!acks.includes(staffName)) acks.push(staffName);
            if(acks.length === 0) delete ackTasks[taskId];
            else ackTasks[taskId] = acks;
            t.update(docRef, { acknowledgedTasks: ackTasks, updatedAt: new Date().toISOString() });
            return acks.includes(staffName);
        });
        await loadTaskRecord();
        alert(update ? `✅ ${staffName} acknowledged.` : `❌ ${staffName} acknowledgment removed.`);
    }
    
    async function editDropdownSubmission(taskId, staffName, oldValue, oldNote, newValue, newNote) {
        if(!currentTaskRecord || currentTaskRecord.status === "closed") { alert("Shift closed"); return; }
        const id = getTaskRecordId(currentDate, currentShift);
        const docRef = db.collection("taskRecords").doc(id);
        await db.runTransaction(async (t) => {
            const doc = await t.get(docRef);
            const data = doc.data();
            let selections = [...(data.dropdownSelections || [])];
            const index = selections.findIndex(s => s.taskId === taskId && s.staffName === staffName && s.selectedValue === oldValue && (s.additionalText || "") === (oldNote || ""));
            if(index !== -1) {
                selections[index] = { ...selections[index], selectedValue: newValue, additionalText: newNote, editedAt: new Date().toISOString() };
                t.update(docRef, { dropdownSelections: selections, updatedAt: new Date().toISOString() });
            } else throw new Error("Entry not found");
        });
        await loadTaskRecord();
        alert("Dropdown entry updated.");
    }
    
    async function loadGlobalTasks(){ const doc=await db.collection("globalConfig").doc("tasks").get(); globalTasks=doc.exists?doc.data().tasks||[]:[]; renderTaskManager(); renderTasks(); }
    async function saveGlobalTasks(tasks){ await db.collection("globalConfig").doc("tasks").set({tasks}); globalTasks=tasks; renderTaskManager(); renderTasks(); }
    async function loadStaff(){ const snap=await db.collection("staff").orderBy("name").get(); staffList=snap.docs.map(d=>({id:d.id,name:d.data().name})); renderStaffManager(); renderSODPanel(); renderAttendanceForm(); }
    async function addStaffMember(name){ if(!name.trim()) return; await db.collection("staff").add({name:name.trim()}); await loadStaff(); document.getElementById('newStaffNameMgr').value=""; }
    async function loadTaskRecord(){ const id=getTaskRecordId(currentDate,currentShift); const doc=await db.collection("taskRecords").doc(id).get(); if(doc.exists) currentTaskRecord={id:doc.id,...doc.data()}; else { currentTaskRecord={date:currentDate,shift:currentShift,status:"open",doneTasks:{},acknowledgedTasks:{},dropdownSelections:[]}; await db.collection("taskRecords").doc(id).set(currentTaskRecord); } updateShiftStatusUI(); renderTasks(); }
    async function loadSODStaff(){ const id=getSODStaffRecordId(currentDate,currentShift); const doc=await db.collection("sodStaffRecords").doc(id).get(); sodStaffNames=doc.exists?doc.data().staffNames||[]:[]; renderSODPanel(); renderBreakUI(); renderSupervisorSelectPanel(); }
    async function saveSODStaff(names){ const id=getSODStaffRecordId(currentDate,currentShift); await db.collection("sodStaffRecords").doc(id).set({staffNames:names,date:currentDate,shift:currentShift}); sodStaffNames=names; renderSODPanel(); renderAllocation(); renderFullAllocation(); renderBreakUI(); }
    async function loadSODAllocation(){ const id=getSODRecordId(currentDate,currentShift); const doc=await db.collection("sodRecords").doc(id).get(); if(doc.exists) currentSODRecord={id:doc.id,...doc.data()}; else currentSODRecord={date:currentDate,shift:currentShift,allocations:{}}; renderAllocation(); renderFullAllocation(); }
    async function loadAttendance(){ attendanceRecords=[]; const morningId=getAttendanceRecordId(currentDate,"Morning"); const eveningId=getAttendanceRecordId(currentDate,"Evening"); const [mDoc,eDoc]=await Promise.all([db.collection("attendanceRecords").doc(morningId).get(),db.collection("attendanceRecords").doc(eveningId).get()]); if(mDoc.exists) attendanceRecords.push(...(mDoc.data().records||[])); if(eDoc.exists) attendanceRecords.push(...(eDoc.data().records||[])); renderAttendanceForm(); renderStaffAttendanceView(); renderAttendanceRecordsList(); }
    async function saveAttendanceRecord(record){ attendanceRecords=attendanceRecords.filter(r=>!(r.staffName===record.staffName && r.shift===record.shift)); attendanceRecords.push(record); const morning=attendanceRecords.filter(r=>r.shift==='Morning'); const evening=attendanceRecords.filter(r=>r.shift==='Evening'); if(morning.length) await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Morning")).set({records:morning,date:currentDate,shift:"Morning"},{merge:true}); else await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Morning")).delete().catch(()=>{}); if(evening.length) await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Evening")).set({records:evening,date:currentDate,shift:"Evening"},{merge:true}); else await db.collection("attendanceRecords").doc(getAttendanceRecordId(currentDate,"Evening")).delete().catch(()=>{}); renderAttendanceRecordsList(); renderStaffAttendanceView(); }
    async function loadSupervisors(){ const id=getSupervisorRecordId(currentDate,currentShift); const doc=await db.collection("supervisorRecords").doc(id).get(); supervisorList=doc.exists?doc.data().supervisors||[]:[]; renderSupervisorSelectPanel(); }
    async function saveSupervisors(sups){ const id=getSupervisorRecordId(currentDate,currentShift); await db.collection("supervisorRecords").doc(id).set({supervisors:sups,date:currentDate,shift:currentShift}); supervisorList=sups; renderSupervisorSelectPanel(); }
    async function completeTask(taskId,staffName){ if(!currentTaskRecord||currentTaskRecord.status==="closed"){alert("Shift closed");return;} const id=getTaskRecordId(currentDate,currentShift); await db.collection("taskRecords").doc(id).update({[`doneTasks.${taskId}`]:{doneBy:staffName,doneAt:new Date().toISOString()},updatedAt:new Date().toISOString()}); await loadTaskRecord(); alert("Task completed"); }
    async function acknowledgeTask(taskId,staffName){ if(!currentTaskRecord||currentTaskRecord.status==="closed"){alert("Shift closed");return;} const id=getTaskRecordId(currentDate,currentShift); const doc=await db.collection("taskRecords").doc(id).get(); let acks=doc.data().acknowledgedTasks?.[taskId]||[]; if(acks.includes(staffName)) acks=acks.filter(n=>n!==staffName); else acks.push(staffName); await db.collection("taskRecords").doc(id).update({[`acknowledgedTasks.${taskId}`]:acks,updatedAt:new Date().toISOString()}); await loadTaskRecord(); alert(acks.includes(staffName)?"Acknowledged":"Removed"); }
    async function submitDropdown(taskId,val,note,staffName){ if(!currentTaskRecord||currentTaskRecord.status==="closed"){alert("Shift closed");return;} const id=getTaskRecordId(currentDate,currentShift); const doc=await db.collection("taskRecords").doc(id).get(); let selections=doc.data().dropdownSelections||[]; const exists=selections.findIndex(s=>s.taskId===taskId&&s.staffName===staffName&&s.selectedValue===val&&(s.additionalText||"")===note); if(exists!==-1) selections.splice(exists,1); else selections.push({taskId,staffName,selectedValue:val,additionalText:note,submittedAt:new Date().toISOString()}); await db.collection("taskRecords").doc(id).update({dropdownSelections:selections,updatedAt:new Date().toISOString()}); await loadTaskRecord(); alert(exists!==-1?"Removed":"Added"); }
    async function closeShift(){ if(currentTaskRecord.status==="closed")return; const id=getTaskRecordId(currentDate,currentShift); await db.collection("taskRecords").doc(id).update({status:"closed",closedAt:new Date().toISOString()}); await loadTaskRecord(); alert("Shift closed"); }
    async function reopenShiftFn(){ const id=getTaskRecordId(currentDate,currentShift); await db.collection("taskRecords").doc(id).update({status:"open"}); await loadTaskRecord(); alert("Shift reopened"); }
    function updateShiftStatusUI(){ const closed=currentTaskRecord?.status==="closed"; document.getElementById('shiftStatusBadge').innerHTML=closed?'Closed':'Open'; document.getElementById('shiftStatusBadge').className=`status-badge ${closed?'status-closed':'status-open'}`; document.getElementById('closeShiftBtn').classList.toggle('hidden',closed); document.getElementById('reopenShiftBtn').classList.toggle('hidden',!closed); }
    
    function renderTasks(){ if(!currentTaskRecord||!globalTasks.length){ document.getElementById('tasksContainer').innerHTML='<div class="empty-msg">Select date/shift</div>'; return; } const filtered=globalTasks.filter(t=>{const ts=t.shift||"Both"; return ts==="Both"||ts===currentShift;}); let html=''; filtered.forEach(task=>{ const done=currentTaskRecord.doneTasks?.[task.id]; const acks=currentTaskRecord.acknowledgedTasks?.[task.id]||[]; const selections=(currentTaskRecord.dropdownSelections||[]).filter(s=>s.taskId===task.id); const isClosed=currentTaskRecord.status==="closed"; html+=`<div class="task-item"><div class="task-header"><strong>${escapeHtml(task.name)}</strong></div>`; if(task.type==='done'){ if(done) html+=`<div class="completed-info">✅ Completed by ${escapeHtml(done.doneBy)}</div>`; else if(!isClosed) html+=`<div class="flex-row"><select id="staffSel_${task.id}" class="action-select">${staffList.map(s=>`<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`).join('')}</select><button class="action-btn do-done" data-id="${task.id}">Complete</button></div>`; else html+=`<div class="completed-info">⏳ Pending</div>`; }
    else if(task.type==='acknowledge'){ html+=`<div class="completed-info">Acknowledged: ${acks.length}/${sodStaffNames.length} (${acks.join(', ')||'none'})</div>`; if(!isClosed && currentRole==="supervisor") html+=`<div class="flex-row"><select id="ackStaff_${task.id}" class="action-select">${sodStaffNames.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}</select><button class="action-btn edit-checklist-btn" data-task="${task.id}" data-type="ack" data-staff-select="ackStaff_${task.id}">Toggle Acknowledge</button></div>`; }
    else if(task.type==='dropdown'){ html+=`<div class="completed-info">Submissions: ${selections.length}</div><div>${selections.map(s=>`<span style="background:#f0f0f0;padding:2px 6px;margin:2px;display:inline-block;">${escapeHtml(s.staffName)}: ${escapeHtml(s.selectedValue)}${s.additionalText?` (${escapeHtml(s.additionalText)})`:''}</span>`).join('')}</div>`; if(!isClosed && currentRole==="supervisor") html+=`<div class="flex-row"><select id="dropStaff_${task.id}" class="action-select">${staffList.map(s=>`<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`).join('')}</select><input id="dropVal_${task.id}" placeholder="Value"><input id="dropNote_${task.id}" placeholder="Note"><button class="action-btn edit-checklist-btn" data-task="${task.id}" data-type="dropdown" data-staff-select="dropStaff_${task.id}" data-val="dropVal_${task.id}" data-note="dropNote_${task.id}">Update/Create</button></div>`; }
    html+=`</div>`; }); document.getElementById('tasksContainer').innerHTML=html; document.querySelectorAll('.do-done').forEach(btn=>btn.addEventListener('click',()=>completeTask(btn.dataset.id,document.getElementById(`staffSel_${btn.dataset.id}`).value))); document.querySelectorAll('.edit-checklist-btn').forEach(btn=>btn.addEventListener('click',async()=>{ const taskId=btn.dataset.task, type=btn.dataset.type; if(type==='ack'){ const staff=document.getElementById(btn.dataset.staffSelect).value; if(staff) await acknowledgeTask(taskId,staff); } else if(type==='dropdown'){ const staff=document.getElementById(btn.dataset.staffSelect).value, val=document.getElementById(btn.dataset.val).value, note=document.getElementById(btn.dataset.note).value; if(staff&&val) await submitDropdown(taskId,val,note,staff); } })); }
    
    function renderAttendanceForm(){ const container=document.getElementById('attendanceContainer'); if(!container) return; container.innerHTML=`<div class="attendance-form"><select id="attStaffSelect">${staffList.map(s=>`<option>${escapeHtml(s.name)}</option>`).join('')}</select><select id="attShiftSelect"><option value="Morning">Morning</option><option value="Evening">Evening</option></select><select id="attStatusSelect"><option value="Absent">Absent</option><option value="SL">Sick Leave</option><option value="FRL">FRL</option><option value="Training">Training</option></select><input id="attReason" placeholder="Reason"><button id="submitAttendanceBtn" class="btn-primary">Mark Attendance</button><div id="attendanceRecordsList"></div></div>`; document.getElementById('submitAttendanceBtn').addEventListener('click',async()=>{ const staff=document.getElementById('attStaffSelect').value, shift=document.getElementById('attShiftSelect').value, status=document.getElementById('attStatusSelect').value, reason=document.getElementById('attReason').value; if(!staff) return; await saveAttendanceRecord({staffName:staff,shift,status,reason,reportDateTime:new Date().toISOString()}); document.getElementById('attReason').value=''; renderAttendanceRecordsList(); }); renderAttendanceRecordsList(); }
    function renderAttendanceRecordsList(){ const listDiv=document.getElementById('attendanceRecordsList'); if(!listDiv) return; listDiv.innerHTML=attendanceRecords.map(r=>`<div class="attendance-record"><strong>${escapeHtml(r.staffName)}</strong> (${r.shift}) - ${r.status} ${r.reason?`- ${escapeHtml(r.reason)}`:''}<button class="delete-attendance-btn" data-name="${escapeHtml(r.staffName)}" data-shift="${r.shift}">Delete</button></div>`).join(''); document.querySelectorAll('.delete-attendance-btn').forEach(btn=>btn.addEventListener('click',()=>deleteAttendanceRecord(btn.dataset.name,btn.dataset.shift))); }
    function renderStaffAttendanceView(){ const container=document.getElementById('staffAttendanceView'); if(!container) return; const absents=attendanceRecords.filter(r=>r.status!=='Present'); if(absents.length===0) container.innerHTML='<div class="empty-msg">No absences/leaves today.</div>'; else container.innerHTML=absents.map(r=>`<div class="attendance-record"><strong>${escapeHtml(r.staffName)}</strong> (${r.shift}) - ${r.status} ${r.reason?`- ${escapeHtml(r.reason)}`:''}</div>`).join(''); }
    function renderSODPanel(){ const div=document.getElementById('sodStaffList'); if(!div) return; div.innerHTML=staffList.map(s=>`<span class="sod-staff-badge ${sodStaffNames.includes(s.name)?'selected':''}" data-name="${escapeHtml(s.name)}">${escapeHtml(s.name)}</span>`).join(''); document.querySelectorAll('.sod-staff-badge').forEach(el=>el.addEventListener('click',async()=>{ const name=el.dataset.name; let newList=sodStaffNames.includes(name)?sodStaffNames.filter(n=>n!==name):[...sodStaffNames,name]; await saveSODStaff(newList); })); }
    function renderSupervisorSelectPanel(){ const div=document.getElementById('supervisorSelectPanel'); if(!div) return; div.innerHTML=`<select id="supSelect">${sodStaffNames.map(s=>`<option>${escapeHtml(s)}</option>`).join('')}</select><button id="addSupBtn">Add Supervisor</button><div>${supervisorList.map(s=>`<span class="staff-name-badge">${escapeHtml(s)} <button class="remove-sup" data-name="${escapeHtml(s)}">✖</button></span>`).join('')}</div>`; document.getElementById('addSupBtn')?.addEventListener('click',async()=>{ const select=document.getElementById('supSelect'); if(select.value && !supervisorList.includes(select.value)) await saveSupervisors([...supervisorList,select.value]); }); document.querySelectorAll('.remove-sup').forEach(btn=>btn.addEventListener('click',async()=>{ await saveSupervisors(supervisorList.filter(s=>s!==btn.dataset.name)); })); }
    function renderAllocation(){ if(!currentSODRecord) return; const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS; const areas=["Welcome/Boarding","Reception","Buffet","Floor","Pantry"]; let html='<table class="allocation-table"><tr><th>Area</th>'+slots.map(s=>`<th>${s.name}</th>`).join('')+'</tr>'; areas.forEach(area=>{ html+=`<tr><td>${area}</td>`; slots.forEach(slot=>{ const assigned=(currentSODRecord.allocations?.[slot.id]?.[area])||[]; html+=`<td>${assigned.map(a=>`<span class="staff-name-badge">${escapeHtml(a)}</span>`).join('')}</td>`; }); html+=`</tr>`; }); html+=`</table>`; document.getElementById('allocationContainer').innerHTML=html; }
    function renderFullAllocation(){ const container=document.getElementById('fullAllocationContainer'); if(!currentSODRecord){ container.innerHTML='<div class="empty-msg">No allocation</div>'; return; } const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS; const areas=["Welcome/Boarding","Reception","Buffet","Floor","Pantry"]; let html='<table class="allocation-table"><tr><th>Area</th>'+slots.map(s=>`<th>${s.name}</th>`).join('')+'</tr>'; areas.forEach(area=>{ html+=`<tr><td>${area}</td>`; slots.forEach(slot=>{ const assigned=(currentSODRecord.allocations?.[slot.id]?.[area])||[]; html+=`<td>${assigned.map(a=>`<span class="staff-name-badge">${escapeHtml(a)}</span>`).join('')}</td>`; }); html+=`</tr>`; }); html+=`</table>`; container.innerHTML=html; }
    async function renderBreakUI(){ const container=document.getElementById('breakRequestContainer'); if(!container) return; const id=getBreakRecordId(currentDate,currentShift); const doc=await db.collection("breakRecords").doc(id).get(); let breaks=doc.exists?doc.data().breaks||[]:[]; const myBreak=breaks.find(b=>b.staffName===selectedStaffName); const slots=currentShift==="Morning"?BREAK_MORNING_SLOTS:BREAK_EVENING_SLOTS; container.innerHTML=`<select id="staffBreakSelect">${sodStaffNames.map(s=>`<option ${selectedStaffName===s?'selected':''}>${escapeHtml(s)}</option>`).join('')}</select><div class="time-slots">${slots.map(slot=>`<button class="time-slot-btn" data-slot="${slot}">${slot}</button>`).join('')}</div>${myBreak?`<div>Status: ${myBreak.status}</div>`:''}<div>All: ${breaks.map(b=>`${b.staffName} (${b.timeSlot})`).join(', ')}</div>`; document.querySelectorAll('.time-slot-btn').forEach(btn=>btn.addEventListener('click',async()=>{ const staff=document.getElementById('staffBreakSelect').value; if(!staff) return; const slot=btn.dataset.slot; const breakDoc=await db.collection("breakRecords").doc(id).get(); let br=breakDoc.exists?breakDoc.data().breaks||[]:[]; if(br.find(b=>b.staffName===staff && b.status==='approved')){ alert("Already approved break"); return; } br=br.filter(b=>!(b.staffName===staff && b.status==='pending')); br.push({staffName:staff,timeSlot:slot,status:'pending',requestedAt:new Date().toISOString()}); await db.collection("breakRecords").doc(id).set({breaks:br,date:currentDate,shift:currentShift}); renderBreakUI(); alert("Request sent"); })); document.getElementById('staffBreakSelect')?.addEventListener('change',(e)=>{ selectedStaffName=e.target.value; renderBreakUI(); }); }
    async function loadBreakRequests(){ const container=document.getElementById('breakRequestsList'); if(!container) return; const id=getBreakRecordId(currentDate,currentShift); const doc=await db.collection("breakRecords").doc(id).get(); let breaks=doc.exists?doc.data().breaks||[]:[]; const pending=breaks.filter(b=>b.status==='pending'); if(pending.length===0) container.innerHTML='<div class="empty-msg">No pending requests</div>'; else container.innerHTML=pending.map(b=>`<div>${b.staffName} at ${b.timeSlot} <button class="approve-break" data-name="${b.staffName}" data-slot="${b.timeSlot}">Approve</button><button class="reject-break" data-name="${b.staffName}" data-slot="${b.timeSlot}">Reject</button></div>`).join(''); document.querySelectorAll('.approve-break').forEach(btn=>btn.addEventListener('click',async()=>{ const bDoc=await db.collection("breakRecords").doc(id).get(); let br=bDoc.exists?bDoc.data().breaks||[]:[]; br=br.map(b=>{ if(b.staffName===btn.dataset.name && b.timeSlot===btn.dataset.slot) b.status='approved'; return b; }); await db.collection("breakRecords").doc(id).set({breaks:br}); loadBreakRequests(); renderBreakUI(); })); document.querySelectorAll('.reject-break').forEach(btn=>btn.addEventListener('click',async()=>{ const bDoc=await db.collection("breakRecords").doc(id).get(); let br=bDoc.exists?bDoc.data().breaks||[]:[]; br=br.filter(b=>!(b.staffName===btn.dataset.name && b.timeSlot===btn.dataset.slot)); await db.collection("breakRecords").doc(id).set({breaks:br}); loadBreakRequests(); renderBreakUI(); })); }
    function renderTaskManager(){ const container=document.getElementById('taskListManager'); if(!container) return; container.innerHTML=globalTasks.map(t=>`<div>${escapeHtml(t.name)} (${t.type}) <button class="delete-task" data-id="${t.id}">Delete</button></div>`).join(''); document.querySelectorAll('.delete-task').forEach(btn=>btn.addEventListener('click',async()=>{ await saveGlobalTasks(globalTasks.filter(t=>t.id!==btn.dataset.id)); })); }
    function renderStaffManager(){ const container=document.getElementById('staffListManager'); if(!container) return; container.innerHTML=staffList.map(s=>`<span class="staff-card">${escapeHtml(s.name)} <button class="delete-staff" data-id="${s.id}">✖</button></span>`).join(''); document.querySelectorAll('.delete-staff').forEach(btn=>btn.addEventListener('click',async()=>{ if(confirm("Delete staff?")){ await db.collection("staff").doc(btn.dataset.id).delete(); await loadStaff(); } })); }
    async function addTaskMgr(){ if(!document.getElementById('newTaskNameMgr').value.trim()) return; const cat=document.getElementById('taskCategorySelectMgr').value||"General"; const newTask={id:Date.now().toString(),name:document.getElementById('newTaskNameMgr').value.trim(),category:cat,type:document.getElementById('taskTypeSelectMgr').value,shift:document.getElementById('taskShiftSelectMgr').value,options:document.getElementById('taskTypeSelectMgr').value==='dropdown'?document.getElementById('dropdownOptionsMgr').value.split(',').map(o=>o.trim()):null}; await saveGlobalTasks([...globalTasks,newTask]); document.getElementById('newTaskNameMgr').value=''; document.getElementById('dropdownOptionsMgr').value=''; }
    function updateCategoryUI(){ const cats=[...new Set(globalTasks.map(t=>t.category||"General"))]; document.getElementById('taskCategorySelectMgr').innerHTML=cats.map(c=>`<option>${c}</option>`).join('')+'<option>New Category</option>'; }
    document.getElementById('taskTypeSelectMgr')?.addEventListener('change',()=>{ document.getElementById('dropdownOptionsDivMgr').style.display=document.getElementById('taskTypeSelectMgr').value==='dropdown'?'block':'none'; });
    async function refreshAll(){ await Promise.all([loadSODStaff(),loadSODAllocation(),loadAttendance(),loadSupervisors(),loadTaskRecord()]); renderBreakUI(); if(currentRole==="supervisor") loadBreakRequests(); renderFullAllocation(); }
    async function onDateShiftChange(){ currentDate=document.getElementById('mainDate').value; currentShift=document.getElementById('mainShift').value; await refreshAll(); }
    async function init(){ if(!firestoreReady) return; await loadGlobalTasks(); await loadStaff(); await loadSODStaff(); await loadSODAllocation(); await loadTaskRecord(); await loadAttendance(); await loadSupervisors(); document.getElementById('mainDate').value=currentDate; document.getElementById('mainShift').value=currentShift; document.getElementById('mainDate').addEventListener('change',onDateShiftChange); document.getElementById('mainShift').addEventListener('change',onDateShiftChange); document.getElementById('staffRoleBtn').addEventListener('click',()=>{ currentRole="staff"; document.getElementById('supervisorTabs').classList.add('hidden'); document.getElementById('staffViewSection').style.display='block'; refreshAll(); }); document.getElementById('supervisorRoleBtn').addEventListener('click',()=>{ if(!isSupervisor){ document.getElementById('passwordModal').classList.remove('hidden'); return; } currentRole="supervisor"; document.getElementById('staffViewSection').style.display='none'; document.getElementById('supervisorTabs').classList.remove('hidden'); refreshAll(); }); document.getElementById('addTaskBtnMgr').addEventListener('click',addTaskMgr); document.getElementById('addStaffBtnMgr').addEventListener('click',()=>addStaffMember(document.getElementById('newStaffNameMgr').value)); document.getElementById('closeShiftBtn').addEventListener('click',closeShift); document.getElementById('reopenShiftBtn').addEventListener('click',reopenShiftFn); document.getElementById('verifyPasswordBtn').addEventListener('click',()=>{ if(document.getElementById('supervisorPassword').value==="Admin123"){ isSupervisor=true; document.getElementById('passwordModal').classList.add('hidden'); document.getElementById('supervisorRoleBtn').click(); } else document.getElementById('passwordError').innerText="Wrong password"; }); document.getElementById('cancelPasswordBtn').addEventListener('click',()=>document.getElementById('passwordModal').classList.add('hidden')); document.getElementById('exportFullPdfBtn').addEventListener('click',()=>alert("PDF report feature available")); document.getElementById('printAllocationBtn').addEventListener('click',()=>window.print()); updateCategoryUI(); setInterval(()=>{ if(currentDate && currentShift) refreshAll(); }, 30000); }
    
    if(isDeviceAuthorized()){ document.getElementById('deviceAuthModal').style.display='none'; document.getElementById('appContainer').style.display='block'; init(); } else { document.getElementById('deviceAuthModal').style.display='flex'; document.getElementById('authorizeDeviceBtn').addEventListener('click',()=>{ if(authorizeDevice(document.getElementById('devicePasswordInput').value)){ document.getElementById('deviceAuthModal').style.display='none'; document.getElementById('appContainer').style.display='block'; init(); } else document.getElementById('deviceAuthError').innerText='Invalid password'; }); }
</script>
</body>
