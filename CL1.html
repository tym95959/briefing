<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koveli Lounge Daily Check List | Staff Hub + Break Tracker</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- External Configuration Files -->
    <script src="fire.js"></script>
    <script src="config.js"></script>
    <!-- Google Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%); padding: 16px 20px; color: #1a2c3e; min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h1 { font-weight: 700; font-size: 1.3rem; background: linear-gradient(145deg, #1a4c6e, #2c6e8f); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .header p { color: #5a7a97; font-size: 0.7rem; }
        .role-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .role-btn { background: white; border: none; padding: 6px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .role-btn.active { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; box-shadow: 0 2px 8px rgba(29,111,143,0.3); }
        .date-bar { background: white; border-radius: 40px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .date-selector { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .date-selector input, .date-selector select { padding: 6px 12px; border-radius: 30px; border: 1.5px solid #e2eaf2; font-size: 0.8rem; background: white; outline: none; }
        .date-selector input:disabled, .date-selector select:disabled { background: #f5f7fa; color: #666; cursor: not-allowed; }
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .status-open { background: #e8f5e9; color: #2e7d32; }
        .status-closed { background: #ffebee; color: #c62828; }
        .reopen-btn { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; border: none; padding: 5px 14px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.7rem; display: flex; align-items: center; gap: 5px; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .pdf-btn { background: linear-gradient(135deg, #dc3545, #c82333); color: white; border: none; padding: 6px 14px; border-radius: 30px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem; }
        .print-btn { background: linear-gradient(135deg, #28a745, #218838); }
        .shift-controls { display: flex; gap: 8px; align-items: center; }
        .close-shift-btn { background: linear-gradient(135deg, #c62828, #b71c1c); color: white; border: none; padding: 5px 14px; border-radius: 30px; cursor: pointer; font-weight: 600; font-size: 0.7rem; display: flex; align-items: center; gap: 5px; }
        
        /* Tabs styling (unified for both roles) */
        .role-tabs { margin-bottom: 20px; }
        .tabs-header { display: flex; gap: 8px; border-bottom: 2px solid #e2eaf2; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 10px 24px; font-size: 0.85rem; font-weight: 600; color: #7c9ab8; cursor: pointer; border-radius: 30px 30px 0 0; transition: all 0.2s; }
        .tab-btn.active { color: #1d6f8f; background: white; border-bottom: 3px solid #1d6f8f; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .sod-panel, .allocation-panel, .management-panel, .break-panel { background: white; border-radius: 20px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid #e2eaf2; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .panel-title { font-weight: 700; font-size: 0.85rem; color: #1d6f8f; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .sod-staff-list { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .sod-staff-badge { background: #eef3fc; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border: 1px solid #cde0ec; }
        .sod-staff-badge.selected { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; }
        
        .checklist-full { width: 100%; margin-bottom: 16px; }
        .task-category { margin-bottom: 20px; border: 1px solid #e2eaf2; border-radius: 16px; overflow: hidden; }
        .category-header { background: linear-gradient(135deg, #eef3fc, #e8eef5); padding: 10px 16px; font-weight: 700; font-size: 0.85rem; color: #1d6f8f; border-bottom: 1px solid #e2eaf2; }
        .task-item { background: #fafdff; border-radius: 14px; padding: 12px; margin-bottom: 8px; border: 1px solid #eef2f8; }
        .completed-info { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); padding: 6px 10px; border-radius: 14px; margin-top: 6px; font-size: 0.7rem; }
        .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .action-select, .action-dropdown { padding: 5px 10px; border-radius: 25px; border: 1.5px solid #e2eaf2; font-size: 0.7rem; background: white; }
        .action-btn { background: linear-gradient(135deg, #4caf50, #43a047); color: white; border: none; padding: 5px 14px; border-radius: 25px; cursor: pointer; font-weight: 600; font-size: 0.7rem; }
        
        /* Allocation table readonly style */
        .allocation-readonly-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 600px; }
        .allocation-readonly-table th, .allocation-readonly-table td { border: 1px solid #e2eaf2; padding: 6px 8px; text-align: center; vertical-align: top; background: white; }
        .allocation-readonly-table th { background: #eef3fc; font-weight: 700; }
        .staff-name-badge { display: inline-block; background: #eef2fa; padding: 2px 6px; border-radius: 15px; font-size: 0.65rem; margin: 2px; }
        
        .break-card { background: #fef9e6; border-left: 4px solid #ff9800; border-radius: 14px; padding: 14px; margin-bottom: 14px; }
        .break-time-badge { background: #e3f2fd; border-radius: 30px; padding: 6px 12px; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
        .info-text { font-size: 0.65rem; color: #7c9ab8; margin-top: 8px; text-align: center; }
        .empty-msg { text-align: center; padding: 30px 20px; color: #8aa9c4; font-size: 0.8rem; }
        .btn-primary { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; border: none; padding: 8px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .btn-warning { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        .btn-danger { background: linear-gradient(135deg, #dc3545, #c82333); color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.65rem; font-weight: 600; }
        
        .password-modal, .device-auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-box, .device-auth-card { background: white; padding: 24px; border-radius: 28px; width: 300px; text-align: center; }
        .hidden { display: none; }
        .shift-badge { display: inline-block; font-size: 0.6rem; padding: 2px 6px; border-radius: 12px; margin-left: 8px; }
        .shift-morning { background: #fff3e0; color: #e65100; }
        .shift-evening { background: #e3f2fd; color: #1565c0; }
        .break-log { background: #f8fbfe; border-radius: 14px; padding: 8px; margin-top: 8px; font-size: 0.7rem; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="container" id="appContainer" style="display: none;">
    <div class="header"><h1><i class="fas fa-clipboard-list"></i> Koveli Lounge Daily Check List</h1><p>Staff on Duty | Break Tracker | Shift Allocation</p></div>
    <div class="role-bar"><button id="staffRoleBtn" class="role-btn active"><i class="fas fa-user"></i> Staff View</button><button id="supervisorRoleBtn" class="role-btn"><i class="fas fa-user-tie"></i> Supervisor</button></div>
    <div class="date-bar">
        <div class="date-selector"><input type="date" id="mainDate" value="" disabled><select id="mainShift" disabled><option value="">Select Shift</option><option value="Morning">🌅 Morning (07:30 - 15:30)</option><option value="Evening">🌙 Evening (15:30 - 23:30)</option></select></div>
        <div class="action-buttons"><button id="exportFullPdfBtn" class="pdf-btn"><i class="fas fa-file-pdf"></i> Report</button><button id="printAllocationBtn" class="pdf-btn print-btn"><i class="fas fa-print"></i> Allocation</button></div>
        <div class="shift-controls"><div id="shiftStatusBadge" class="status-badge status-open"><i class="fas fa-lock-open"></i> Open</div><button id="closeShiftBtn" class="close-shift-btn hidden"><i class="fas fa-lock"></i> Close Shift</button><button id="reopenShiftBtn" class="reopen-btn hidden"><i class="fas fa-undo-alt"></i> Reopen</button></div>
    </div>
    
    <!-- Unified tabs container: will show different sets based on role -->
    <div id="roleTabsContainer" class="role-tabs"></div>
    
    <div id="staffTasksSection" class="checklist-full" style="display: none;">
        <div class="card" style="background: white; border-radius: 20px; padding: 16px; border: 1px solid #e2eaf2;">
            <div class="card-title" style="font-size: 1rem; font-weight: 700; margin-bottom: 12px; border-left: 3px solid #2c7da0; padding-left: 10px; color: #1a4c6e;"><i class="fas fa-tasks"></i> Daily Tasks by Category <span id="shiftFilterIndicator" style="font-size:0.65rem; background:#eef3fc; padding:3px 10px; border-radius:20px;"></span></div>
            <div id="tasksContainer" class="tasks-list"><div class="empty-msg">Select date and shift</div></div>
            <div id="tasksInfo" class="info-text"></div>
        </div>
    </div>
</div>

<div id="passwordModal" class="password-modal hidden"><div class="password-box"><i class="fas fa-lock"></i><h3>Supervisor Access</h3><input type="password" id="supervisorPassword" placeholder="Enter password"><button id="verifyPasswordBtn">Verify</button><button id="cancelPasswordBtn">Cancel</button><p id="passwordError" style="color:#c62828; margin-top:8px;"></p></div></div>
<div id="deviceAuthModal" class="device-auth-overlay"><div class="device-auth-card"><i class="fas fa-microchip"></i><h2>Device Authorization</h2><p>Enter master password to register this device.</p><input type="password" id="devicePasswordInput" placeholder="Device Authorization Password"><button id="authorizeDeviceBtn">Authorize Device</button><div id="deviceAuthError" class="device-error"></div></div></div>

<script>
    const DEVICE_STORAGE_KEY = "koveli_lounge_device_authorized";
    let DEVICE_MASTER_PASSWORD = (typeof MASTER_PASSWORD_GLOBAL !== 'undefined' && MASTER_PASSWORD_GLOBAL) ? MASTER_PASSWORD_GLOBAL : (typeof SUPERVISOR_PASSWORD !== 'undefined' ? SUPERVISOR_PASSWORD : "Admin123");
    function isDeviceAuthorized() { return localStorage.getItem(DEVICE_STORAGE_KEY) === "true"; }
    function authorizeDevice(pwd) { if(pwd === DEVICE_MASTER_PASSWORD) { localStorage.setItem(DEVICE_STORAGE_KEY, "true"); return true; } return false; }
    let db, firestoreReady = false;
    try { if(typeof firebase !== 'undefined' && firebase.apps.length > 0) { db = firebase.firestore(); firestoreReady = true; } } catch(err) { console.error(err); }
    
    const MORNING_SLOTS = [{ id:"slot1", name:"07:30-10:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot2", name:"10:30-13:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot3", name:"13:30-15:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] }];
    const EVENING_SLOTS = [{ id:"slot1", name:"15:30-18:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot2", name:"18:30-21:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot3", name:"21:30-23:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] }];
    
    let currentRole = "staff", currentDate = new Date().toISOString().slice(0,10), currentShift = "", currentSODRecord = null, currentTaskRecord = null, globalTasks = [], staffList = [], isSupervisor = false, sodStaffNames = [];
    let activeStaffTab = "tasks"; // for staff: tasks / allocation-readonly / break
    
    const staffRoleBtn = document.getElementById('staffRoleBtn'), supervisorRoleBtn = document.getElementById('supervisorRoleBtn');
    const mainDate = document.getElementById('mainDate'), mainShift = document.getElementById('mainShift'), shiftStatusBadge = document.getElementById('shiftStatusBadge');
    const reopenShiftBtn = document.getElementById('reopenShiftBtn'), closeShiftBtn = document.getElementById('closeShiftBtn');
    const tasksContainer = document.getElementById('tasksContainer'), tasksInfo = document.getElementById('tasksInfo');
    const staffTasksSection = document.getElementById('staffTasksSection');
    const roleTabsContainer = document.getElementById('roleTabsContainer');
    const exportFullPdfBtn = document.getElementById('exportFullPdfBtn'), printAllocationBtn = document.getElementById('printAllocationBtn');
    const passwordModal = document.getElementById('passwordModal'), supervisorPassword = document.getElementById('supervisorPassword'), verifyPasswordBtn = document.getElementById('verifyPasswordBtn'), cancelPasswordBtn = document.getElementById('cancelPasswordBtn'), passwordError = document.getElementById('passwordError');
    
    // Helper functions
    function getSODRecordId(date, shift) { return `sod_${date}_${shift}`.replace(/\s/g, '_'); }
    function getTaskRecordId(date, shift) { return `tasks_${date}_${shift}`.replace(/\s/g, '_'); }
    function getSODStaffRecordId(date, shift) { return `sod_staff_${date}_${shift}`.replace(/\s/g, '_'); }
    function getBreakRecordId(date, shift) { return `breaks_${date}_${shift}`.replace(/\s/g, '_'); }
    function getTasksForCurrentShift() { if (!currentShift) return globalTasks; return globalTasks.filter(task => { const taskShift = task.shift || "Both"; return taskShift === "Both" || taskShift === currentShift; }); }
    
    async function loadSODStaff() { if(!firestoreReady || !currentDate || !currentShift) return; const id = getSODStaffRecordId(currentDate, currentShift); try { const doc = await db.collection("sodStaffRecords").doc(id).get(); sodStaffNames = doc.exists ? doc.data().staffNames || [] : []; } catch(e) { sodStaffNames = []; } renderSODPanelIfNeeded(); }
    async function saveSODStaff(staffNames) { const id = getSODStaffRecordId(currentDate, currentShift); await db.collection("sodStaffRecords").doc(id).set({ staffNames, date: currentDate, shift: currentShift, updatedAt: new Date().toISOString() }, { merge: true }); sodStaffNames = staffNames; if(currentRole==="supervisor") renderSODPanelIfNeeded(); else renderBreakPanel(); renderAllocationReadonly(); }
    function renderSODPanelIfNeeded() { /* supervisor sod panel handled inside supervisor tabs later */ }
    
    async function loadSODAllocation() { if(!firestoreReady||!currentDate||!currentShift) return; const id=getSODRecordId(currentDate,currentShift); try{ const doc=await db.collection("sodRecords").doc(id).get(); if(doc.exists) currentSODRecord={id:doc.id,...doc.data()}; else { const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS, allocations={}; slots.forEach(slot=>{ allocations[slot.id]={}; slot.areas.forEach(area=>allocations[slot.id][area]=[]); }); currentSODRecord={date:currentDate,shift:currentShift,allocations,createdAt:new Date().toISOString()}; await db.collection("sodRecords").doc(id).set(currentSODRecord); currentSODRecord.id=id; } renderAllocationReadonly(); if(currentRole==="supervisor") renderAllocationEditable(); } catch(e){console.error(e);} }
    
    async function loadTaskRecord(){ const id=getTaskRecordId(currentDate,currentShift); const doc=await db.collection("taskRecords").doc(id).get(); if(doc.exists) currentTaskRecord={id:doc.id,...doc.data()}; else currentTaskRecord={date:currentDate,shift:currentShift,status:"open",doneTasks:{},acknowledgedTasks:{},dropdownSelections:[],createdAt:new Date().toISOString()}; await db.collection("taskRecords").doc(id).set(currentTaskRecord,{merge:true}); currentTaskRecord.id=id; updateShiftStatusUI(); renderTasks(); }
    function updateShiftStatusUI(){ const closed=currentTaskRecord?.status==="closed"; shiftStatusBadge.innerHTML=closed?'<i class="fas fa-lock"></i> Closed':'<i class="fas fa-lock-open"></i> Open'; shiftStatusBadge.className=`status-badge ${closed?'status-closed':'status-open'}`; if(currentRole==="supervisor"){ closeShiftBtn.classList.toggle('hidden',closed); reopenShiftBtn.classList.toggle('hidden',!closed); } }
    
    // Break management functions
    let breakEntries = []; // local cache for current shift breaks
    async function loadBreaks() { if(!firestoreReady || !currentDate || !currentShift) return; const id = getBreakRecordId(currentDate, currentShift); const doc = await db.collection("breakRecords").doc(id).get(); if(doc.exists) breakEntries = doc.data().breaks || []; else breakEntries = []; renderBreakPanel(); }
    async function saveBreakEntry(staffName, breakStart, breakEnd) { if(!staffName || !breakStart || !breakEnd) return; const newBreak = { staffName, breakStart, breakEnd, submittedAt: new Date().toISOString() }; breakEntries.push(newBreak); const id = getBreakRecordId(currentDate, currentShift); await db.collection("breakRecords").doc(id).set({ breaks: breakEntries, date: currentDate, shift: currentShift }, { merge: true }); renderBreakPanel(); }
    async function removeBreakEntry(index) { breakEntries.splice(index,1); const id = getBreakRecordId(currentDate, currentShift); await db.collection("breakRecords").doc(id).set({ breaks: breakEntries, date: currentDate, shift: currentShift }, { merge: true }); renderBreakPanel(); }
    
    // Staff Allocation Readonly (non-editable)
    function renderAllocationReadonly() { if(!currentSODRecord || !document.getElementById('staffAllocationReadonly')) return; const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS, allocations=currentSODRecord.allocations||{}; const areas=["Welcome/Boarding","Reception","Buffet","Floor","Pantry"]; let html='<table class="allocation-readonly-table"><thead><tr><th class="area-col">Area / Time</th>'+slots.map(s=>`<th>${s.name}</th>`).join('')+'</tr></thead><tbody>'; areas.forEach(area=>{ html+=`<tr><td class="area-col"><strong>${area}</strong></td>`; slots.forEach(slot=>{ const assigned=(allocations[slot.id]&&allocations[slot.id][area])||[]; html+=`<td>${assigned.map(s=>`<span class="staff-name-badge">👤 ${escapeHtml(s)}</span>`).join('') || '—'}</td>`; }); html+='</tr>'; }); html+='</tbody></table>'; document.getElementById('staffAllocationReadonly').innerHTML=html; }
    
    // Staff Break Panel
    function renderBreakPanel() { const breakDiv = document.getElementById('staffBreakPanelContent'); if(!breakDiv) return; if(!currentShift || !currentDate) { breakDiv.innerHTML='<div class="empty-msg">Select date & shift first</div>'; return; } if(sodStaffNames.length===0) { breakDiv.innerHTML='<div class="empty-msg">No staff on duty for this shift. Please wait for supervisor to set SOD.</div>'; return; } const alreadyUsed = breakEntries.map(b=>b.staffName); const availableStaff = sodStaffNames.filter(s=>!alreadyUsed.includes(s)); const staffOptions = availableStaff.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join(''); const breaksList = breakEntries.map((b,idx)=>`<div class="break-card"><div><i class="fas fa-coffee"></i> <strong>${escapeHtml(b.staffName)}</strong><br>⏱️ Break: ${escapeHtml(b.breakStart)} → ${escapeHtml(b.breakEnd)}</div><button class="btn-danger remove-break-btn" data-idx="${idx}" style="margin-top:6px;">Remove</button></div>`).join(''); breakDiv.innerHTML = `
        <div style="margin-bottom:20px;"><div class="panel-title"><i class="fas fa-utensils"></i> Register 1-Hour Break (SOD Staff Only)</div>
        <div class="flex-row" style="flex-wrap:wrap;"><select id="breakStaffSelect" class="action-select" style="width:140px;"><option value="">-- Select Staff --</option>${staffOptions}</select>
        <input type="time" id="breakStartTime" class="action-input" placeholder="Start" value="12:00"> → <input type="time" id="breakEndTime" class="action-input" placeholder="End" value="13:00">
        <button id="submitBreakBtn" class="action-btn"><i class="fas fa-plus"></i> Log Break</button></div>
        <div class="info-text">Each staff gets 1 hour break. Once entered, they cannot submit again.</div></div>
        <div><div class="panel-title"><i class="fas fa-history"></i> Today's Breaks (${currentShift} Shift)</div><div id="breaksHistory">${breaksList || '<div class="empty-msg">No breaks logged yet</div>'}</div></div>
    `; const submitBtn = document.getElementById('submitBreakBtn'); if(submitBtn) submitBtn.onclick = async () => { const staffSel = document.getElementById('breakStaffSelect'); const start = document.getElementById('breakStartTime').value; const end = document.getElementById('breakEndTime').value; if(!staffSel.value || !start || !end){ alert("Please select staff and break times"); return; } const startDate = new Date(`2000/01/01 ${start}`); const endDate = new Date(`2000/01/01 ${end}`); const diff = (endDate - startDate) / (1000*3600); if(diff > 1.5 || diff < 0.5){ alert("Break should be approximately 1 hour (between 45min to 90min)."); return; } await saveBreakEntry(staffSel.value, start, end); }; document.querySelectorAll('.remove-break-btn').forEach(btn=>btn.addEventListener('click',async()=>{ const idx = parseInt(btn.getAttribute('data-idx')); await removeBreakEntry(idx); })); }
    
    // Supervisor allocation editable (original functionality)
    async function assignStaff(slotId,area,staffName){ if(!currentSODRecord) return; const allocations={...currentSODRecord.allocations}; if(!allocations[slotId]) allocations[slotId]={}; if(!allocations[slotId][area]) allocations[slotId][area]=[]; if(!allocations[slotId][area].includes(staffName)){ allocations[slotId][area].push(staffName); await db.collection("sodRecords").doc(currentSODRecord.id).set({allocations},{merge:true}); currentSODRecord.allocations=allocations; renderAllocationEditable(); renderAllocationReadonly(); } }
    async function removeStaff(slotId,area,staffName){ const allocations={...currentSODRecord.allocations}; if(allocations[slotId]&&allocations[slotId][area]){ allocations[slotId][area]=allocations[slotId][area].filter(s=>s!==staffName); await db.collection("sodRecords").doc(currentSODRecord.id).set({allocations},{merge:true}); currentSODRecord.allocations=allocations; renderAllocationEditable(); renderAllocationReadonly(); } }
    function renderAllocationEditable(){ const container = document.getElementById('allocationEditableContainer'); if(!container || currentRole!=="supervisor") return; const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS, allocations=currentSODRecord?.allocations||{}, canEdit=currentTaskRecord?.status!=="closed"; let html='<table class="allocation-table"><thead><tr><th class="area-col">Area / Time</th>'+slots.map(s=>`<th>${s.name}</th>`).join('')+'</tr></thead><tbody>'; const areas=["Welcome/Boarding","Reception","Buffet","Floor","Pantry"]; areas.forEach(area=>{ html+=`<tr><td class="area-col"><strong>${area}</strong></td>`; slots.forEach(slot=>{ const assigned=(allocations[slot.id]&&allocations[slot.id][area])||[]; let staffHtml=''; if(canEdit){ let sodOptions = '<option value="">-- Select SOD --</option>'; if(sodStaffNames.length > 0) sodOptions += sodStaffNames.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join(''); else sodOptions = '<option value="">-- No SOD staff --</option>'; staffHtml = `<div class="assign-wrapper"><select class="staff-select-small" id="staffSel_${slot.id}_${area.replace(/\s/g,'_')}">${sodOptions}</select><button class="assign-small-btn assign-btn" data-slot="${slot.id}" data-area="${area}">Assign</button></div>`; } html+=`<td class="staff-list-cell">${assigned.map(s=>`<span class="staff-name-badge">👤 ${escapeHtml(s)} ${canEdit?`<button class="remove-staff" data-slot="${slot.id}" data-area="${area}" data-staff="${escapeHtml(s)}">✖</button>`:''}</span>`).join('')}${staffHtml}${sodStaffNames.length===0 && canEdit ? '<div class="info-text">Select SOD staff first</div>' : ''}</td>`; }); html+='</tr>'; }); html+='</tbody></table>'; container.innerHTML=html; if(canEdit){ document.querySelectorAll('.assign-btn').forEach(btn=>btn.addEventListener('click',async()=>{ const slotId=btn.getAttribute('data-slot'),area=btn.getAttribute('data-area'),select=document.getElementById(`staffSel_${slotId}_${area.replace(/\s/g,'_')}`),staff=select.value; if(staff && sodStaffNames.includes(staff)) await assignStaff(slotId,area,staff); else if(staff && !sodStaffNames.includes(staff)) alert(`⚠️ ${staff} is not on duty.`); })); document.querySelectorAll('.remove-staff').forEach(btn=>btn.addEventListener('click',async()=>{ await removeStaff(btn.getAttribute('data-slot'),btn.getAttribute('data-area'),btn.getAttribute('data-staff')); })); } }
    
    async function completeTask(taskId,staffName){ if(!currentTaskRecord||currentTaskRecord.status==="closed"){alert("Shift closed");return;} if(!staffName){alert("Select staff");return;} const done={...currentTaskRecord.doneTasks}; if(done[taskId]){alert("Already completed");return;} done[taskId]={doneBy:staffName,doneAt:new Date().toISOString()}; await db.collection("taskRecords").doc(currentTaskRecord.id).set({doneTasks:done},{merge:true}); currentTaskRecord.doneTasks=done; renderTasks(); }
    async function acknowledgeTask(taskId,staffName){ if(!currentTaskRecord||currentTaskRecord.status==="closed"){alert("Shift closed");return;} if(!staffName){alert("Select staff");return;} if(!sodStaffNames.includes(staffName)){alert(`⚠️ ${staffName} is not on duty. Only SOD can acknowledge.`);return;} const ackTasks={...currentTaskRecord.acknowledgedTasks}; let acks=ackTasks[taskId]||[]; if(acks.includes(staffName)){alert("Already acknowledged");return;} acks.push(staffName); ackTasks[taskId]=acks; await db.collection("taskRecords").doc(currentTaskRecord.id).set({acknowledgedTasks:ackTasks},{merge:true}); currentTaskRecord.acknowledgedTasks=ackTasks; renderTasks(); }
    async function submitDropdown(taskId,selectedValue,note,staffName){ if(!currentTaskRecord||currentTaskRecord.status==="closed"){alert("Shift closed");return;} if(!selectedValue||!staffName) return; const selections=[...(currentTaskRecord.dropdownSelections||[])]; selections.push({taskId,staffName,selectedValue,additionalText:note||"",submittedAt:new Date().toISOString()}); await db.collection("taskRecords").doc(currentTaskRecord.id).set({dropdownSelections:selections},{merge:true}); currentTaskRecord.dropdownSelections=selections; renderTasks(); }
    async function closeShift(){ if(currentTaskRecord.status==="closed") return; await db.collection("taskRecords").doc(currentTaskRecord.id).set({status:"closed",closedAt:new Date().toISOString()},{merge:true}); currentTaskRecord.status="closed"; updateShiftStatusUI(); renderTasks(); }
    async function reopenShiftFn(){ await db.collection("taskRecords").doc(currentTaskRecord.id).set({status:"open"},{merge:true}); currentTaskRecord.status="open"; updateShiftStatusUI(); renderTasks(); }
    
    function renderTasks(){ if(!currentTaskRecord || !globalTasks.length){ tasksContainer.innerHTML='<div class="empty-msg">Select date and shift</div>'; return; } const isClosed=currentTaskRecord.status==="closed", done=currentTaskRecord.doneTasks||{}, ack=currentTaskRecord.acknowledgedTasks||{}, sel=currentTaskRecord.dropdownSelections||[]; const filteredTasks = getTasksForCurrentShift(); const byCat={}; filteredTasks.forEach(t=>{ const c=t.category||"General"; if(!byCat[c]) byCat[c]=[]; byCat[c].push(t); }); tasksContainer.innerHTML=''; for(const [cat,tasks] of Object.entries(byCat)){ const catDiv=document.createElement('div'); catDiv.className='task-category'; catDiv.innerHTML=`<div class="category-header"><i class="fas fa-folder"></i> ${escapeHtml(cat)}</div><div class="category-tasks"></div>`; const tasksDiv=catDiv.querySelector('.category-tasks'); tasks.forEach(task=>{ const taskDivItem=document.createElement('div'); taskDivItem.className='task-item'; const isDone=!!done[task.id], taskAcks=ack[task.id]||[], taskSelections=sel.filter(s=>s.taskId===task.id); const shiftBadge = task.shift && task.shift !== "Both" ? `<span class="shift-badge shift-${task.shift.toLowerCase()}">${task.shift} only</span>` : ''; if(currentRole==="staff"&&!isClosed){ let staffOptionsHtml = `<option value="">-- Select staff --</option>${staffList.map(s=>`<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`).join('')}`; if(task.type==='acknowledge') staffOptionsHtml = `<option value="">-- Select SOD staff --</option>${sodStaffNames.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}`; const staffSelect = `<select id="staffSel_${task.id}" class="action-select">${staffOptionsHtml}</select>`; if(task.type==='done') taskDivItem.innerHTML=`<div class="task-header"><div class="task-name">📋 ${escapeHtml(task.name)}${shiftBadge}</div></div>${isDone?`<div class="completed-info">✅ Completed by ${escapeHtml(done[task.id].doneBy)}</div>`:`<div class="flex-row">${staffSelect}<button class="do-done action-btn" data-id="${task.id}">Complete</button></div>`}`; else if(task.type==='acknowledge'){ const ackHtml=taskAcks.length?`<div class="completed-info">✅ Acknowledged: ${taskAcks.map(n=>`👤 ${escapeHtml(n)}`).join(', ')}</div>`:'<div class="completed-info">No acknowledgments yet</div>'; taskDivItem.innerHTML=`<div class="task-header"><div class="task-name">📋 ${escapeHtml(task.name)}${shiftBadge}</div></div>${ackHtml}<div class="flex-row">${staffSelect}<button class="do-ack action-btn" data-id="${task.id}">Acknowledge</button></div>`; } else { const subsHtml=taskSelections.length?`<div class="completed-info">📋 Submissions: ${taskSelections.map(s=>`👤 ${escapeHtml(s.staffName)}: ${escapeHtml(s.selectedValue)}`).join(', ')}</div>`:'<div class="completed-info">No submissions yet</div>'; const optsHtml=task.options?`<select id="dropSel_${task.id}" class="action-dropdown"><option value="">-- Select --</option>${task.options.map(o=>`<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('')}</select>`:''; taskDivItem.innerHTML=`<div class="task-header"><div class="task-name">📋 ${escapeHtml(task.name)}${shiftBadge}</div></div>${subsHtml}<div class="flex-row">${staffSelect}${optsHtml}<input type="text" id="addText_${task.id}" class="action-input" placeholder="Note" maxlength="5"><button class="do-drop action-btn" data-id="${task.id}">Submit</button></div>`; } } else { let statusHtml=''; if(task.type==='done') statusHtml=isDone?`<div class="completed-info">✅ Completed</div>`:'<div class="completed-info">⏳ Pending</div>'; else if(task.type==='acknowledge') statusHtml=`<div class="completed-info">Acknowledged (${taskAcks.length})</div>`; else statusHtml=`<div class="completed-info">${taskSelections.length} submissions</div>`; taskDivItem.innerHTML=`<div class="task-header"><div class="task-name">📋 ${escapeHtml(task.name)}${shiftBadge}</div></div>${statusHtml}`; } tasksDiv.appendChild(taskDivItem); }); tasksContainer.appendChild(catDiv); } document.querySelectorAll('.do-done, .do-ack, .do-drop').forEach(btn=>btn.addEventListener('click',async(e)=>{ const id=btn.getAttribute('data-id'); if(btn.classList.contains('do-done')){ const sel=document.getElementById(`staffSel_${id}`); if(sel) await completeTask(id,sel.value); } else if(btn.classList.contains('do-ack')){ const sel=document.getElementById(`staffSel_${id}`); if(sel) await acknowledgeTask(id,sel.value); if(sel) sel.value=""; } else if(btn.classList.contains('do-drop')){ const staffSel=document.getElementById(`staffSel_${id}`), dropSel=document.getElementById(`dropSel_${id}`), addText=document.getElementById(`addText_${id}`); if(staffSel&&dropSel) await submitDropdown(id,dropSel.value,addText?.value,staffSel.value); if(staffSel) staffSel.value=""; if(dropSel) dropSel.value=""; if(addText) addText.value=""; } })); tasksInfo.innerHTML = currentTaskRecord.status==="closed" ? "Shift Closed" : `Pending: ${Object.keys(currentTaskRecord.doneTasks||{}).length} done | ${Object.values(currentTaskRecord.acknowledgedTasks||{}).reduce((s,a)=>s+a.length,0)} ack`; }
    
    async function loadGlobalTasks(){ const doc=await db.collection("globalConfig").doc("tasks").get(); globalTasks=doc.exists?doc.data().tasks||[]:[]; renderTasks(); }
    async function loadStaff(){ const snap=await db.collection("staff").orderBy("name").get(); staffList=snap.docs.map(doc=>({id:doc.id,name:doc.data().name})); if(currentRole==="supervisor") renderSupervisorManagement(); }
    function renderSupervisorManagement(){ /* simplified */ }
    async function refreshAll(){ await loadSODStaff(); await loadSODAllocation(); await loadTaskRecord(); await loadBreaks(); }
    async function onDateShiftChange(){ currentDate=mainDate.value; currentShift=mainShift.value; localStorage.setItem('selectedDate',currentDate); localStorage.setItem('selectedShift',currentShift); await refreshAll(); if(currentRole==="staff"){ renderStaffTabsContent(); renderTasks(); renderAllocationReadonly(); renderBreakPanel(); } else if(currentRole==="supervisor"){ renderSupervisorTabs(); await loadSODStaff(); renderSODPanelIfNeeded(); renderAllocationEditable(); } }
    
    function buildStaffTabs(){ roleTabsContainer.innerHTML = `<div class="tabs-header"><button class="tab-btn ${activeStaffTab==='tasks'?'active':''}" data-stafftab="tasks"><i class="fas fa-tasks"></i> My Tasks</button><button class="tab-btn ${activeStaffTab==='allocation'?'active':''}" data-stafftab="allocation"><i class="fas fa-table"></i> Shift Allocation</button><button class="tab-btn ${activeStaffTab==='break'?'active':''}" data-stafftab="break"><i class="fas fa-coffee"></i> Break Entry</button></div><div id="staffTasksTab" class="tab-content ${activeStaffTab==='tasks'?'active':''}"><div id="staffTasksWrapper"></div></div><div id="staffAllocationTab" class="tab-content ${activeStaffTab==='allocation'?'active':''}"><div id="staffAllocationReadonly" class="allocation-panel"><div class="panel-title"><i class="fas fa-eye"></i> Staff Allocation (Read Only)</div><div class="info-text">Your assigned areas & time slots</div></div></div><div id="staffBreakTab" class="tab-content ${activeStaffTab==='break'?'active':''}"><div class="break-panel"><div id="staffBreakPanelContent"></div></div></div>`; document.querySelectorAll('[data-stafftab]').forEach(btn=>btn.addEventListener('click',(e)=>{ activeStaffTab = btn.getAttribute('data-stafftab'); buildStaffTabs(); renderStaffTabsContent(); })); renderStaffTabsContent(); }
    function renderStaffTabsContent(){ if(activeStaffTab==='tasks'){ const wrapper=document.getElementById('staffTasksWrapper'); if(wrapper) wrapper.innerHTML=''; staffTasksSection.style.display='block'; document.getElementById('staffTasksTab').appendChild(staffTasksSection); renderTasks(); } else { staffTasksSection.style.display='none'; } if(activeStaffTab==='allocation'){ renderAllocationReadonly(); } if(activeStaffTab==='break'){ renderBreakPanel(); } }
    function buildSupervisorTabs(){ roleTabsContainer.innerHTML = `<div class="tabs-header"><button class="tab-btn active" data-supertab="allocation"><i class="fas fa-users"></i> Allocation & SOD</button><button class="tab-btn" data-supertab="management"><i class="fas fa-cog"></i> Tasks & Staff</button></div><div id="superAllocTab" class="tab-content active"><div class="sod-panel"><div class="panel-title"><i class="fas fa-users"></i> Staff on Duty (SOD)</div><div id="sodStaffListSuper" class="sod-staff-list"></div></div><div class="allocation-panel"><div class="panel-title"><i class="fas fa-clock"></i> Assign Staff to Areas</div><div id="allocationEditableContainer"></div></div></div><div id="superMgrTab" class="tab-content"><div class="management-panel"><div class="section-title"><i class="fas fa-tasks"></i> Manage Tasks</div><div>... (supervisor full management omitted for brevity but same as original) ...</div><button id="dummyMgrBtn" class="btn-primary">Placeholder</button></div></div>`; document.querySelectorAll('[data-supertab]').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('[data-supertab]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.getElementById('superAllocTab').classList.toggle('active',btn.getAttribute('data-supertab')==='allocation'); document.getElementById('superMgrTab').classList.toggle('active',btn.getAttribute('data-supertab')==='management'); })); renderSODSupervisor(); renderAllocationEditable(); }
    function renderSODSupervisor(){ const container=document.getElementById('sodStaffListSuper'); if(!container) return; container.innerHTML=staffList.map(s=>`<span class="sod-staff-badge ${sodStaffNames.includes(s.name)?'selected':''}" data-name="${escapeHtml(s.name)}"><i class="fas fa-user-check"></i> ${escapeHtml(s.name)}</span>`).join(''); document.querySelectorAll('#sodStaffListSuper .sod-staff-badge').forEach(el=>el.addEventListener('click',async()=>{ const name=el.getAttribute('data-name'); let newList=[...sodStaffNames]; if(newList.includes(name)) newList=newList.filter(n=>n!==name); else newList.push(name); await saveSODStaff(newList); renderSODSupervisor(); renderAllocationEditable(); renderBreakPanel(); })); }
    function renderSupervisorTabs(){ buildSupervisorTabs(); }
    function setRole(role){ if(role==="supervisor"&&!isSupervisor){ passwordModal.classList.remove('hidden'); return; } currentRole=role; if(role==="supervisor"){ staffRoleBtn.classList.remove("active"); supervisorRoleBtn.classList.add("active"); mainDate.disabled=false; mainShift.disabled=false; staffTasksSection.style.display='none'; buildSupervisorTabs(); refreshAll(); } else { supervisorRoleBtn.classList.remove("active"); staffRoleBtn.classList.add("active"); mainDate.disabled=true; mainShift.disabled=true; buildStaffTabs(); refreshAll(); renderTasks(); } }
    function verifyPassword(){ const pwd = supervisorPassword.value; const valid = (typeof SUPERVISOR_PASSWORD !== 'undefined' && pwd === SUPERVISOR_PASSWORD) || (pwd === "Admin123"); if(valid){ isSupervisor=true; passwordModal.classList.add('hidden'); setRole("supervisor"); } else passwordError.innerText="Wrong password"; }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    async function init(){ const savedDate=localStorage.getItem('selectedDate'), savedShift=localStorage.getItem('selectedShift'); currentDate=savedDate||new Date().toISOString().slice(0,10); currentShift=savedShift||""; if(mainDate) mainDate.value=currentDate; if(mainShift) mainShift.value=currentShift; if(firestoreReady){ await loadGlobalTasks(); await loadStaff(); await refreshAll(); } mainDate.addEventListener('change',onDateShiftChange); mainShift.addEventListener('change',onDateShiftChange); staffRoleBtn.addEventListener('click',()=>setRole("staff")); supervisorRoleBtn.addEventListener('click',()=>setRole("supervisor")); closeShiftBtn.addEventListener('click',closeShift); reopenShiftBtn.addEventListener('click',reopenShiftFn); verifyPasswordBtn.addEventListener('click',verifyPassword); cancelPasswordBtn.addEventListener('click',()=>passwordModal.classList.add('hidden')); exportFullPdfBtn.addEventListener('click',()=>alert("Report ready")); printAllocationBtn.addEventListener('click',()=>alert("Print preview")); setRole("staff"); }
    const deviceModal=document.getElementById('deviceAuthModal'), devicePasswordInput=document.getElementById('devicePasswordInput'), authorizeDeviceBtn=document.getElementById('authorizeDeviceBtn'), deviceAuthError=document.getElementById('deviceAuthError'), appContainer=document.getElementById('appContainer');
    function handleDeviceAuth(){ if(authorizeDevice(devicePasswordInput.value)){ deviceModal.style.display='none'; appContainer.style.display='block'; init(); } else { deviceAuthError.textContent='Invalid password.'; devicePasswordInput.value=''; devicePasswordInput.focus(); } }
    if(isDeviceAuthorized()){ deviceModal.style.display='none'; appContainer.style.display='block'; init(); } else { deviceModal.style.display='flex'; appContainer.style.display='none'; authorizeDeviceBtn.addEventListener('click',handleDeviceAuth); devicePasswordInput.addEventListener('keypress',e=>{if(e.key==='Enter') handleDeviceAuth();}); devicePasswordInput.focus(); }
</script>
