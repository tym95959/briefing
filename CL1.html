<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koveli Lounge | Daily Checklist & Shift Management</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- External Configs (if any) -->
    <script src="fire.js"></script>
    <script src="config.js"></script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f4f8 0%, #e2eaf2 100%); padding: 16px 20px; color: #1a2c3e; min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h1 { font-weight: 700; font-size: 1.4rem; background: linear-gradient(145deg, #1a4c6e, #2c6e8f); background-clip: text; -webkit-background-clip: text; color: transparent; letter-spacing: -0.3px; }
        .role-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 16px; }
        .role-btn { background: white; border: none; padding: 8px 22px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .role-btn.active { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; box-shadow: 0 4px 10px rgba(29,111,143,0.3); }
        .date-bar { background: white; border-radius: 48px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; box-shadow: 0 3px 8px rgba(0,0,0,0.04); }
        .date-selector { display: flex; gap: 12px; align-items: center; }
        .date-selector input, .date-selector select { padding: 8px 14px; border-radius: 36px; border: 1.5px solid #e2eaf2; font-size: 0.8rem; background: white; }
        .status-badge { padding: 6px 16px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
        .status-open { background: #e8f5e9; color: #2e7d32; }
        .status-closed { background: #ffebee; color: #c62828; }
        .action-buttons { display: flex; gap: 10px; }
        .pdf-btn { background: linear-gradient(135deg, #dc3545, #b71c1c); color: white; border: none; padding: 7px 16px; border-radius: 40px; font-weight: 600; font-size: 0.7rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .print-btn { background: linear-gradient(135deg, #28a745, #1e7e34); }
        .close-shift-btn, .reopen-btn { background: #c62828; border: none; padding: 6px 16px; border-radius: 40px; font-weight: 600; font-size: 0.7rem; color: white; cursor: pointer; }
        .supervisor-tabs { margin-bottom: 24px; }
        .tabs-header { display: flex; gap: 12px; border-bottom: 2px solid #cbdde9; margin-bottom: 20px; }
        .tab-btn { background: none; border: none; padding: 10px 28px; font-weight: 700; font-size: 0.85rem; color: #5f8db0; cursor: pointer; border-radius: 30px 30px 0 0; transition: 0.2s; }
        .tab-btn.active { color: #1d6f8f; background: white; border-bottom: 3px solid #1d6f8f; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sod-panel, .allocation-panel, .break-panel { background: white; border-radius: 24px; padding: 16px 20px; margin-bottom: 20px; border: 1px solid #e2eaf2; box-shadow: 0 3px 8px rgba(0,0,0,0.02); }
        .panel-title { font-weight: 800; font-size: 0.9rem; color: #1d6f8f; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .sod-staff-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .sod-staff-badge { background: #eef3fc; padding: 6px 14px; border-radius: 40px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: 1px solid #cde0ec; transition: 0.1s; }
        .sod-staff-badge.selected { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; border-color: transparent; }
        .allocation-table { width: 100%; border-collapse: collapse; font-size: 0.7rem; min-width: 650px; }
        .allocation-table th, .allocation-table td { border: 1px solid #e2eaf2; padding: 8px 6px; text-align: center; vertical-align: top; }
        .allocation-table th { background: #eef3fc; font-weight: 700; }
        .staff-name-badge { background: #eef2fa; padding: 3px 8px; border-radius: 20px; font-size: 0.65rem; display: inline-block; margin: 2px; }
        .break-card { background: #f9fcff; border-radius: 20px; padding: 12px; margin-bottom: 12px; border-left: 5px solid #ff9800; }
        .break-time-badge { background: #fff3e0; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .btn-sm { background: #ff9800; border: none; padding: 4px 12px; border-radius: 30px; font-size: 0.65rem; font-weight: 600; color: white; cursor: pointer; }
        .btn-danger-sm { background: #dc3545; }
        .task-category { margin-bottom: 20px; border-radius: 20px; overflow: hidden; border: 1px solid #e2eaf2; background: white; }
        .category-header { background: linear-gradient(135deg, #eef3fc, #e8eef5); padding: 12px 18px; font-weight: 700; font-size: 0.85rem; }
        .task-item { background: #ffffff; border-radius: 16px; padding: 12px; margin: 8px; border: 1px solid #eef2f8; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
        .action-select, .action-dropdown { padding: 6px 12px; border-radius: 30px; border: 1.5px solid #e2eaf2; font-size: 0.7rem; background: white; }
        .action-btn { background: #4caf50; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-weight: 600; font-size: 0.7rem; cursor: pointer; }
        .password-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-box { background: white; padding: 30px; border-radius: 48px; width: 340px; text-align: center; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        .password-box input { width: 100%; padding: 12px; border-radius: 40px; border: 1.5px solid #dce5ed; margin: 20px 0; font-size: 0.9rem; }
        .password-box button { background: #1d6f8f; color: white; border: none; padding: 10px; border-radius: 40px; width: 100%; margin-top: 6px; font-weight: 700; cursor: pointer; }
        .device-auth-overlay { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .device-auth-card { background: white; padding: 32px; border-radius: 56px; width: 380px; text-align: center; }
        .hidden { display: none; }
        .info-text { font-size: 0.7rem; color: #6c8eae; margin-top: 8px; }
        .staff-view-tabs { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid #cbdde9; }
        .staff-tab-btn { background: none; border: none; padding: 8px 20px; font-weight: 600; cursor: pointer; font-size: 0.8rem; color: #4c6f8c; border-radius: 30px; }
        .staff-tab-btn.active { background: #1d6f8f20; color: #1d6f8f; border-bottom: 2px solid #1d6f8f; }
        .staff-tab-pane { display: none; }
        .staff-tab-pane.active { display: block; }
        @media (max-width: 800px) { .allocation-table { font-size: 0.6rem; } }
    </style>
</head>
<body>
<div class="container" id="appContainer" style="display: none;">
    <div class="header"><h1><i class="fas fa-clipboard-list"></i> Koveli Lounge Daily Ops</h1></div>
    <div class="role-bar"><button id="staffRoleBtn" class="role-btn active"><i class="fas fa-user"></i> Staff View</button><button id="supervisorRoleBtn" class="role-btn"><i class="fas fa-user-tie"></i> Supervisor</button></div>
    <div class="date-bar">
        <div class="date-selector"><input type="date" id="mainDate" disabled><select id="mainShift" disabled><option value="">Select Shift</option><option value="Morning">🌅 Morning (07:30-15:30)</option><option value="Evening">🌙 Evening (15:30-23:30)</option></select></div>
        <div class="action-buttons"><button id="exportFullPdfBtn" class="pdf-btn"><i class="fas fa-file-pdf"></i> Report</button><button id="printAllocationBtn" class="pdf-btn print-btn"><i class="fas fa-print"></i> Allocation</button></div>
        <div><div id="shiftStatusBadge" class="status-badge status-open"><i class="fas fa-lock-open"></i> Open</div><button id="closeShiftBtn" class="close-shift-btn hidden">Close Shift</button><button id="reopenShiftBtn" class="reopen-btn hidden">Reopen</button></div>
    </div>

    <!-- Supervisor Tabs (Allocation, Management) -->
    <div id="supervisorTabs" class="supervisor-tabs hidden">
        <div class="tabs-header"><button class="tab-btn active" data-tab="allocation-tab"><i class="fas fa-users"></i> Allocation & SOD</button><button class="tab-btn" data-tab="management-tab"><i class="fas fa-cog"></i> Tasks & Staff</button></div>
        <div id="allocation-tab" class="tab-content active">
            <div class="sod-panel"><div class="panel-title"><i class="fas fa-user-check"></i> Staff on Duty (SOD)</div><div id="sodStaffList" class="sod-staff-list"></div></div>
            <div class="allocation-panel"><div class="panel-title"><i class="fas fa-clock"></i> Area Allocation (SOD only)</div><div id="allocationContainer"></div></div>
            <div class="break-panel"><div class="panel-title"><i class="fas fa-utensils"></i> Break Management (Supervisor Edit/Delete)</div><div id="supervisorBreakList"></div></div>
        </div>
        <div id="management-tab" class="tab-content"><div class="management-panel" style="padding:20px;"><!-- tasks & staff management same as original --><div class="section-title"><i class="fas fa-tasks"></i> Manage Tasks</div><div class="form-group"><label>Category</label><select id="taskCategorySelectMgr"></select></div><div class="form-group"><label>Task Name</label><input type="text" id="newTaskNameMgr" placeholder="Enter task"></div><div class="form-group"><label>Task Type</label><select id="taskTypeSelectMgr"><option value="done">✅ Single Done</option><option value="acknowledge">👥 Multi-Acknowledge (SOD)</option><option value="dropdown">📋 Dropdown</option></select></div><div class="form-group"><label>Shift Assignment</label><select id="taskShiftSelectMgr"><option value="Both">🌓 Both</option><option value="Morning">🌅 Morning</option><option value="Evening">🌙 Evening</option></select></div><div id="dropdownOptionsDivMgr" style="display:none;"><label>Options (comma)</label><input type="text" id="dropdownOptionsMgr"></div><button id="addTaskBtnMgr" class="btn-primary">+ Add Task</button><div class="section-title">📋 Existing Tasks</div><div id="taskListManager"></div><div class="section-title"><i class="fas fa-users"></i> Staff List</div><div><input type="text" id="newStaffNameMgr" placeholder="Staff name"><button id="addStaffBtnMgr" class="btn-primary">Add Staff</button></div><div id="staffListManager"></div></div></div>
    </div>

    <!-- STAFF VIEW TABS (Tasks + Allocation View + Break Entry) -->
    <div id="staffViewTabsContainer" style="margin-top: 8px;">
        <div class="staff-view-tabs" id="staffTabsHeader">
            <button class="staff-tab-btn active" data-stafftab="staff-tasks">📋 Daily Tasks</button>
            <button class="staff-tab-btn" data-stafftab="staff-allocation-view">🗂️ Allocation Overview</button>
            <button class="staff-tab-btn" data-stafftab="staff-break-entry">☕ My Break Time</button>
        </div>
        <div id="staff-tasks" class="staff-tab-pane active"><div id="tasksContainerStaff" class="checklist-full"></div></div>
        <div id="staff-allocation-view" class="staff-tab-pane"><div class="allocation-panel" style="background:#fff;"><div class="panel-title"><i class="fas fa-eye"></i> Staff Allocation (Read-only)</div><div id="staffAllocationReadonly"></div></div></div>
        <div id="staff-break-entry" class="staff-tab-pane"><div class="break-panel" style="background:#fff;"><div class="panel-title"><i class="fas fa-hourglass-half"></i> Request / Enter Break (1 hour)</div><div id="staffBreakEntryForm"></div><div id="staffBreakListHistory"></div></div></div>
    </div>
</div>

<!-- Redesigned supervisor password modal -->
<div id="passwordModal" class="password-modal hidden"><div class="password-box"><i class="fas fa-shield-alt" style="font-size:2rem;color:#1d6f8f;"></i><h3 style="margin:12px 0">Supervisor Authentication</h3><input type="password" id="supervisorPassword" placeholder="Enter secure password"><button id="verifyPasswordBtn"><i class="fas fa-unlock-alt"></i> Verify Access</button><button id="cancelPasswordBtn" style="background:#b0bed0;">Cancel</button><p id="passwordError" style="color:#c62828; margin-top:10px;"></p></div></div>
<div id="deviceAuthModal" class="device-auth-overlay"><div class="device-auth-card"><i class="fas fa-microchip fa-2x"></i><h2>Device Authorization</h2><p>Master password required</p><input type="password" id="devicePasswordInput" placeholder="Device Master Password"><button id="authorizeDeviceBtn">Authorize</button><div id="deviceAuthError" class="device-error"></div></div></div>

<script>
    const DEVICE_STORAGE_KEY = "koveli_lounge_device_authorized";
    let DEVICE_MASTER_PASSWORD = (typeof MASTER_PASSWORD_GLOBAL !== 'undefined' && MASTER_PASSWORD_GLOBAL) ? MASTER_PASSWORD_GLOBAL : (typeof SUPERVISOR_PASSWORD !== 'undefined' ? SUPERVISOR_PASSWORD : "Admin123");
    function isDeviceAuthorized() { return localStorage.getItem(DEVICE_STORAGE_KEY) === "true"; }
    function authorizeDevice(pwd) { if(pwd === DEVICE_MASTER_PASSWORD) { localStorage.setItem(DEVICE_STORAGE_KEY, "true"); return true; } return false; }
    let db, firestoreReady = false;
    try { if(typeof firebase !== 'undefined' && firebase.apps.length > 0) { db = firebase.firestore(); firestoreReady = true; } } catch(e) { console.warn(e); }
    const MORNING_SLOTS = [{ id:"slot1", name:"07:30-10:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot2", name:"10:30-13:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot3", name:"13:30-15:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] }];
    const EVENING_SLOTS = [{ id:"slot1", name:"15:30-18:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot2", name:"18:30-21:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot3", name:"21:30-23:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] }];
    let currentRole = "staff", currentDate = new Date().toISOString().slice(0,10), currentShift = "", currentSODRecord = null, currentTaskRecord = null, globalTasks = [], staffList = [], isSupervisor = false, sodStaffNames = [];
    // Break storage: key = break_${date}_${shift}
    let currentBreaks = []; // {staffName, breakStart, breakEnd, note, id}
    async function loadBreaks() { if(!firestoreReady || !currentDate || !currentShift) return; const docRef = db.collection("shiftBreaks").doc(`${currentDate}_${currentShift}`); const snap = await docRef.get(); if(snap.exists) currentBreaks = snap.data().breaks || []; else currentBreaks = []; renderBreakUI(); }
    async function saveBreaks() { if(!firestoreReady) return; const docRef = db.collection("shiftBreaks").doc(`${currentDate}_${currentShift}`); await docRef.set({ breaks: currentBreaks, updatedAt: new Date() }, { merge: true }); renderBreakUI(); }
    async function addBreak(staffName, breakStart, breakEnd) { if(!staffName || !breakStart || !breakEnd) return false; if(!sodStaffNames.includes(staffName) && currentRole !== "supervisor") { alert("You must be on duty (SOD) to add break."); return false; } const exists = currentBreaks.find(b => b.staffName === staffName); if(exists) { alert(`${staffName} already has a break today. Supervisor can edit.`); return false; } currentBreaks.push({ id: Date.now().toString(), staffName, breakStart, breakEnd, note: "1h break" }); await saveBreaks(); return true; }
    async function removeBreak(breakId) { currentBreaks = currentBreaks.filter(b => b.id !== breakId); await saveBreaks(); }
    async function updateBreak(breakId, newStart, newEnd) { const idx = currentBreaks.findIndex(b => b.id === breakId); if(idx!==-1) { currentBreaks[idx].breakStart = newStart; currentBreaks[idx].breakEnd = newEnd; await saveBreaks(); } }
    function renderBreakUI() { const isSuper = currentRole === "supervisor"; const container = document.getElementById('supervisorBreakList'); const staffBreakHistory = document.getElementById('staffBreakListHistory'); if(isSuper && container) { container.innerHTML = `<div class="info-text">📋 Manage breaks (edit/delete)</div>` + currentBreaks.map(b => `<div class="break-card"><strong>${escapeHtml(b.staffName)}</strong><div>🕒 ${b.breakStart} → ${b.breakEnd}</div><div><button class="btn-sm edit-break-sup" data-id="${b.id}" data-start="${b.breakStart}" data-end="${b.breakEnd}">✏️ Edit</button> <button class="btn-sm btn-danger-sm del-break-sup" data-id="${b.id}">🗑 Delete</button></div></div>`).join('') || "<div class='info-text'>No breaks recorded.</div>"; document.querySelectorAll('.del-break-sup').forEach(btn => btn.addEventListener('click', async() => { await removeBreak(btn.getAttribute('data-id')); })); document.querySelectorAll('.edit-break-sup').forEach(btn => btn.addEventListener('click', async() => { const id = btn.getAttribute('data-id'); const newStart = prompt("New start time (HH:MM)", btn.getAttribute('data-start')); const newEnd = prompt("New end time (HH:MM)", btn.getAttribute('data-end')); if(newStart && newEnd) await updateBreak(id, newStart, newEnd); })); }
    if(staffBreakHistory) { const showBreaksForStaff = () => { if(!staffBreakHistory) return; const staffName = "staffPlaceholder"; let userStaff = ""; if(currentRole === "staff" && staffList.length) { const sel = document.getElementById('staffBreakSelector'); if(sel) userStaff = sel.value; else userStaff = staffList[0]?.name || ""; } else userStaff = ""; const filtered = currentBreaks.filter(b => b.staffName === userStaff); staffBreakHistory.innerHTML = `<div class="info-text">📌 Your breaks today:</div>` + filtered.map(b => `<div class="break-card">${b.breakStart} → ${b.breakEnd}</div>`).join('') || "<div>No break entry yet.</div>"; }; setTimeout(showBreaksForStaff, 100); }
    
    function renderStaffBreakForm() { const formDiv = document.getElementById('staffBreakEntryForm'); if(!formDiv) return; const staffOptions = staffList.map(s => `<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`).join(''); formDiv.innerHTML = `<div class="flex-row"><select id="breakStaffSelect" class="action-select">${staffOptions}</select><input type="time" id="breakStartTime" class="action-input" value="12:00"><span>→</span><input type="time" id="breakEndTime" class="action-input" value="13:00"><button id="submitBreakBtn" class="action-btn">Set 1h Break</button></div><div class="info-text">Only SOD staff can submit. Supervisor can override.</div>`; document.getElementById('submitBreakBtn')?.addEventListener('click', async() => { const staff = document.getElementById('breakStaffSelect').value; const start = document.getElementById('breakStartTime').value; const end = document.getElementById('breakEndTime').value; if(staff && start && end) { await addBreak(staff, start, end); renderStaffBreakForm(); renderBreakUI(); if(document.getElementById('staffBreakListHistory')) renderStaffBreakHistory(); } else alert("Complete fields"); }); }
    function renderStaffBreakHistory() { const histDiv = document.getElementById('staffBreakListHistory'); if(!histDiv) return; const staffSel = document.getElementById('breakStaffSelect')?.value || (staffList[0]?.name || ""); const myBreaks = currentBreaks.filter(b => b.staffName === staffSel); histDiv.innerHTML = `<div class="info-text">🍽️ Your breaks:</div>` + (myBreaks.length ? myBreaks.map(b => `<div class="break-card">${b.breakStart} - ${b.breakEnd}</div>`).join('') : "<div>No break scheduled.</div>"); }
    
    // core helpers: same as original with added break listeners
    function getSODRecordId(date, shift) { return `sod_${date}_${shift}`.replace(/\s/g, '_'); }
    async function loadSODStaff() { const id = `sod_staff_${currentDate}_${currentShift}`.replace(/\s/g,'_'); if(!firestoreReady) return; const doc=await db.collection("sodStaffRecords").doc(id).get(); sodStaffNames=doc.exists?doc.data().staffNames||[]:[]; renderSODPanel(); }
    async function saveSODStaff(staffNames){ const id=`sod_staff_${currentDate}_${currentShift}`.replace(/\s/g,'_'); await db.collection("sodStaffRecords").doc(id).set({staffNames,date:currentDate,shift:currentShift}); sodStaffNames=staffNames; renderSODPanel(); renderAllocation(); renderTasksStaff(); }
    function renderSODPanel(){ if(currentRole!=="supervisor") return; const container = document.getElementById('sodStaffList'); if(!container) return; container.innerHTML = staffList.map(s => `<span class="sod-staff-badge ${sodStaffNames.includes(s.name) ? 'selected' : ''}" data-name="${escapeHtml(s.name)}"><i class="fas fa-user-check"></i> ${escapeHtml(s.name)}</span>`).join(''); document.querySelectorAll('.sod-staff-badge').forEach(el=>el.addEventListener('click',async()=>{ const name=el.getAttribute('data-name'); let newList=[...sodStaffNames]; if(newList.includes(name)) newList=newList.filter(n=>n!==name); else newList.push(name); await saveSODStaff(newList); })); }
    async function loadSODAllocation(){ if(!firestoreReady||!currentDate||!currentShift) return; const id=getSODRecordId(currentDate,currentShift); const doc=await db.collection("sodRecords").doc(id).get(); if(doc.exists) currentSODRecord={id:doc.id,...doc.data()}; else { const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS, allocations={}; slots.forEach(slot=>{ allocations[slot.id]={}; slot.areas.forEach(area=>allocations[slot.id][area]=[]); }); currentSODRecord={date:currentDate,shift:currentShift,allocations}; await db.collection("sodRecords").doc(id).set(currentSODRecord); currentSODRecord.id=id; } renderAllocation(); renderStaffAllocationReadonly(); }
    function renderAllocation(){ if(!currentSODRecord||!allocationContainer) return; const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS, canEdit=currentRole==="supervisor"&&currentTaskRecord?.status!=="closed"; let html='<table class="allocation-table"><thead><th>Area/Time</th>'+slots.map(s=>`<th>${s.name}</th>`).join('')+'</thead><tbody>'; const areas=["Welcome/Boarding","Reception","Buffet","Floor","Pantry"]; areas.forEach(area=>{ html+=`<tr><td class="area-col"><strong>${area}</strong></td>`; slots.forEach(slot=>{ const assigned=(currentSODRecord.allocations[slot.id]?.[area])||[]; let staffHtml=''; if(canEdit){ let opt=`<option value="">--Select SOD--</option>`+sodStaffNames.map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join(''); staffHtml=`<div class="assign-wrapper"><select class="staff-select-small" id="sel_${slot.id}_${area.replace(/\s/g,'_')}">${opt}</select><button class="assign-small-btn assign-btn" data-slot="${slot.id}" data-area="${area}">Assign</button></div>`; } html+=`<td>${assigned.map(s=>`<span class="staff-name-badge">👤 ${escapeHtml(s)} ${canEdit?`<button class="remove-staff" data-slot="${slot.id}" data-area="${area}" data-staff="${escapeHtml(s)}">✖</button>`:''}</span>`).join('')}${staffHtml}</td>`; }); html+='<\/tr>'; }); html+='</tbody>\\u003C/table>'; allocationContainer.innerHTML=html; if(canEdit){ document.querySelectorAll('.assign-btn').forEach(btn=>btn.addEventListener('click',async()=>{ const slot=btn.getAttribute('data-slot'),area=btn.getAttribute('data-area'),sel=document.getElementById(`sel_${slot}_${area.replace(/\s/g,'_')}`); if(sel&&sel.value) await assignStaff(slot,area,sel.value); })); document.querySelectorAll('.remove-staff').forEach(btn=>btn.addEventListener('click',async()=>{ await removeStaff(btn.getAttribute('data-slot'),btn.getAttribute('data-area'),btn.getAttribute('data-staff')); })); } }
    async function assignStaff(slotId,area,staffName){ if(!currentSODRecord||!sodStaffNames.includes(staffName)) return; const alloc={...currentSODRecord.allocations}; if(!alloc[slotId]) alloc[slotId]={}; if(!alloc[slotId][area]) alloc[slotId][area]=[]; if(!alloc[slotId][area].includes(staffName)) alloc[slotId][area].push(staffName); await db.collection("sodRecords").doc(currentSODRecord.id).set({allocations:alloc},{merge:true}); currentSODRecord.allocations=alloc; renderAllocation(); renderStaffAllocationReadonly(); }
    async function removeStaff(slotId,area,staffName){ const alloc={...currentSODRecord.allocations}; if(alloc[slotId]?.[area]){ alloc[slotId][area]=alloc[slotId][area].filter(s=>s!==staffName); await db.collection("sodRecords").doc(currentSODRecord.id).set({allocations:alloc},{merge:true}); currentSODRecord.allocations=alloc; renderAllocation(); renderStaffAllocationReadonly(); } }
    function renderStaffAllocationReadonly(){ const container=document.getElementById('staffAllocationReadonly'); if(!container||currentRole!=="staff") return; if(!currentSODRecord){ container.innerHTML="<div class='empty-msg'>No allocation data</div>"; return; } const slots=currentShift==="Morning"?MORNING_SLOTS:EVENING_SLOTS; let html='<table class="allocation-table"><thead><th>Area/Time</th>'+slots.map(s=>`<th>${s.name}</th>`).join('')+'</thead><tbody>'; const areas=["Welcome/Boarding","Reception","Buffet","Floor","Pantry"]; areas.forEach(area=>{ html+=`<tr><td><strong>${area}</strong></td>`; slots.forEach(slot=>{ const assigned=(currentSODRecord.allocations[slot.id]?.[area])||[]; html+=`<td>${assigned.map(s=>`<span class="staff-name-badge">👤 ${escapeHtml(s)}</span>`).join('')||'—'}</td>`; }); html+='<\/tr>'; }); html+='</tbody>\\u003C/table>'; container.innerHTML=html; }
    async function loadGlobalTasks(){ const doc=await db.collection("globalConfig").doc("tasks").get(); globalTasks=doc.exists?doc.data().tasks||[]:[]; renderTaskManager(); renderTasksStaff(); }
    async function saveGlobalTasks(tasks){ await db.collection("globalConfig").doc("tasks").set({tasks}); globalTasks=tasks; renderTaskManager(); renderTasksStaff(); }
    async function loadTaskRecord(){ const id=`tasks_${currentDate}_${currentShift}`.replace(/\s/g,'_'); const doc=await db.collection("taskRecords").doc(id).get(); if(doc.exists) currentTaskRecord={id:doc.id,...doc.data()}; else currentTaskRecord={date:currentDate,shift:currentShift,status:"open",doneTasks:{},acknowledgedTasks:{},dropdownSelections:[]}; await db.collection("taskRecords").doc(id).set(currentTaskRecord,{merge:true}); updateShiftStatusUI(); renderTasksStaff(); }
    function updateShiftStatusUI(){ const closed=currentTaskRecord?.status==="closed"; document.getElementById('shiftStatusBadge').innerHTML=closed?'<i class="fas fa-lock"></i> Closed':'<i class="fas fa-lock-open"></i> Open'; document.getElementById('closeShiftBtn')?.classList.toggle('hidden',!closed||currentRole!=="supervisor"); document.getElementById('reopenShiftBtn')?.classList.toggle('hidden',!closed||currentRole!=="supervisor"); }
    async function completeTask(taskId,staffName){ if(currentTaskRecord.status==="closed"){alert("Shift closed");return;} if(!staffName) return; const done={...currentTaskRecord.doneTasks}; if(done[taskId]) return; done[taskId]={doneBy:staffName,doneAt:new Date().toISOString()}; await db.collection("taskRecords").doc(currentTaskRecord.id).set({doneTasks:done},{merge:true}); currentTaskRecord.doneTasks=done; renderTasksStaff(); }
    async function acknowledgeTask(taskId,staffName){ if(!sodStaffNames.includes(staffName)){alert("Only SOD staff can acknowledge");return;} const ack={...currentTaskRecord.acknowledgedTasks}; let arr=ack[taskId]||[]; if(arr.includes(staffName)) return; arr.push(staffName); ack[taskId]=arr; await db.collection("taskRecords").doc(currentTaskRecord.id).set({acknowledgedTasks:ack},{merge:true}); currentTaskRecord.acknowledgedTasks=ack; renderTasksStaff(); }
    async function submitDropdown(taskId,val,note,staffName){ if(!val||!staffName) return; const sel=[...(currentTaskRecord.dropdownSelections||[])]; sel.push({taskId,staffName,selectedValue:val,additionalText:note||""}); await db.collection("taskRecords").doc(currentTaskRecord.id).set({dropdownSelections:sel},{merge:true}); currentTaskRecord.dropdownSelections=sel; renderTasksStaff(); }
    function renderTasksStaff(){ const container=document.getElementById('tasksContainerStaff'); if(!container) return; if(!currentTaskRecord){ container.innerHTML="<div>Select shift</div>"; return; } const filtered=globalTasks.filter(t=>(t.shift||"Both")===currentShift||(t.shift||"Both")==="Both"); container.innerHTML=filtered.map(task=>{ const isDone=!!currentTaskRecord.doneTasks[task.id]; const acks=currentTaskRecord.acknowledgedTasks[task.id]||[]; const selections=(currentTaskRecord.dropdownSelections||[]).filter(s=>s.taskId===task.id); const pending=!isDone && ((task.type==='done'&&!isDone)||(task.type==='acknowledge'&&acks.length===0)||(task.type==='dropdown'&&selections.length===0)); let actionHtml=""; if(currentTaskRecord.status!=="closed"){ const staffOpts=`<select id="staff_sel_${task.id}" class="action-select">${staffList.map(s=>`<option value="${escapeHtml(s.name)}">${escapeHtml(s.name)}</option>`).join('')}</select>`; if(task.type==='done') actionHtml=`<div class="flex-row">${staffOpts}<button class="do-done-btn" data-id="${task.id}">Complete</button></div>`; else if(task.type==='acknowledge') actionHtml=`<div class="flex-row">${staffOpts}<button class="do-ack-btn" data-id="${task.id}">Acknowledge</button></div>`; else if(task.type==='dropdown') actionHtml=`<div class="flex-row">${staffOpts}<select id="drop_${task.id}" class="action-dropdown">${task.options?.map(o=>`<option>${escapeHtml(o)}</option>`).join('')||''}</select><input id="note_${task.id}" placeholder="note" class="action-input"><button class="do-drop-btn" data-id="${task.id}">Submit</button></div>`; } return `<div class="task-item"><div><strong>${escapeHtml(task.name)}</strong> ${pending?'<span class="pending-indicator">Pending</span>':''}</div>${actionHtml}</div>`; }).join(''); document.querySelectorAll('.do-done-btn').forEach(btn=>btn.addEventListener('click',()=>completeTask(btn.dataset.id,document.getElementById(`staff_sel_${btn.dataset.id}`).value))); document.querySelectorAll('.do-ack-btn').forEach(btn=>btn.addEventListener('click',()=>acknowledgeTask(btn.dataset.id,document.getElementById(`staff_sel_${btn.dataset.id}`).value))); document.querySelectorAll('.do-drop-btn').forEach(btn=>btn.addEventListener('click',()=>submitDropdown(btn.dataset.id,document.getElementById(`drop_${btn.dataset.id}`).value,document.getElementById(`note_${btn.dataset.id}`).value,document.getElementById(`staff_sel_${btn.dataset.id}`).value))); }
    function renderTaskManager(){ /* keep original logic */ const taskDiv=document.getElementById('taskListManager'); if(taskDiv) taskDiv.innerHTML=globalTasks.map(t=>`<div>${t.name} [${t.shift}] <button class="btn-warning edit-task-btn" data-id="${t.id}">Edit Shift</button></div>`).join(''); }
    async function loadStaff(){ const snap=await db.collection("staff").orderBy("name").get(); staffList=snap.docs.map(d=> ({id:d.id,name:d.data().name})); renderStaffManager(); renderSODPanel(); renderStaffBreakForm(); }
    function renderStaffManager(){ const mgrDiv=document.getElementById('staffListManager'); if(mgrDiv) mgrDiv.innerHTML=staffList.map(s=>`<div class="staff-card">${escapeHtml(s.name)} <button class="delete-staff-mgr" data-id="${s.id}">❌</button></div>`).join(''); }
    async function refreshAll(){ await loadSODStaff(); await loadSODAllocation(); await loadTaskRecord(); await loadBreaks(); renderStaffBreakForm(); }
    function setRole(role){ if(role==="supervisor"&&!isSupervisor){ passwordModal.classList.remove('hidden'); return; } currentRole=role; document.getElementById('staffRoleBtn').classList.toggle('active',role==='staff'); document.getElementById('supervisorRoleBtn').classList.toggle('active',role==='supervisor'); document.getElementById('supervisorTabs')?.classList.toggle('hidden',role!=='supervisor'); document.getElementById('staffViewTabsContainer').style.display=role==='staff'?'block':'none'; if(role==='supervisor'){ document.getElementById('mainDate').disabled=false; document.getElementById('mainShift').disabled=false; refreshAll(); } else { document.getElementById('mainDate').disabled=true; document.getElementById('mainShift').disabled=true; renderTasksStaff(); renderStaffAllocationReadonly(); } renderAllocation(); }
    async function onDateShiftChange(){ currentDate=document.getElementById('mainDate').value; currentShift=document.getElementById('mainShift').value; localStorage.setItem('selectedDate',currentDate); localStorage.setItem('selectedShift',currentShift); await refreshAll(); renderStaffBreakForm(); }
    function initEventListeners(){ document.getElementById('mainDate').addEventListener('change',onDateShiftChange); document.getElementById('mainShift').addEventListener('change',onDateShiftChange); document.getElementById('staffRoleBtn').addEventListener('click',()=>setRole("staff")); document.getElementById('supervisorRoleBtn').addEventListener('click',()=>setRole("supervisor")); document.getElementById('addTaskBtnMgr')?.addEventListener('click',async()=>{ if(newTaskNameMgr.value){ const newTask={id:Date.now().toString(),name:newTaskNameMgr.value,category:taskCategorySelectMgr.value,type:taskTypeSelectMgr.value,shift:taskShiftSelectMgr.value,options:taskTypeSelectMgr.value==='dropdown'?dropdownOptionsMgr.value.split(','):null}; await saveGlobalTasks([...globalTasks,newTask]); newTaskNameMgr.value=""; } }); document.getElementById('addStaffBtnMgr')?.addEventListener('click',async()=>{ if(newStaffNameMgr.value.trim()){ await db.collection("staff").add({name:newStaffNameMgr.value.trim()}); await loadStaff(); newStaffNameMgr.value=""; } }); document.getElementById('closeShiftBtn')?.addEventListener('click',async()=>{ if(currentTaskRecord) await db.collection("taskRecords").doc(currentTaskRecord.id).set({status:"closed"},{merge:true}); refreshAll(); }); document.getElementById('reopenShiftBtn')?.addEventListener('click',async()=>{ if(currentTaskRecord) await db.collection("taskRecords").doc(currentTaskRecord.id).set({status:"open"},{merge:true}); refreshAll(); }); document.getElementById('verifyPasswordBtn').addEventListener('click',()=>{ const pwd=document.getElementById('supervisorPassword').value; if(pwd===DEVICE_MASTER_PASSWORD||pwd==="Admin123"){ isSupervisor=true; passwordModal.classList.add('hidden'); setRole("supervisor"); } else document.getElementById('passwordError').innerText="Wrong password"; }); document.getElementById('cancelPasswordBtn').addEventListener('click',()=>passwordModal.classList.add('hidden')); document.querySelectorAll('.staff-tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.staff-tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const tabId=btn.getAttribute('data-stafftab'); document.querySelectorAll('.staff-tab-pane').forEach(p=>p.classList.remove('active')); document.getElementById(tabId).classList.add('active'); })); }
    async function init(){ const savedDate=localStorage.getItem('selectedDate'),savedShift=localStorage.getItem('selectedShift'); if(savedDate) currentDate=savedDate; if(savedShift) currentShift=savedShift; document.getElementById('mainDate').value=currentDate; document.getElementById('mainShift').value=currentShift; if(firestoreReady){ await loadGlobalTasks(); await loadStaff(); await refreshAll(); } initEventListeners(); setRole("staff"); }
    const deviceModal=document.getElementById('deviceAuthModal'); const devicePasswordInput=document.getElementById('devicePasswordInput'); const authorizeDeviceBtn=document.getElementById('authorizeDeviceBtn'); const appContainer=document.getElementById('appContainer');
    if(isDeviceAuthorized()){ deviceModal.style.display='none'; appContainer.style.display='block'; init(); } else { deviceModal.style.display='flex'; authorizeDeviceBtn.addEventListener('click',()=>{ if(authorizeDevice(devicePasswordInput.value)){ deviceModal.style.display='none'; appContainer.style.display='block'; init(); } else document.getElementById('deviceAuthError').innerText="Invalid master password"; }); }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
</script>
