<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koveli Lounge | Task Manager - Resolved Tab & Filters</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- External config files -->
    <script src="fire.js"></script>
    <script src="config.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%); padding: 20px; min-height: 100vh; }
        .app-container { max-width: 1600px; margin: 0 auto; }
        
        /* Header */
        .header { background: white; border-radius: 28px; padding: 20px 28px; margin-bottom: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #1a4c6e, #2c7da0); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header h1 i { color: #2c7da0; margin-right: 8px; }
        
        /* Filter Bar */
        .filter-bar { background: white; border-radius: 20px; padding: 16px 24px; margin-bottom: 24px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .filter-group { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .filter-group label { font-size: 0.75rem; font-weight: 600; color: #4a5568; }
        .filter-group select, .filter-group input { padding: 8px 16px; border-radius: 30px; border: 1.5px solid #e2e8f0; font-size: 0.8rem; background: white; cursor: pointer; outline: none; }
        .filter-group select:focus, .filter-group input:focus { border-color: #2c7da0; }
        .stats-badge { background: linear-gradient(135deg, #1a4c6e, #2c7da0); color: white; padding: 8px 20px; border-radius: 30px; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 12px; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { background: none; border: none; padding: 12px 28px; font-size: 0.9rem; font-weight: 600; color: #7c9ab8; cursor: pointer; border-radius: 30px 30px 0 0; transition: all 0.3s; }
        .tab-btn.active { color: #1d6f8f; background: white; border-bottom: 3px solid #1d6f8f; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Task Cards Grid */
        .tasks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-top: 20px; }
        .task-card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 5px solid; transition: all 0.2s; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .task-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .task-title { font-weight: 700; font-size: 1rem; color: #1a2c3e; flex: 1; }
        .priority-badge { font-size: 0.65rem; font-weight: 700; padding: 4px 12px; border-radius: 30px; }
        .priority-high { background: #fee2e2; color: #dc2626; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #dcfce7; color: #16a34a; }
        .task-meta { display: flex; gap: 15px; font-size: 0.65rem; color: #94a3b8; margin: 10px 0; flex-wrap: wrap; }
        .task-desc { font-size: 0.75rem; color: #4a5568; margin: 10px 0; line-height: 1.4; }
        .task-actions { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
        .btn-resolve { background: #22c55e; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-resolve:hover { background: #16a34a; transform: scale(0.98); }
        .btn-reopen { background: #f59e0b; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 6px 16px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .resolution-info { background: #f0fdf4; padding: 8px 12px; border-radius: 12px; margin-top: 10px; font-size: 0.65rem; color: #166534; }
        .empty-state { text-align: center; padding: 60px; color: #94a3b8; font-size: 0.85rem; }
        
        /* Fab Button */
        .fab { position: fixed; bottom: 30px; right: 30px; background: linear-gradient(135deg, #1a4c6e, #2c7da0); width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.6rem; box-shadow: 0 8px 20px rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s; z-index: 100; border: none; }
        .fab:hover { transform: scale(1.05); background: #2c7da0; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 28px; width: 550px; max-width: 92%; padding: 28px; }
        .modal-content h2 { font-size: 1.3rem; margin-bottom: 20px; color: #1a4c6e; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 600; margin-bottom: 6px; color: #4a5568; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 14px; border-radius: 16px; border: 1.5px solid #e2e8f0; font-size: 0.85rem; outline: none; }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 12px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #2c7da0; color: white; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        
        .loading { text-align: center; padding: 40px; }
        .sync-status { font-size: 0.7rem; padding: 6px 12px; border-radius: 20px; background: #e2e8f0; display: inline-flex; align-items: center; gap: 6px; }
        
        @media (max-width: 768px) {
            .tasks-grid { grid-template-columns: 1fr; }
            .filter-group { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-clipboard-list"></i> Koveli Lounge Task Manager</h1>
        <div class="sync-status" id="syncStatus"><i class="fas fa-circle"></i> Connected</div>
    </div>
    
    <div class="filter-bar">
        <div class="filter-group">
            <label><i class="fas fa-calendar"></i> Due Date:</label>
            <select id="dateFilter">
                <option value="all">📅 All Dates</option>
            </select>
        </div>
        <div class="filter-group">
            <label><i class="fas fa-flag"></i> Priority:</label>
            <select id="priorityFilter">
                <option value="all">🎯 All Priorities</option>
                <option value="high">🔴 High</option>
                <option value="medium">🟠 Medium</option>
                <option value="low">🟢 Low</option>
            </select>
        </div>
        <div class="stats-badge">
            <i class="fas fa-chart-line"></i>
            <span id="totalStats">0 tasks</span>
        </div>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" data-tab="pending">📋 Pending Tasks</button>
        <button class="tab-btn" data-tab="resolved">✅ Resolved Tasks</button>
    </div>
    
    <div id="pending-tab" class="tab-content active">
        <div id="pendingTasks" class="tasks-grid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading tasks...</div>
        </div>
    </div>
    
    <div id="resolved-tab" class="tab-content">
        <div id="resolvedTasks" class="tasks-grid">
            <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading tasks...</div>
        </div>
    </div>
</div>

<button class="fab" id="addTaskBtn"><i class="fas fa-plus"></i></button>

<div class="modal" id="taskModal">
    <div class="modal-content">
        <h2 id="modalTitle"><i class="fas fa-plus-circle"></i> Create New Task</h2>
        <div class="form-group">
            <label>Task Title *</label>
            <input type="text" id="taskTitle" placeholder="Enter task title">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="taskDesc" rows="3" placeholder="Task description..."></textarea>
        </div>
        <div class="form-group">
            <label>Priority *</label>
            <select id="taskPriority">
                <option value="high">🔴 High</option>
                <option value="medium" selected>🟠 Medium</option>
                <option value="low">🟢 Low</option>
            </select>
        </div>
        <div class="form-group">
            <label>Due Date *</label>
            <input type="date" id="taskDueDate">
        </div>
        <div class="modal-buttons">
            <button class="btn-primary" id="saveTaskBtn">Save Task</button>
            <button class="btn-secondary" id="closeModalBtn">Cancel</button>
        </div>
    </div>
</div>

<script>
    // Firebase initialization
    let db = null;
    let firestoreReady = false;
    let allTasks = [];
    let editingTaskId = null;
    
    // DOM elements
    const pendingContainer = document.getElementById("pendingTasks");
    const resolvedContainer = document.getElementById("resolvedTasks");
    const dateFilter = document.getElementById("dateFilter");
    const priorityFilter = document.getElementById("priorityFilter");
    const syncStatus = document.getElementById("syncStatus");
    const totalStats = document.getElementById("totalStats");
    const addTaskBtn = document.getElementById("addTaskBtn");
    const taskModal = document.getElementById("taskModal");
    const modalTitle = document.getElementById("modalTitle");
    const taskTitleInput = document.getElementById("taskTitle");
    const taskDescInput = document.getElementById("taskDesc");
    const taskPriorityInput = document.getElementById("taskPriority");
    const taskDueDateInput = document.getElementById("taskDueDate");
    const saveTaskBtn = document.getElementById("saveTaskBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");
    
    // Tab elements
    const tabBtns = document.querySelectorAll(".tab-btn");
    const tabContents = document.querySelectorAll(".tab-content");
    let currentTab = "pending";
    
    // Initialize Firebase
    function initFirebase() {
        try {
            if (typeof firebase !== 'undefined' && firebase.apps.length > 0) {
                db = firebase.firestore();
                firestoreReady = true;
                console.log("✅ Firebase connected");
                updateSyncStatus(true, "Connected");
                return true;
            }
            
            // Fallback config (replace with your actual config)
            const firebaseConfig = {
                apiKey: "AIzaSyB7JQy3FzY5xQ8wE9rT0yU1iO2pA3sD4fG5hJ6kL",
                authDomain: "koveli-lounge.firebaseapp.com",
                projectId: "koveli-lounge",
                storageBucket: "koveli-lounge.appspot.com",
                messagingSenderId: "123456789012",
                appId: "1:123456789012:web:abc123def456"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                firestoreReady = true;
                console.log("✅ Firebase initialized with config");
                updateSyncStatus(true, "Connected");
                return true;
            }
        } catch (error) {
            console.error("Firebase init error:", error);
            updateSyncStatus(false, error.message);
            return false;
        }
        return false;
    }
    
    function updateSyncStatus(connected, message) {
        if (connected) {
            syncStatus.innerHTML = `<i class="fas fa-check-circle" style="color:#22c55e;"></i> ${message}`;
            syncStatus.style.background = "#dcfce7";
        } else {
            syncStatus.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ef4444;"></i> ${message}`;
            syncStatus.style.background = "#fee2e2";
        }
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    function formatDate(dateStr) {
        if (!dateStr) return "No date";
        const d = new Date(dateStr);
        return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    }
    
    function formatDateTime(iso) {
        if (!iso) return "—";
        try {
            return new Date(iso).toLocaleString();
        } catch(e) {
            return iso;
        }
    }
    
    function getPriorityClass(priority) {
        if (priority === 'high') return 'priority-high';
        if (priority === 'medium') return 'priority-medium';
        return 'priority-low';
    }
    
    function getPriorityIcon(priority) {
        if (priority === 'high') return '🔴 High';
        if (priority === 'medium') return '🟠 Medium';
        return '🟢 Low';
    }
    
    // Update date filter dropdown with unique dates
    function updateDateFilter() {
        const dates = new Set();
        allTasks.forEach(task => {
            if (task.dueDate) dates.add(task.dueDate);
        });
        const sortedDates = Array.from(dates).sort();
        let options = '<option value="all">📅 All Dates</option>';
        sortedDates.forEach(d => {
            const count = allTasks.filter(t => t.dueDate === d).length;
            options += `<option value="${d}">📆 ${d} (${count})</option>`;
        });
        dateFilter.innerHTML = options;
    }
    
    // Filter tasks based on date, priority, and resolved status
    function getFilteredTasks(resolved = false) {
        let filtered = allTasks.filter(t => t.resolved === resolved);
        
        const dateVal = dateFilter.value;
        if (dateVal !== 'all') {
            filtered = filtered.filter(t => t.dueDate === dateVal);
        }
        
        const priorityVal = priorityFilter.value;
        if (priorityVal !== 'all') {
            filtered = filtered.filter(t => t.priority === priorityVal);
        }
        
        return filtered;
    }
    
    // Render tasks for current tab
    function renderTasks() {
        const isPendingTab = currentTab === "pending";
        const tasks = getFilteredTasks(!isPendingTab);
        
        const container = isPendingTab ? pendingContainer : resolvedContainer;
        
        if (tasks.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><br>No ${isPendingTab ? 'pending' : 'resolved'} tasks found</div>`;
            return;
        }
        
        container.innerHTML = tasks.map(task => `
            <div class="task-card" style="border-left-color: ${task.priority === 'high' ? '#dc2626' : task.priority === 'medium' ? '#f59e0b' : '#10b981'}">
                <div class="task-header">
                    <div class="task-title">${escapeHtml(task.title)}</div>
                    <span class="priority-badge ${getPriorityClass(task.priority)}">${getPriorityIcon(task.priority)}</span>
                </div>
                ${task.description ? `<div class="task-desc">📝 ${escapeHtml(task.description.substring(0, 100))}${task.description.length > 100 ? '...' : ''}</div>` : ''}
                <div class="task-meta">
                    <span><i class="far fa-calendar-alt"></i> Due: ${formatDate(task.dueDate)}</span>
                    <span><i class="far fa-clock"></i> Created: ${formatDateTime(task.createdAt)}</span>
                </div>
                ${task.resolved && task.resolvedBy ? `
                    <div class="resolution-info">
                        <i class="fas fa-check-circle"></i> Resolved by: ${escapeHtml(task.resolvedBy)}<br>
                        <i class="fas fa-calendar"></i> Resolved: ${formatDateTime(task.resolvedAt)}
                        ${task.resolutionNote ? `<br><i class="fas fa-comment"></i> Note: ${escapeHtml(task.resolutionNote)}` : ''}
                    </div>
                ` : ''}
                <div class="task-actions">
                    ${!task.resolved ? `
                        <button class="btn-resolve" onclick="resolveTask('${task.id}')"><i class="fas fa-check-circle"></i> Resolve</button>
                        <button class="btn-edit" onclick="editTask('${task.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteTask('${task.id}')"><i class="fas fa-trash"></i> Delete</button>
                    ` : `
                        <button class="btn-reopen" onclick="reopenTask('${task.id}')"><i class="fas fa-undo-alt"></i> Reopen</button>
                        <button class="btn-edit" onclick="editTask('${task.id}')"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-delete" onclick="deleteTask('${task.id}')"><i class="fas fa-trash"></i> Delete</button>
                    `}
                </div>
            </div>
        `).join('');
        
        // Update stats
        const pendingCount = allTasks.filter(t => !t.resolved).length;
        const resolvedCount = allTasks.filter(t => t.resolved).length;
        totalStats.innerHTML = `${pendingCount} pending / ${resolvedCount} resolved`;
    }
    
    // CRUD Operations
    async function addTask(taskData) {
        if (!firestoreReady) return false;
        const newTask = {
            id: Date.now().toString(36) + Math.random().toString(36).substr(2, 6),
            title: taskData.title,
            description: taskData.description || "",
            priority: taskData.priority,
            dueDate: taskData.dueDate,
            resolved: false,
            resolvedBy: null,
            resolvedAt: null,
            resolutionNote: null,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        
        try {
            await db.collection("koveli_tasks").add(newTask);
            await fetchTasks();
            return true;
        } catch (error) {
            console.error("Error adding task:", error);
            alert("Failed to add task: " + error.message);
            return false;
        }
    }
    
    async function updateTask(taskId, updates) {
        if (!firestoreReady) return false;
        try {
            const taskRef = db.collection("koveli_tasks").doc(taskId);
            await taskRef.update({
                ...updates,
                updatedAt: new Date().toISOString()
            });
            await fetchTasks();
            return true;
        } catch (error) {
            console.error("Error updating task:", error);
            alert("Failed to update task: " + error.message);
            return false;
        }
    }
    
    async function resolveTask(taskId) {
        const resolver = prompt("Resolved by (staff name):", "Supervisor");
        if (!resolver || !resolver.trim()) return;
        
        const note = prompt("Resolution notes (optional):", "Task completed successfully");
        
        await updateTask(taskId, {
            resolved: true,
            resolvedBy: resolver.trim(),
            resolvedAt: new Date().toISOString(),
            resolutionNote: note || "Task completed"
        });
    }
    
    async function reopenTask(taskId) {
        if (confirm("Reopen this task? It will move back to pending.")) {
            await updateTask(taskId, {
                resolved: false,
                resolvedBy: null,
                resolvedAt: null,
                resolutionNote: null
            });
        }
    }
    
    async function deleteTask(taskId) {
        if (confirm("Delete this task permanently?")) {
            if (!firestoreReady) return;
            try {
                await db.collection("koveli_tasks").doc(taskId).delete();
                await fetchTasks();
            } catch (error) {
                console.error("Error deleting task:", error);
                alert("Failed to delete task: " + error.message);
            }
        }
    }
    
    async function fetchTasks() {
        if (!firestoreReady) return;
        
        try {
            const snapshot = await db.collection("koveli_tasks").orderBy("createdAt", "desc").get();
            const tasks = [];
            snapshot.forEach(doc => {
                tasks.push({ firebaseId: doc.id, ...doc.data() });
            });
            allTasks = tasks;
            updateDateFilter();
            renderTasks();
        } catch (error) {
            console.error("Error fetching tasks:", error);
            updateSyncStatus(false, error.message);
        }
    }
    
    // Modal handlers
    function openCreateModal() {
        editingTaskId = null;
        modalTitle.innerHTML = '<i class="fas fa-plus-circle"></i> Create New Task';
        taskTitleInput.value = "";
        taskDescInput.value = "";
        taskPriorityInput.value = "medium";
        taskDueDateInput.value = new Date().toISOString().slice(0, 10);
        taskModal.classList.add("active");
    }
    
    function editTask(taskId) {
        const task = allTasks.find(t => t.firebaseId === taskId);
        if (!task) return;
        
        editingTaskId = taskId;
        modalTitle.innerHTML = '<i class="fas fa-edit"></i> Edit Task';
        taskTitleInput.value = task.title || "";
        taskDescInput.value = task.description || "";
        taskPriorityInput.value = task.priority || "medium";
        taskDueDateInput.value = task.dueDate || "";
        taskModal.classList.add("active");
    }
    
    async function saveTask() {
        const title = taskTitleInput.value.trim();
        if (!title) {
            alert("Please enter a task title");
            return;
        }
        
        const taskData = {
            title: title,
            description: taskDescInput.value.trim(),
            priority: taskPriorityInput.value,
            dueDate: taskDueDateInput.value
        };
        
        if (editingTaskId) {
            await updateTask(editingTaskId, taskData);
        } else {
            await addTask(taskData);
        }
        
        closeModal();
    }
    
    function closeModal() {
        taskModal.classList.remove("active");
        editingTaskId = null;
    }
    
    // Tab switching
    function switchTab(tabId) {
        currentTab = tabId;
        
        tabBtns.forEach(btn => {
            if (btn.dataset.tab === tabId) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        
        tabContents.forEach(content => {
            if (content.id === `${tabId}-tab`) {
                content.classList.add("active");
            } else {
                content.classList.remove("active");
            }
        });
        
        renderTasks();
    }
    
    // Setup realtime listener
    let unsubscribe = null;
    function setupRealtimeListener() {
        if (!firestoreReady) return;
        if (unsubscribe) unsubscribe();
        
        unsubscribe = db.collection("koveli_tasks")
            .orderBy("createdAt", "desc")
            .onSnapshot((snapshot) => {
                const tasks = [];
                snapshot.forEach(doc => {
                    tasks.push({ firebaseId: doc.id, ...doc.data() });
                });
                allTasks = tasks;
                updateDateFilter();
                renderTasks();
                updateSyncStatus(true, `${tasks.length} tasks loaded`);
            }, (error) => {
                console.error("Snapshot error:", error);
                updateSyncStatus(false, error.message);
            });
    }
    
    // Event listeners
    function bindEvents() {
        addTaskBtn.addEventListener("click", openCreateModal);
        saveTaskBtn.addEventListener("click", saveTask);
        closeModalBtn.addEventListener("click", closeModal);
        dateFilter.addEventListener("change", () => renderTasks());
        priorityFilter.addEventListener("change", () => renderTasks());
        
        tabBtns.forEach(btn => {
            btn.addEventListener("click", () => switchTab(btn.dataset.tab));
        });
        
        taskModal.addEventListener("click", (e) => {
            if (e.target === taskModal) closeModal();
        });
    }
    
    // Make functions global for onclick handlers
    window.resolveTask = resolveTask;
    window.reopenTask = reopenTask;
    window.deleteTask = deleteTask;
    window.editTask = editTask;
    
    // Initialize app
    async function init() {
        bindEvents();
        initFirebase();
        
        if (firestoreReady) {
            setupRealtimeListener();
        } else {
            // Demo data for testing

    init();
</script>
