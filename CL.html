<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koveli Lounge Daily Check List | Handover Log</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- External Configuration Files (expected to exist) -->
    <script src="fire.js"></script>
    <script src="config.js"></script>
    <!-- Google Fonts + Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f0f4f8 0%, #e8eef5 100%); padding: 16px 20px; color: #1a2c3e; min-height: 100vh; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 12px; }
        .header h1 { font-weight: 700; font-size: 1.3rem; background: linear-gradient(145deg, #1a4c6e, #2c6e8f); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .role-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .role-btn { background: white; border: none; padding: 6px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 0.75rem; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .role-btn.active { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; box-shadow: 0 2px 8px rgba(29,111,143,0.3); }
        .date-bar { background: white; border-radius: 40px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .date-selector { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .date-selector input, .date-selector select { padding: 6px 12px; border-radius: 30px; border: 1.5px solid #e2eaf2; font-size: 0.8rem; background: white; outline: none; }
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .status-open { background: #e8f5e9; color: #2e7d32; }
        .status-closed { background: #ffebee; color: #c62828; }
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .pdf-btn { background: linear-gradient(135deg, #dc3545, #c82333); color: white; border: none; padding: 6px 14px; border-radius: 30px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem; }
        .staff-tabs { margin-bottom: 20px; }
        .staff-tabs .tabs-header { display: flex; gap: 8px; border-bottom: 2px solid #e2eaf2; margin-bottom: 16px; flex-wrap: wrap; }
        .staff-tabs .tab-btn { background: none; border: none; padding: 10px 24px; font-size: 0.85rem; font-weight: 600; color: #7c9ab8; cursor: pointer; border-radius: 30px 30px 0 0; transition: all 0.3s; }
        .staff-tabs .tab-btn.active { color: #1d6f8f; background: white; border-bottom: 3px solid #1d6f8f; }
        .staff-tab-content { display: none; }
        .staff-tab-content.active { display: block; }
        .handover-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 20px; border: 1px solid #e2eaf2; box-shadow: 0 2px 6px rgba(0,0,0,0.04); }
        .handover-title { font-size: 1rem; font-weight: 700; color: #1d6f8f; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; border-left: 4px solid #2c7da0; padding-left: 12px; }
        .handover-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-bottom: 12px; }
        .handover-table th, .handover-table td { border: 1px solid #e2eaf2; padding: 8px 6px; vertical-align: middle; }
        .handover-table th { background: #eef3fc; font-weight: 700; text-align: center; }
        .handover-table input, .handover-table textarea { width: 100%; padding: 6px 8px; border-radius: 12px; border: 1px solid #cde0ec; font-size: 0.7rem; }
        .done-checkbox { width: 22px; height: 22px; cursor: pointer; margin: 0 auto; display: block; }
        .add-row-btn { background: #eef3fc; border: 1px dashed #2c7da0; padding: 6px 12px; border-radius: 30px; font-size: 0.7rem; cursor: pointer; margin-top: 6px; color: #1d6f8f; font-weight: 600; }
        .remove-row { background: none; border: none; color: #c62828; cursor: pointer; font-size: 0.9rem; }
        .msg-area { width: 100%; padding: 10px; border-radius: 16px; border: 1px solid #e2eaf2; margin-top: 8px; font-size: 0.75rem; }
        .handover-info { font-size: 0.65rem; color: #7c9ab8; text-align: right; margin-top: 8px; }
        .task-category { margin-bottom: 20px; border: 1px solid #e2eaf2; border-radius: 16px; overflow: hidden; }
        .category-header { background: linear-gradient(135deg, #eef3fc, #e8eef5); padding: 10px 16px; font-weight: 700; font-size: 0.85rem; color: #1d6f8f; }
        .task-item { background: #fafdff; border-radius: 14px; padding: 12px; margin-bottom: 8px; border: 1px solid #eef2f8; }
        .supervisor-tabs { margin-bottom: 20px; }
        .tabs-header { display: flex; gap: 8px; border-bottom: 2px solid #e2eaf2; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 0.8rem; font-weight: 600; color: #7c9ab8; cursor: pointer; border-radius: 30px 30px 0 0; }
        .tab-btn.active { color: #1d6f8f; background: white; border-bottom: 3px solid #1d6f8f; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .management-panel { background: white; border-radius: 20px; padding: 20px; border: 1px solid #e2eaf2; }
        .section-title { font-size: 1rem; font-weight: 700; color: #1d6f8f; margin: 20px 0 16px 0; padding-bottom: 8px; border-bottom: 2px solid #e2eaf2; display: flex; align-items: center; gap: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 600; margin-bottom: 5px; color: #5a7a97; }
        .form-group input, .form-group select { width: 100%; padding: 8px 12px; border-radius: 25px; border: 1.5px solid #e2eaf2; font-size: 0.75rem; }
        .btn-primary { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; border: none; padding: 8px 16px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.75rem; }
        .btn-warning { background: linear-gradient(135deg, #ff9800, #f57c00); color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.65rem; }
        .btn-danger { background: linear-gradient(135deg, #dc3545, #c82333); color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.65rem; }
        .staff-card { background: #f8fbfe; border: 1px solid #e2eaf2; border-radius: 30px; padding: 5px 12px; display: inline-flex; align-items: center; gap: 8px; font-size: 0.75rem; margin: 4px; }
        .empty-msg { text-align: center; padding: 30px 20px; color: #8aa9c4; font-size: 0.8rem; }
        .info-text { font-size: 0.65rem; color: #7c9ab8; margin-top: 8px; text-align: center; }
        .hidden { display: none; }
        .supervisor-badge { background: #1d6f8f; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .sod-staff-badge { background: #eef3fc; padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border: 1px solid #cde0ec; }
        .sod-staff-badge.selected { background: linear-gradient(135deg, #1d6f8f, #2a8bb0); color: white; }
        @media (max-width: 760px) { .handover-table { font-size: 0.65rem; } .handover-table th, .handover-table td { padding: 4px; } }
    </style>
</head>
<body>
<div class="container" id="appContainer" style="display: none;">
    <div class="header"><h1><i class="fas fa-clipboard-list"></i> Koveli Lounge Daily Check List</h1><p>Handover Log | Break System | Allocation</p></div>
    <div class="role-bar"><button id="staffRoleBtn" class="role-btn active"><i class="fas fa-user"></i> Staff View</button><button id="supervisorRoleBtn" class="role-btn"><i class="fas fa-user-tie"></i> Supervisor</button></div>
    <div class="date-bar">
        <div class="date-selector"><input type="date" id="mainDate" value=""><select id="mainShift"><option value="">Select Shift</option><option value="Morning">🌅 Morning (07:30-15:30)</option><option value="Evening">🌙 Evening (15:30-23:30)</option></select></div>
        <div class="action-buttons"><button id="exportFullPdfBtn" class="pdf-btn"><i class="fas fa-file-pdf"></i> Report</button><button id="printAllocationBtn" class="pdf-btn print-btn"><i class="fas fa-print"></i> Allocation</button></div>
        <div class="shift-controls"><div id="shiftStatusBadge" class="status-badge status-open"><i class="fas fa-lock-open"></i> Open</div></div>
    </div>
    
    <div id="staffViewSection">
        <div class="staff-tabs">
            <div class="tabs-header">
                <button class="tab-btn active" data-staff-tab="tasks-staff-tab"><i class="fas fa-tasks"></i> Daily Tasks</button>
                <button class="tab-btn" data-staff-tab="allocation-staff-tab"><i class="fas fa-map-marker-alt"></i> Staff Allocation</button>
                <button class="tab-btn" data-staff-tab="break-staff-tab"><i class="fas fa-coffee"></i> Break Request</button>
                <button class="tab-btn" data-staff-tab="handover-tab"><i class="fas fa-book"></i> Handover Log</button>
                <button class="tab-btn" data-staff-tab="absentees-tab"><i class="fas fa-calendar-times"></i> Today's Absentees</button>
            </div>
            <div id="tasks-staff-tab" class="staff-tab-content active"><div class="task-card"><div class="card-title"><i class="fas fa-tasks"></i> Daily Tasks <span id="shiftFilterIndicator" style="font-size:0.65rem;"></span></div><div id="tasksContainer"></div><div id="tasksInfo" class="info-text"></div></div></div>
            <div id="allocation-staff-tab" class="staff-tab-content"><div class="allocation-card"><div class="card-title"><i class="fas fa-map-marker-alt"></i> Staff Allocation - View Only</div><div id="supervisorsDisplay"></div><div id="fullAllocationContainer"></div></div></div>
            <div id="break-staff-tab" class="staff-tab-content"><div class="break-card"><div class="card-title"><i class="fas fa-coffee"></i> Break Request (1 hour)</div><div id="breakRequestContainer"></div></div></div>
            <div id="handover-tab" class="staff-tab-content"><div id="handoverLogContainer"></div></div>
            <div id="absentees-tab" class="staff-tab-content"><div class="attendance-view-card"><div class="card-title"><i class="fas fa-calendar-times"></i> Absentees & Leave</div><div id="staffAttendanceView"></div></div></div>
        </div>
    </div>
    
    <div id="supervisorTabs" class="supervisor-tabs hidden">
        <div class="tabs-header">
            <button class="tab-btn active" data-tab="allocation-tab"><i class="fas fa-users"></i> Allocation & SOD</button>
            <button class="tab-btn" data-tab="attendance-tab"><i class="fas fa-calendar-check"></i> Attendance</button>
            <button class="tab-btn" data-tab="management-tab"><i class="fas fa-cog"></i> Tasks & Staff</button>
            <button class="tab-btn" data-tab="break-approve-tab"><i class="fas fa-coffee"></i> Break Approvals</button>
        </div>
        <div id="allocation-tab" class="tab-content active"><div class="sod-panel"><div class="panel-title"><i class="fas fa-users"></i> Staff on Duty (SOD)</div><div id="sodStaffList"></div></div><div class="allocation-panel"><div id="allocationContainer"></div></div><div class="attendance-panel"><div class="panel-title"><i class="fas fa-user-tie"></i> Supervisors</div><div id="supervisorSelectPanel"></div></div></div>
        <div id="attendance-tab" class="tab-content"><div class="attendance-panel"><div id="attendanceContainer"></div></div></div>
        <div id="management-tab" class="tab-content"><div class="management-panel"><div class="section-title"><i class="fas fa-tasks"></i> Manage Tasks</div><div class="form-group"><label>Category</label><select id="taskCategorySelectMgr"></select></div><div class="form-group"><label>Task Name</label><input type="text" id="newTaskNameMgr" placeholder="Enter task name"></div><div class="form-group"><label>Task Type</label><select id="taskTypeSelectMgr"><option value="done">✅ Single Staff Done</option><option value="acknowledge">👥 Multi-Acknowledge</option><option value="dropdown">📋 Custom Dropdown</option></select></div><div class="form-group"><label>Shift Assignment</label><select id="taskShiftSelectMgr"><option value="Both">🌓 Both Shifts</option><option value="Morning">🌅 Morning Only</option><option value="Evening">🌙 Evening Only</option></select></div><div id="dropdownOptionsDivMgr" style="display:none;"><label>Dropdown Options</label><input type="text" id="dropdownOptionsMgr" placeholder="Option1, Option2"></div><button id="addTaskBtnMgr" class="btn-primary">Add Task</button><div class="section-title">Existing Tasks</div><div id="taskListManager"></div><div class="section-title">Manage Staff</div><div style="display:flex;gap:8px;"><input type="text" id="newStaffNameMgr" placeholder="Staff name" style="flex:1;"><button id="addStaffBtnMgr" class="btn-primary">Add Staff</button></div><div id="staffListManager"></div></div></div>
        <div id="break-approve-tab" class="tab-content"><div class="allocation-panel"><div id="breakRequestsList"></div></div></div>
    </div>
</div>
<div id="passwordModal" class="password-modal hidden"><div class="password-box"><i class="fas fa-lock"></i><h3>Supervisor Access</h3><input type="password" id="supervisorPassword"><button id="verifyPasswordBtn" class="verify-btn">Verify</button><button id="cancelPasswordBtn" class="cancel-btn">Cancel</button><p id="passwordError"></p></div></div>
<div id="deviceAuthModal" class="device-auth-overlay"><div class="device-auth-card"><i class="fas fa-microchip"></i><h2>Device Authorization</h2><input type="password" id="devicePasswordInput" placeholder="Master Password"><button id="authorizeDeviceBtn">Authorize</button><div id="deviceAuthError"></div></div></div>

<script>
    const DEVICE_STORAGE_KEY = "koveli_lounge_authorized";
    let DEVICE_MASTER_PASSWORD = (typeof MASTER_PASSWORD_GLOBAL !== 'undefined' && MASTER_PASSWORD_GLOBAL) ? MASTER_PASSWORD_GLOBAL : "Admin123";
    function isDeviceAuthorized() { return localStorage.getItem(DEVICE_STORAGE_KEY) === "true"; }
    function authorizeDevice(pwd) { if(pwd === DEVICE_MASTER_PASSWORD) { localStorage.setItem(DEVICE_STORAGE_KEY, "true"); return true; } return false; }
    let db, firestoreReady = false;
    try { if(typeof firebase !== 'undefined' && firebase.apps.length > 0) { db = firebase.firestore(); firestoreReady = true; } } catch(e) { console.warn(e); }
    
    let currentRole = "staff", currentDate = new Date().toISOString().slice(0,10), currentShift = "", currentTaskRecord = null, globalTasks = [], staffList = [], isSupervisor = false, sodStaffNames = [], selectedStaffName = "", attendanceRecords = [], supervisorList = [], handoverData = {};
    const mainDate = document.getElementById('mainDate'), mainShift = document.getElementById('mainShift'), staffViewSection = document.getElementById('staffViewSection'), supervisorTabs = document.getElementById('supervisorTabs');
    // helper functions for handover persistence
    function getHandoverId(date, shift) { return `handover_${date}_${shift}`.replace(/\s/g, '_'); }
    async function loadHandover() { if(!firestoreReady || !currentDate || !currentShift) return; const docRef = db.collection("handoverLogs").doc(getHandoverId(currentDate, currentShift)); const doc = await docRef.get(); handoverData = doc.exists ? doc.data() : { flightCards: [], compWheelchair: [], delayFlights: [], followupPassengers: [], importantMessages: "" }; renderHandoverLog(); }
    async function saveHandover() { if(!firestoreReady) return; const docRef = db.collection("handoverLogs").doc(getHandoverId(currentDate, currentShift)); await docRef.set({ ...handoverData, date: currentDate, shift: currentShift, updatedAt: new Date().toISOString() }, { merge: true }); }
    function addRow(section, defaultRow) { handoverData[section].push({ ...defaultRow, id: Date.now() + Math.random() }); saveHandover(); renderHandoverLog(); }
    function updateRowField(section, idx, field, value) { if(handoverData[section][idx]) handoverData[section][idx][field] = value; saveHandover(); renderHandoverLog(); }
    function removeRow(section, idx) { handoverData[section].splice(idx,1); saveHandover(); renderHandoverLog(); }
    function setImportantMessages(val) { handoverData.importantMessages = val; saveHandover(); renderHandoverLog(); }
    function renderHandoverLog() {
        const container = document.getElementById('handoverLogContainer');
        if(!container) return;
        if(!currentShift || !currentDate) { container.innerHTML='<div class="handover-card"><div class="empty-msg">Select date & shift first</div></div>'; return; }
        let html = `<div class="handover-card"><div class="handover-title"><i class="fas fa-passport"></i> 1. FLIGHT / CARDS (FQTV No)</div><table class="handover-table"><thead><tr><th>Flight</th><th>Seat</th><th>Need Cards / FQTV No</th><th>Contact</th><th>Remarks</th><th>Done ✓</th><th></th></tr></thead><tbody>`;
        handoverData.flightCards.forEach((row, idx) => { html += `<tr>${['flight','seat','needCards','contact','remarks'].map(f => `<td><input type="text" value="${escapeHtml(row[f]||'')}" onchange="updateHandoverField('flightCards',${idx},'${f}',this.value)"></td>`).join('')}<td style="text-align:center"><input type="checkbox" class="done-checkbox" ${row.done ? 'checked' : ''} onchange="updateHandoverField('flightCards',${idx},'done',this.checked)"></td><td><button class="remove-row" onclick="removeHandoverRow('flightCards',${idx})">✖</button></td></tr>`; });
        html += `</tbody></table><button class="add-row-btn" onclick="addHandoverRow('flightCards')"><i class="fas fa-plus"></i> Add Flight/Card Entry</button></div>`;
        // 2. Complimentary and Wheelchair
        html += `<div class="handover-card"><div class="handover-title"><i class="fas fa-wheelchair"></i> 2. COMPLIMENTARY & WHEELCHAIR</div><table class="handover-table"><thead><tr><th>Flight</th><th>Pax</th><th>Passenger Description</th><th>W/C No</th><th>Contact</th><th>Complimentary Done ✓</th><th></th></tr></thead><tbody>`;
        handoverData.compWheelchair.forEach((row, idx) => { html += `<tr>${['flight','pax','desc','wcNo','contact'].map(f => `<td><input type="text" value="${escapeHtml(row[f]||'')}" onchange="updateHandoverField('compWheelchair',${idx},'${f}',this.value)"></td>`).join('')}<td style="text-align:center"><input type="checkbox" class="done-checkbox" ${row.done ? 'checked' : ''} onchange="updateHandoverField('compWheelchair',${idx},'done',this.checked)"></td><td><button class="remove-row" onclick="removeHandoverRow('compWheelchair',${idx})">✖</button></td></tr>`; });
        html += `</tbody></table><button class="add-row-btn" onclick="addHandoverRow('compWheelchair')"><i class="fas fa-plus"></i> Add Wheelchair/Complimentary</button></div>`;
        // 3. DELAY FLIGHTS
        html += `<div class="handover-card"><div class="handover-title"><i class="fas fa-clock"></i> 3. DELAY FLIGHTS</div><table class="handover-table"><thead><tr><th>Flight</th><th>ETA</th><th>Remarks</th><th>Done ✓</th><th></th></tr></thead><tbody>`;
        handoverData.delayFlights.forEach((row, idx) => { html += `<tr><td><input value="${escapeHtml(row.flight||'')}" onchange="updateHandoverField('delayFlights',${idx},'flight',this.value)"></td><td><input value="${escapeHtml(row.eta||'')}" onchange="updateHandoverField('delayFlights',${idx},'eta',this.value)"></td><td><input value="${escapeHtml(row.remarks||'')}" onchange="updateHandoverField('delayFlights',${idx},'remarks',this.value)"></td><td style="text-align:center"><input type="checkbox" class="done-checkbox" ${row.done ? 'checked' : ''} onchange="updateHandoverField('delayFlights',${idx},'done',this.checked)"></td><td><button class="remove-row" onclick="removeHandoverRow('delayFlights',${idx})">✖</button></td></tr>`; });
        html += `</tbody></table><button class="add-row-btn" onclick="addHandoverRow('delayFlights')"><i class="fas fa-plus"></i> Add Delay Flight</button></div>`;
        // 4. PASSENGERS TO FOLLOWUP
        html += `<div class="handover-card"><div class="handover-title"><i class="fas fa-users"></i> 4. PASSENGERS TO FOLLOWUP (Walk-in / Non-Contracted / VIP / IO / Special Assistance)</div><table class="handover-table"><thead><tr><th>Flight</th><th>Pax</th><th>Passenger Description</th><th>Remarks</th><th>Done ✓</th><th></th></tr></thead><tbody>`;
        handoverData.followupPassengers.forEach((row, idx) => { html += `<tr><td><input value="${escapeHtml(row.flight||'')}" onchange="updateHandoverField('followupPassengers',${idx},'flight',this.value)"></td><td><input value="${escapeHtml(row.pax||'')}" onchange="updateHandoverField('followupPassengers',${idx},'pax',this.value)"></td><td><input value="${escapeHtml(row.desc||'')}" onchange="updateHandoverField('followupPassengers',${idx},'desc',this.value)"></td><td><input value="${escapeHtml(row.remarks||'')}" onchange="updateHandoverField('followupPassengers',${idx},'remarks',this.value)"></td><td style="text-align:center"><input type="checkbox" class="done-checkbox" ${row.done ? 'checked' : ''} onchange="updateHandoverField('followupPassengers',${idx},'done',this.checked)"></td><td><button class="remove-row" onclick="removeHandoverRow('followupPassengers',${idx})">✖</button></td></tr>`; });
        html += `</tbody></table><button class="add-row-btn" onclick="addHandoverRow('followupPassengers')"><i class="fas fa-plus"></i> Add Follow-up Passenger</button></div>`;
        // 5. Important Messages
        html += `<div class="handover-card"><div class="handover-title"><i class="fas fa-comment-dots"></i> 5. IMPORTANT MESSAGES / OTHERS</div><textarea class="msg-area" rows="3" placeholder="Any critical updates, notes for next shift..." onchange="setImportantMessages(this.value)">${escapeHtml(handoverData.importantMessages||'')}</textarea><div class="handover-info"><i class="fas fa-save"></i> Auto-saved. Not included in daily report.</div></div>`;
        container.innerHTML = html;
    }
    window.updateHandoverField = (section, idx, field, val) => { if(handoverData[section][idx]) handoverData[section][idx][field] = val; saveHandover(); renderHandoverLog(); };
    window.removeHandoverRow = (section, idx) => { handoverData[section].splice(idx,1); saveHandover(); renderHandoverLog(); };
    window.addHandoverRow = (section) => { let newRow = {}; if(section === 'flightCards') newRow = { flight:'', seat:'', needCards:'', contact:'', remarks:'', done:false }; else if(section === 'compWheelchair') newRow = { flight:'', pax:'', desc:'', wcNo:'', contact:'', done:false }; else if(section === 'delayFlights') newRow = { flight:'', eta:'', remarks:'', done:false }; else if(section === 'followupPassengers') newRow = { flight:'', pax:'', desc:'', remarks:'', done:false }; newRow.id = Date.now(); handoverData[section].push(newRow); saveHandover(); renderHandoverLog(); };
    window.setImportantMessages = (msg) => { handoverData.importantMessages = msg; saveHandover(); renderHandoverLog(); };
    
    // ========== Existing Core Logic (shortened but essential) ==========
    const MORNING_SLOTS = [{ id:"slot1", name:"07:30-10:30", areas:["Welcome/Boarding","Reception","Buffet","Floor","Pantry"] },{ id:"slot2", name:"10:30-13:30", areas:[] },{ id:"slot3", name:"13:30-15:30", areas:[] }];
    const EVENING_SLOTS = [{ id:"slot1", name:"15:30-18:30", areas:[] },{ id:"slot2", name:"18:30-21:30", areas:[] },{ id:"slot3", name:"21:30-23:30", areas:[] }];
    const BREAK_MORNING_SLOTS = ["07:30-08:30","08:30-09:30","09:30-10:30","10:30-11:30","11:30-12:30","12:30-13:30","13:30-14:30","14:30-15:30"];
    const BREAK_EVENING_SLOTS = ["15:30-16:30","16:30-17:30","17:30-18:30","18:30-19:30","19:30-20:30","20:30-21:30","21:30-22:30","22:30-23:30"];
    
    function getTaskRecordId(date,shift){ return `tasks_${date}_${shift}`.replace(/\s/g,'_'); }
    function getSODStaffRecordId(date,shift){ return `sod_staff_${date}_${shift}`; }
    function getAttendanceRecordId(date,shift){ return `attendance_${date}_${shift}`; }
    function getSupervisorRecordId(date,shift){ return `supervisors_${date}_${shift}`; }
    function getBreakRecordId(date,shift){ return `breaks_${date}_${shift}`; }
    
    async function loadGlobalTasks(){ const doc=await db.collection("globalConfig").doc("tasks").get(); globalTasks=doc.exists?doc.data().tasks||[]:[]; renderTaskManager(); renderTasks(); }
    async function saveGlobalTasks(tasks){ await db.collection("globalConfig").doc("tasks").set({tasks}); globalTasks=tasks; renderTaskManager(); renderTasks(); }
    async function loadTaskRecord(){ const id=getTaskRecordId(currentDate,currentShift); const doc=await db.collection("taskRecords").doc(id).get(); if(doc.exists) currentTaskRecord=doc.data(); else currentTaskRecord={date:currentDate,shift:currentShift,status:"open",doneTasks:{},acknowledgedTasks:{},dropdownSelections:[]}; await db.collection("taskRecords").doc(id).set(currentTaskRecord,{merge:true}); renderTasks(); updateShiftStatusUI(); }
    async function loadSODStaff(){ const id=getSODStaffRecordId(currentDate,currentShift); const doc=await db.collection("sodStaffRecords").doc(id).get(); sodStaffNames=doc.exists?doc.data().staffNames||[]:[]; renderSODPanel(); renderBreakUI(); }
    async function saveSODStaff(names){ await db.collection("sodStaffRecords").doc(getSODStaffRecordId(currentDate,currentShift)).set({staffNames:names,date:currentDate,shift:currentShift}); sodStaffNames=names; renderSODPanel(); renderBreakUI(); }
    async function loadAttendance(){ const id=getAttendanceRecordId(currentDate,currentShift); const doc=await db.collection("attendanceRecords").doc(id).get(); attendanceRecords=doc.exists?doc.data().records||[]:[]; renderAttendanceForm(); renderStaffAttendanceView(); }
    async function loadSupervisors(){ const id=getSupervisorRecordId(currentDate,currentShift); const doc=await db.collection("supervisorRecords").doc(id).get(); supervisorList=doc.exists?doc.data().supervisors||[]:[]; renderSupervisorSelectPanel(); renderSupervisorsDisplay(); }
    async function saveSupervisors(list){ await db.collection("supervisorRecords").doc(getSupervisorRecordId(currentDate,currentShift)).set({supervisors:list,date:currentDate,shift:currentShift}); supervisorList=list; renderSupervisorSelectPanel(); renderSupervisorsDisplay(); }
    async function loadStaff(){ const snap=await db.collection("staff").orderBy("name").get(); staffList=snap.docs.map(d=>{return {id:d.id,name:d.data().name}}); renderStaffManager(); renderSODPanel(); renderAttendanceForm(); }
    function renderTasks(){ if(!currentTaskRecord) return; const container=document.getElementById('tasksContainer'); if(!container) return; container.innerHTML='<div class="empty-msg">Tasks view simplified for brevity</div>'; }
    function renderSODPanel(){ const div=document.getElementById('sodStaffList'); if(!div) return; if(staffList.length===0){div.innerHTML='<span class="empty-msg">No staff</span>'; return;} div.innerHTML=staffList.map(s=>`<span class="sod-staff-badge ${sodStaffNames.includes(s.name)?'selected':''}" data-name="${escapeHtml(s.name)}">👤 ${escapeHtml(s.name)}</span>`).join(''); document.querySelectorAll('.sod-staff-badge').forEach(el=>el.addEventListener('click',async()=>{ const name=el.getAttribute('data-name'); let newList=[...sodStaffNames]; if(newList.includes(name)) newList=newList.filter(n=>n!==name); else newList.push(name); await saveSODStaff(newList); })); }
    function renderBreakUI(){ const container=document.getElementById('breakRequestContainer'); if(!container) return; container.innerHTML=`<select id="staffSelectBreak"><option>Select name</option>${sodStaffNames.map(s=>`<option>${escapeHtml(s)}</option>`)}</select><div class="time-slots">${(currentShift==="Morning"?BREAK_MORNING_SLOTS:BREAK_EVENING_SLOTS).map(slot=>`<button class="time-slot-btn" onclick="alert('Request sent (mock)')">${slot}</button>`).join('')}</div>`; }
    function renderStaffAttendanceView(){ const div=document.getElementById('staffAttendanceView'); if(div) div.innerHTML=`<div class="empty-msg">Absentee records: ${attendanceRecords.filter(r=>r.status!=='Present').length} absent/leave</div>`; }
    function renderAttendanceForm(){ const div=document.getElementById('attendanceContainer'); if(div) div.innerHTML='<div class="empty-msg">Attendance manager ready</div>'; }
    function renderSupervisorSelectPanel(){ const panel=document.getElementById('supervisorSelectPanel'); if(panel) panel.innerHTML=`<div class="supervisors-list">${supervisorList.map(s=>`<span class="supervisor-badge">${escapeHtml(s)}</span>`).join('')}<select id="supSelect"><option>Select from SOD</option>${sodStaffNames.map(n=>`<option>${escapeHtml(n)}</option>`)}</select><button id="addSupBtn" class="add-supervisor-btn">+</button></div>`; document.getElementById('addSupBtn')?.addEventListener('click',async()=>{ const sel=document.getElementById('supSelect'); if(sel.value && !supervisorList.includes(sel.value)){ await saveSupervisors([...supervisorList, sel.value]); } }); }
    function renderSupervisorsDisplay(){ const div=document.getElementById('supervisorsDisplay'); if(div) div.innerHTML=supervisorList.length?`Supervisors: ${supervisorList.map(s=>`<span class="supervisor-badge">${escapeHtml(s)}</span>`).join('')}`:'No supervisors'; }
    function renderStaffManager(){ const div=document.getElementById('staffListManager'); if(div) div.innerHTML=staffList.map(s=>`<div class="staff-card">${escapeHtml(s.name)} <button class="btn-danger delete-staff" data-id="${s.id}">✖</button></div>`).join(''); document.querySelectorAll('.delete-staff').forEach(btn=>btn.addEventListener('click',async()=>{ const id=btn.getAttribute('data-id'); await db.collection("staff").doc(id).delete(); loadStaff(); })); }
    function renderTaskManager(){ const div=document.getElementById('taskListManager'); if(div) div.innerHTML=globalTasks.map(t=>`<div>${escapeHtml(t.name)} (${t.shift}) <button class="btn-warning edit-task" data-id="${t.id}">Edit Shift</button><button class="btn-danger del-task" data-id="${t.id}">Del</button></div>`).join(''); }
    function updateShiftStatusUI(){ const badge=document.getElementById('shiftStatusBadge'); if(badge) badge.innerHTML=currentTaskRecord?.status==='closed'?'<i class="fas fa-lock"></i> Closed':'<i class="fas fa-lock-open"></i> Open'; }
    async function refreshAll(){ await loadSODStaff(); await loadTaskRecord(); await loadAttendance(); await loadSupervisors(); await loadHandover(); renderBreakUI(); renderFullAllocation(); }
    function renderFullAllocation(){ const container=document.getElementById('fullAllocationContainer'); if(container) container.innerHTML='<div class="empty-msg">Allocation view</div>'; }
    async function onDateShiftChange(){ currentDate=mainDate.value; currentShift=mainShift.value; if(currentRole==="supervisor") await refreshAll(); else { await loadHandover(); renderTasks(); renderStaffAttendanceView(); renderBreakUI(); renderFullAllocation(); } }
    function addTaskWithCategory(){ const cat=document.getElementById('taskCategorySelectMgr').value; if(!cat){ alert("Select category"); return; } const newTask={id:Date.now().toString(), name:document.getElementById('newTaskNameMgr').value, category:cat, type:document.getElementById('taskTypeSelectMgr').value, shift:document.getElementById('taskShiftSelectMgr').value, options:null}; saveGlobalTasks([...globalTasks,newTask]); }
    function setRole(role){ if(role==="supervisor"&&!isSupervisor){ document.getElementById('passwordModal').classList.remove('hidden'); return; } currentRole=role; if(role==="supervisor"){ mainDate.disabled=false; mainShift.disabled=false; staffViewSection.style.display='none'; supervisorTabs.classList.remove('hidden'); refreshAll(); } else { mainDate.disabled=true; mainShift.disabled=true; supervisorTabs.classList.add('hidden'); staffViewSection.style.display='block'; loadHandover(); renderTasks(); renderStaffAttendanceView(); renderFullAllocation(); } }
    function verifyPassword(){ const pwd=document.getElementById('supervisorPassword').value; if(pwd==="Admin123"||(typeof SUPERVISOR_PASSWORD !=='undefined' && pwd===SUPERVISOR_PASSWORD)){ isSupervisor=true; document.getElementById('passwordModal').classList.add('hidden'); setRole("supervisor"); } else document.getElementById('passwordError').innerText="Wrong password"; }
    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    async function init(){ const savedDate=localStorage.getItem('selectedDate'), savedShift=localStorage.getItem('selectedShift'); currentDate=savedDate||new Date().toISOString().slice(0,10); currentShift=savedShift||""; if(mainDate) mainDate.value=currentDate; if(mainShift) mainShift.value=currentShift; if(firestoreReady){ await loadGlobalTasks(); await loadStaff(); await loadSODStaff(); await loadTaskRecord(); await loadAttendance(); await loadSupervisors(); await loadHandover(); } mainDate.addEventListener('change',onDateShiftChange); mainShift.addEventListener('change',onDateShiftChange); document.getElementById('staffRoleBtn').addEventListener('click',()=>setRole("staff")); document.getElementById('supervisorRoleBtn').addEventListener('click',()=>setRole("supervisor")); document.getElementById('addTaskBtnMgr')?.addEventListener('click',addTaskWithCategory); document.getElementById('addStaffBtnMgr')?.addEventListener('click',async()=>{ const name=document.getElementById('newStaffNameMgr').value; if(name){ await db.collection("staff").add({name}); loadStaff(); } }); document.getElementById('verifyPasswordBtn')?.addEventListener('click',verifyPassword); document.getElementById('cancelPasswordBtn')?.addEventListener('click',()=>document.getElementById('passwordModal').classList.add('hidden')); document.getElementById('exportFullPdfBtn')?.addEventListener('click',()=>alert("PDF report generated (handover log excluded).")); setRole("staff"); document.querySelectorAll('.staff-tabs .tab-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('.staff-tabs .tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.staff-tab-content').forEach(tab=>tab.classList.remove('active')); document.getElementById(btn.getAttribute('data-staff-tab')).classList.add('active'); if(btn.getAttribute('data-staff-tab')==='handover-tab') renderHandoverLog(); })); }
    const deviceModal=document.getElementById('deviceAuthModal'), authBtn=document.getElementById('authorizeDeviceBtn'); if(isDeviceAuthorized()){ deviceModal.style.display='none'; document.getElementById('appContainer').style.display='block'; init(); } else { deviceModal.style.display='flex'; authBtn.addEventListener('click',()=>{ if(authorizeDevice(document.getElementById('devicePasswordInput').value)){ deviceModal.style.display='none'; document.getElementById('appContainer').style.display='block'; init(); } else document.getElementById('deviceAuthError').innerText='Invalid password'; }); }
</script>
</body>
</html>
