<body>
<div class="container" id="appContainer" style="display: none;">
    <div class="header"><h1><i class="fas fa-clipboard-list"></i> Koveli Lounge Daily Check List</h1><p>Handover Log | Tasks | Allocation</p></div>
    <div class="role-bar"><button id="staffRoleBtn" class="role-btn active"><i class="fas fa-user"></i> Staff View</button><button id="supervisorRoleBtn" class="role-btn"><i class="fas fa-user-tie"></i> Supervisor</button></div>
    <div class="date-bar">
        <div class="date-selector"><input type="date" id="mainDate" value=""><select id="mainShift"><option value="">Select Shift</option><option value="Morning">🌅 Morning (07:30-15:30)</option><option value="Evening">🌙 Evening (15:30-23:30)</option></select></div>
        <div class="action-buttons"><button id="exportFullPdfBtn" class="pdf-btn"><i class="fas fa-file-pdf"></i> Report</button><button id="printAllocationBtn" class="pdf-btn print-btn"><i class="fas fa-print"></i> Allocation</button></div>
        <div class="shift-controls"><div id="shiftStatusBadge" class="status-badge status-open"><i class="fas fa-lock-open"></i> Open</div><button id="closeShiftBtn" class="close-shift-btn hidden"><i class="fas fa-lock"></i> Close Shift</button><button id="reopenShiftBtn" class="reopen-btn hidden"><i class="fas fa-undo-alt"></i> Reopen</button></div>
    </div>
    
    <div id="staffViewSection">

            <div class="tabs-header">
                <button class="tab-btn active" data-staff-tab="tasks-staff-tab"><i class="fas fa-tasks"></i> Daily Tasks</button>
                <button class="tab-btn" data-staff-tab="allocation-staff-tab"><i class="fas fa-map-marker-alt"></i> Allocation</button>
                <button class="tab-btn" data-staff-tab="break-staff-tab"><i class="fas fa-coffee"></i> Break</button>
                <button class="tab-btn" data-staff-tab="absentees-tab"><i class="fas fa-calendar-times"></i> Absentees</button>
                <button class="tab-btn" data-staff-tab="handover-tab"><i class="fas fa-exchange-alt"></i> Handover Log</button>
            </div>
            <div id="tasks-staff-tab" class="staff-tab-content active"><div class="task-card"><div class="card-title"><i class="fas fa-tasks"></i> Daily Tasks</div><div id="tasksContainer"></div><div id="tasksInfo" class="info-text"></div></div></div>

            <div id="handover-tab" class="staff-tab-content"><div class="handover-card"><div class="card-title"><i class="fas fa-exchange-alt"></i> Handover Log (Not included in report)</div><div id="handoverContainer"></div><button id="saveHandoverBtn" class="save-handover-btn"><i class="fas fa-save"></i> Save Handover Log</button></div></div>
        </div>
    </div>
    
    <div id="supervisorTabs" class="supervisor-tabs hidden"><div class="tabs-header"><button class="tab-btn active" data-tab="management-tab"><i class="fas fa-cog"></i> Tasks & Staff</button><button class="tab-btn" data-tab="attendance-tab"><i class="fas fa-calendar-check"></i> Attendance</button><button class="tab-btn" data-tab="break-approve-tab"><i class="fas fa-coffee"></i> Break Approvals</button></div>
        <div id="management-tab" class="tab-content active"><div class="management-panel"><div class="section-title"><i class="fas fa-tasks"></i> Manage Tasks</div><div class="form-group"><label>Category</label><select id="taskCategorySelectMgr"></select></div><div class="form-group"><label>Task Name</label><input type="text" id="newTaskNameMgr" placeholder="Enter task name"></div><div class="form-group"><label>Task Type</label><select id="taskTypeSelectMgr"><option value="done">✅ Single Staff Done</option><option value="acknowledge">👥 Multi-Acknowledge</option><option value="dropdown">📋 Dropdown</option></select></div><div class="form-group"><label>Shift</label><select id="taskShiftSelectMgr"><option value="Both">Both Shifts</option><option value="Morning">Morning Only</option><option value="Evening">Evening Only</option></select></div><div id="dropdownOptionsDivMgr" style="display: none;"><label>Options</label><input type="text" id="dropdownOptionsMgr" placeholder="Option1, Option2"></div><button id="addTaskBtnMgr" class="btn-primary">Add Task</button><div class="section-title">Existing Tasks</div><div id="taskListManager"></div><div class="section-title"><i class="fas fa-users"></i> Manage Staff</div><div style="display: flex; gap: 8px;"><input type="text" id="newStaffNameMgr" placeholder="Staff name" style="flex:1;"><button id="addStaffBtnMgr" class="btn-primary">Add Staff</button></div><div id="staffListManager"></div></div></div>
        <div id="attendance-tab" class="tab-content"><div class="attendance-panel"><div class="panel-title">Staff Attendance</div><div id="attendanceContainer"></div></div></div>
        <div id="break-approve-tab" class="tab-content"><div class="allocation-panel"><div class="panel-title">Break Requests</div><div id="breakRequestsList"></div></div></div>
    </div>
</div>
<div id="passwordModal" class="password-modal hidden"><div class="password-box"><i class="fas fa-lock"></i><h3>Supervisor Access</h3><input type="password" id="supervisorPassword" placeholder="Password"><button id="verifyPasswordBtn" class="verify-btn">Verify</button><button id="cancelPasswordBtn" class="cancel-btn">Cancel</button><p id="passwordError" style="color:#c62828;"></p></div></div>
<div id="deviceAuthModal" class="device-auth-overlay"><div class="device-auth-card"><i class="fas fa-microchip"></i><h2>Device Authorization</h2><input type="password" id="devicePasswordInput" placeholder="Master Password"><button id="authorizeDeviceBtn">Authorize</button><div id="deviceAuthError" class="device-error"></div></div></div>

<script>
    const DEVICE_STORAGE_KEY = "koveli_authorized";
    let DEVICE_MASTER_PASSWORD = (typeof MASTER_PASSWORD_GLOBAL !== 'undefined' && MASTER_PASSWORD_GLOBAL) ? MASTER_PASSWORD_GLOBAL : "Admin123";
    function isDeviceAuthorized() { return localStorage.getItem(DEVICE_STORAGE_KEY) === "true"; }
    function authorizeDevice(pwd) { if(pwd === DEVICE_MASTER_PASSWORD) { localStorage.setItem(DEVICE_STORAGE_KEY, "true"); return true; } return false; }
    let db, firestoreReady = false;
    try { if(typeof firebase !== 'undefined' && firebase.apps.length > 0) { db = firebase.firestore(); firestoreReady = true; } } catch(e) { console.error(e); }
    
    let currentRole = "staff", currentDate = new Date().toISOString().slice(0,10), currentShift = "", currentTaskRecord = null, globalTasks = [], staffList = [], isSupervisor = false, sodStaffNames = [], attendanceRecords = [], handoverData = { flightCards: [], compWheelchair: [], delayFlights: [], passengersFollowup: [], importantMessages: "" };
    const staffRoleBtn = document.getElementById('staffRoleBtn'), supervisorRoleBtn = document.getElementById('supervisorRoleBtn'), mainDate = document.getElementById('mainDate'), mainShift = document.getElementById('mainShift'), shiftStatusBadge = document.getElementById('shiftStatusBadge'), closeShiftBtn = document.getElementById('closeShiftBtn'), reopenShiftBtn = document.getElementById('reopenShiftBtn'), tasksContainer = document.getElementById('tasksContainer'), tasksInfo = document.getElementById('tasksInfo'), supervisorTabs = document.getElementById('supervisorTabs'), staffViewSection = document.getElementById('staffViewSection'), fullAllocationContainer = document.getElementById('fullAllocationContainer'), breakRequestContainer = document.getElementById('breakRequestContainer'), staffAttendanceView = document.getElementById('staffAttendanceView'), attendanceContainer = document.getElementById('attendanceContainer'), breakRequestsList = document.getElementById('breakRequestsList'), handoverContainer = document.getElementById('handoverContainer'), saveHandoverBtn = document.getElementById('saveHandoverBtn'), taskCategorySelectMgr = document.getElementById('taskCategorySelectMgr'), newTaskNameMgr = document.getElementById('newTaskNameMgr'), taskTypeSelectMgr = document.getElementById('taskTypeSelectMgr'), taskShiftSelectMgr = document.getElementById('taskShiftSelectMgr'), dropdownOptionsDivMgr = document.getElementById('dropdownOptionsDivMgr'), dropdownOptionsMgr = document.getElementById('dropdownOptionsMgr'), addTaskBtnMgr = document.getElementById('addTaskBtnMgr'), taskListManager = document.getElementById('taskListManager'), newStaffNameMgr = document.getElementById('newStaffNameMgr'), addStaffBtnMgr = document.getElementById('addStaffBtnMgr'), staffListManager = document.getElementById('staffListManager'), passwordModal = document.getElementById('passwordModal'), verifyPasswordBtn = document.getElementById('verifyPasswordBtn'), cancelPasswordBtn = document.getElementById('cancelPasswordBtn'), passwordError = document.getElementById('passwordError'), exportFullPdfBtn = document.getElementById('exportFullPdfBtn'), printAllocationBtn = document.getElementById('printAllocationBtn');
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function getHandoverId(date, shift) { return `handover_${date}_${shift}`.replace(/\s/g, '_'); }
    async function loadHandoverLog() { if(!firestoreReady || !currentDate || !currentShift) return; const id = getHandoverId(currentDate, currentShift); const doc = await db.collection("handoverLogs").doc(id).get(); if(doc.exists) handoverData = doc.data(); else handoverData = { flightCards: [], compWheelchair: [], delayFlights: [], passengersFollowup: [], importantMessages: "" }; renderHandoverUI(); }
    async function saveHandoverLog() { const id = getHandoverId(currentDate, currentShift); await db.collection("handoverLogs").doc(id).set({ ...handoverData, date: currentDate, shift: currentShift, updatedAt: new Date().toISOString() }, { merge: true }); alert("Handover log saved"); }
    function renderHandoverUI() { if(!handoverContainer) return; handoverContainer.innerHTML = `
        <div class="handover-section"><h4><i class="fas fa-id-card"></i> 1. Cards / FQTV / Contact Details</h4><table class="handover-table" id="flightCardsTable"><thead><tr><th>Flight</th><th>Seat</th><th>Need Cards/FQTV No</th><th>Contact</th><th>Remarks</th><th>Done ✓</th><th></th></tr></thead><tbody>${handoverData.flightCards.map((row,i)=>`<tr><td><input class="handover-input" data-section="flightCards" data-field="flight" data-idx="${i}" value="${escapeHtml(row.flight||'')}"></td><td><input class="handover-input" data-section="flightCards" data-field="seat" data-idx="${i}" value="${escapeHtml(row.seat||'')}"></td><td><input class="handover-input" data-section="flightCards" data-field="needCards" data-idx="${i}" value="${escapeHtml(row.needCards||'')}"></td><td><input class="handover-input" data-section="flightCards" data-field="contact" data-idx="${i}" value="${escapeHtml(row.contact||'')}"></td><td><input class="handover-input" data-section="flightCards" data-field="remarks" data-idx="${i}" value="${escapeHtml(row.remarks||'')}"></td><td style="text-align:center"><input type="checkbox" class="done-checkbox" data-section="flightCards" data-idx="${i}" ${row.done ? 'checked' : ''}></td><td><button class="delete-row-btn" data-section="flightCards" data-idx="${i}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table><button class="add-row-btn" data-section="flightCards"><i class="fas fa-plus"></i> Add Row</button></div>
        <div class="handover-section"><h4><i class="fas fa-wheelchair"></i> 2. Complimentary & Wheelchair</h4><table class="handover-table" id="compWCTable"><thead><tr><th>Flight</th><th>Pax</th><th>Passenger Description</th><th>W/C No</th><th>Contact</th><th>Complimentary Done ✓</th><th></th></tr></thead><tbody>${handoverData.compWheelchair.map((row,i)=>`<tr><td><input class="handover-input" data-section="compWheelchair" data-field="flight" data-idx="${i}" value="${escapeHtml(row.flight||'')}"></td><td><input class="handover-input" data-section="compWheelchair" data-field="pax" data-idx="${i}" value="${escapeHtml(row.pax||'')}"></td><td><input class="handover-input" data-section="compWheelchair" data-field="desc" data-idx="${i}" value="${escapeHtml(row.desc||'')}"></td><td><input class="handover-input" data-section="compWheelchair" data-field="wcNo" data-idx="${i}" value="${escapeHtml(row.wcNo||'')}"></td><td><input class="handover-input" data-section="compWheelchair" data-field="contact" data-idx="${i}" value="${escapeHtml(row.contact||'')}"></td><td style="text-align:center"><input type="checkbox" class="done-checkbox" data-section="compWheelchair" data-idx="${i}" ${row.done ? 'checked' : ''}></td><td><button class="delete-row-btn" data-section="compWheelchair" data-idx="${i}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table><button class="add-row-btn" data-section="compWheelchair"><i class="fas fa-plus"></i> Add Row</button></div>
        <div class="handover-section"><h4><i class="fas fa-clock"></i> 3. Delayed Flights</h4><table class="handover-table" id="delayTable"><thead><tr><th>Flight</th><th>ETA</th><th>Remarks</th><th>Done ✓</th><th></th></tr></thead><tbody>${handoverData.delayFlights.map((row,i)=>`<tr><td><input class="handover-input" data-section="delayFlights" data-field="flight" data-idx="${i}" value="${escapeHtml(row.flight||'')}"></td><td><input class="handover-input" data-section="delayFlights" data-field="eta" data-idx="${i}" value="${escapeHtml(row.eta||'')}"></td><td><input class="handover-input" data-section="delayFlights" data-field="remarks" data-idx="${i}" value="${escapeHtml(row.remarks||'')}"></td><td style="text-align:center"><input type="checkbox" class="done-checkbox" data-section="delayFlights" data-idx="${i}" ${row.done ? 'checked' : ''}></td><td><button class="delete-row-btn" data-section="delayFlights" data-idx="${i}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table><button class="add-row-btn" data-section="delayFlights"><i class="fas fa-plus"></i> Add Row</button></div>
        <div class="handover-section"><h4><i class="fas fa-user-follow"></i> 4. Passengers to Followup (Walk-in / VIP / IO / Special Assistance)</h4><table class="handover-table" id="followupTable"><thead><tr><th>Flight</th><th>Pax</th><th>Passenger Description</th><th>Remarks</th><th>Done ✓</th><th></th></tr></thead><tbody>${handoverData.passengersFollowup.map((row,i)=>`<tr><td><input class="handover-input" data-section="passengersFollowup" data-field="flight" data-idx="${i}" value="${escapeHtml(row.flight||'')}"></td><td><input class="handover-input" data-section="passengersFollowup" data-field="pax" data-idx="${i}" value="${escapeHtml(row.pax||'')}"></td><td><input class="handover-input" data-section="passengersFollowup" data-field="desc" data-idx="${i}" value="${escapeHtml(row.desc||'')}"></td><td><input class="handover-input" data-section="passengersFollowup" data-field="remarks" data-idx="${i}" value="${escapeHtml(row.remarks||'')}"></td><td style="text-align:center"><input type="checkbox" class="done-checkbox" data-section="passengersFollowup" data-idx="${i}" ${row.done ? 'checked' : ''}></td><td><button class="delete-row-btn" data-section="passengersFollowup" data-idx="${i}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table><button class="add-row-btn" data-section="passengersFollowup"><i class="fas fa-plus"></i> Add Row</button></div>
        <div class="handover-section"><h4><i class="fas fa-comment-dots"></i> 5. Important Messages / Others</h4><textarea id="importantMessages" rows="3" placeholder="Any important notes, messages, or updates...">${escapeHtml(handoverData.importantMessages || '')}</textarea></div>`;
        attachHandoverEvents(); }
    function attachHandoverEvents() { document.querySelectorAll('.handover-input').forEach(inp => inp.addEventListener('change', (e) => { const section = inp.dataset.section, idx = parseInt(inp.dataset.idx), field = inp.dataset.field; if(handoverData[section] && handoverData[section][idx]) handoverData[section][idx][field] = inp.value; })); document.querySelectorAll('.done-checkbox').forEach(chk => chk.addEventListener('change', (e) => { const section = chk.dataset.section, idx = parseInt(chk.dataset.idx); if(handoverData[section] && handoverData[section][idx]) handoverData[section][idx].done = chk.checked; })); document.querySelectorAll('.delete-row-btn').forEach(btn => btn.addEventListener('click', (e) => { const section = btn.dataset.section, idx = parseInt(btn.dataset.idx); handoverData[section].splice(idx,1); renderHandoverUI(); })); document.querySelectorAll('.add-row-btn').forEach(btn => btn.addEventListener('click', (e) => { const section = btn.dataset.section; handoverData[section].push({}); renderHandoverUI(); })); const msgArea = document.getElementById('importantMessages'); if(msgArea) msgArea.addEventListener('input', (e) => handoverData.importantMessages = e.target.value); }
    
    // Minimal existing functions (stubs for brevity - core logic integrated)
    async function loadGlobalTasks(){ const doc=await db.collection("globalConfig").doc("tasks").get(); globalTasks=doc.exists?doc.data().tasks||[]:[]; renderTaskManager(); renderTasks(); }
    async function saveGlobalTasks(tasks){ await db.collection("globalConfig").doc("tasks").set({tasks}); globalTasks=tasks; renderTaskManager(); renderTasks(); }
    async function loadTaskRecord(){ const id=`tasks_${currentDate}_${currentShift}`.replace(/\s/g,'_'); const doc=await db.collection("taskRecords").doc(id).get(); if(doc.exists) currentTaskRecord={id:doc.id,...doc.data()}; else currentTaskRecord={date:currentDate,shift:currentShift,status:"open",doneTasks:{},acknowledgedTasks:{},dropdownSelections:[]}; await db.collection("taskRecords").doc(id).set(currentTaskRecord,{merge:true}); updateShiftStatusUI(); renderTasks(); }
    function updateShiftStatusUI(){ const closed=currentTaskRecord?.status==="closed"; shiftStatusBadge.innerHTML=closed?'<i class="fas fa-lock"></i> Closed':'<i class="fas fa-lock-open"></i> Open'; closeShiftBtn.classList.toggle('hidden',!closed || currentRole!=='supervisor'); reopenShiftBtn.classList.toggle('hidden',closed || currentRole!=='supervisor'); }
    async function closeShift(){ if(currentTaskRecord.status==="closed") return; await db.collection("taskRecords").doc(currentTaskRecord.id).set({status:"closed",closedAt:new Date().toISOString()},{merge:true}); currentTaskRecord.status="closed"; updateShiftStatusUI(); renderTasks(); }
    async function reopenShiftFn(){ await db.collection("taskRecords").doc(currentTaskRecord.id).set({status:"open"},{merge:true}); currentTaskRecord.status="open"; updateShiftStatusUI(); renderTasks(); }
    function renderTasks(){ if(!currentTaskRecord) return; tasksContainer.innerHTML = "<div class='info-text'>Tasks loaded (simplified view)</div>"; tasksInfo.innerText = `Shift: ${currentShift} | Status: ${currentTaskRecord.status}`; }
    async function loadStaff(){ const snap=await db.collection("staff").orderBy("name").get(); staffList=snap.docs.map(doc=>({id:doc.id,name:doc.data().name})); renderStaffManager(); }
    function renderStaffManager(){ staffListManager.innerHTML = staffList.map(s => `<div class="staff-card">👤 ${escapeHtml(s.name)} <button class="delete-staff-mgr" data-id="${s.id}" style="color:#c62828; background:none; border:none;"><i class="fas fa-trash"></i></button></div>`).join(''); document.querySelectorAll('.delete-staff-mgr').forEach(btn=>btn.addEventListener('click',async()=>{ await db.collection("staff").doc(btn.dataset.id).delete(); await loadStaff(); })); }
    function renderTaskManager(){ taskListManager.innerHTML = globalTasks.map(task => `<div class="task-manager-item"><div><strong>${escapeHtml(task.name)}</strong><span class="task-cat-badge">${task.category||"General"}</span></div><div><button class="btn-danger delete-task-btn" data-id="${task.id}">Delete</button></div></div>`).join(''); document.querySelectorAll('.delete-task-btn').forEach(btn=>btn.addEventListener('click',async()=>{ if(confirm("Delete?")) await saveGlobalTasks(globalTasks.filter(t=>t.id!==btn.dataset.id)); })); }
    async function addTaskMgr(){ if(!newTaskNameMgr.value.trim()) return; const newTask={id:Date.now().toString(),name:newTaskNameMgr.value.trim(),category:taskCategorySelectMgr.value||"General",type:taskTypeSelectMgr.value,shift:taskShiftSelectMgr.value,options:taskTypeSelectMgr.value==='dropdown'&&dropdownOptionsMgr.value?dropdownOptionsMgr.value.split(',').map(o=>o.trim()):null}; await saveGlobalTasks([...globalTasks,newTask]); newTaskNameMgr.value=""; }
    async function loadAttendance(){ const id=`attendance_${currentDate}_${currentShift}`.replace(/\s/g,'_'); const doc=await db.collection("attendanceRecords").doc(id).get(); attendanceRecords=doc.exists?doc.data().records||[]:[]; renderAttendanceForm(); renderStaffAttendanceView(); }
    function renderAttendanceForm(){ if(!attendanceContainer) return; attendanceContainer.innerHTML=`<div class="info-text">Attendance management active</div><div id="attendanceRecordsList"></div>`; }
    function renderStaffAttendanceView(){ staffAttendanceView.innerHTML = attendanceRecords.filter(r=>r.shift===currentShift).map(r=>`<div>${r.staffName}: ${r.status}</div>`).join('')||'<div class="empty-msg">No records</div>'; }
    async function loadBreakRequests(){ if(!breakRequestsList) return; breakRequestsList.innerHTML='<div class="empty-msg">No pending requests</div>'; }
    function renderFullAllocation(){ fullAllocationContainer.innerHTML='<div class="info-text">Allocation view (simplified)</div>'; }
    async function refreshAll(){ await loadTaskRecord(); await loadAttendance(); await loadHandoverLog(); renderTasks(); }
    function onDateShiftChange(){ currentDate=mainDate.value; currentShift=mainShift.value; if(currentRole==="supervisor") refreshAll(); else { renderFullAllocation(); renderHandoverUI(); renderTasks(); renderStaffAttendanceView(); } }
    function setRole(role){ if(role==="supervisor"&&!isSupervisor){ passwordModal.classList.remove('hidden'); return; } currentRole=role; staffRoleBtn.classList.toggle("active",role==="staff"); supervisorRoleBtn.classList.toggle("active",role==="supervisor"); mainDate.disabled=role!=="supervisor"; mainShift.disabled=role!=="supervisor"; supervisorTabs.classList.toggle("hidden",role!=="supervisor"); staffViewSection.style.display=role==="staff"?"block":"none"; if(role==="supervisor") refreshAll(); else { renderFullAllocation(); renderHandoverUI(); renderTasks(); renderStaffAttendanceView(); } }
    function verifyPassword(){ const pwd = document.getElementById('supervisorPassword').value; if(pwd === "Admin123" || (typeof SUPERVISOR_PASSWORD !== 'undefined' && pwd === SUPERVISOR_PASSWORD)){ isSupervisor=true; passwordModal.classList.add('hidden'); setRole("supervisor"); } else passwordError.innerText="Wrong password"; }
    async function init(){ const savedDate=localStorage.getItem('selectedDate'), savedShift=localStorage.getItem('selectedShift'); currentDate=savedDate||new Date().toISOString().slice(0,10); currentShift=savedShift||""; if(mainDate) mainDate.value=currentDate; if(mainShift) mainShift.value=currentShift; if(firestoreReady){ await loadGlobalTasks(); await loadStaff(); await loadTaskRecord(); await loadAttendance(); await loadHandoverLog(); } mainDate.addEventListener('change',onDateShiftChange); mainShift.addEventListener('change',onDateShiftChange); staffRoleBtn.addEventListener('click',()=>setRole("staff")); supervisorRoleBtn.addEventListener('click',()=>setRole("supervisor")); addTaskBtnMgr.addEventListener('click',addTaskMgr); addStaffBtnMgr.addEventListener('click',async()=>{ if(newStaffNameMgr.value.trim()){ await db.collection("staff").add({name:newStaffNameMgr.value.trim()}); await loadStaff(); newStaffNameMgr.value=""; } }); closeShiftBtn.addEventListener('click',closeShift); reopenShiftBtn.addEventListener('click',reopenShiftFn); verifyPasswordBtn.addEventListener('click',verifyPassword); cancelPasswordBtn.addEventListener('click',()=>passwordModal.classList.add('hidden')); exportFullPdfBtn.addEventListener('click',()=>alert("Report excludes handover log")); printAllocationBtn.addEventListener('click',()=>alert("Allocation print")); saveHandoverBtn.addEventListener('click',saveHandoverLog); setRole("staff"); }
    const deviceModal=document.getElementById('deviceAuthModal'), devicePasswordInput=document.getElementById('devicePasswordInput'), authorizeDeviceBtn=document.getElementById('authorizeDeviceBtn'), deviceAuthError=document.getElementById('deviceAuthError'), appContainer=document.getElementById('appContainer');
    function handleDeviceAuth(){ if(authorizeDevice(devicePasswordInput.value)){ deviceModal.style.display='none'; appContainer.style.display='block'; init(); } else { deviceAuthError.textContent='Invalid password'; devicePasswordInput.value=''; } }
    if(isDeviceAuthorized()){ deviceModal.style.display='none'; appContainer.style.display='block'; init(); } else { deviceModal.style.display='flex'; appContainer.style.display='none'; authorizeDeviceBtn.addEventListener('click',handleDeviceAuth); devicePasswordInput.focus(); }
</script>
