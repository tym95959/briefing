<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Shower Manager | Local-First + Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Inter', 'Roboto', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #e2e9f2 0%, #d1dfee 100%);
      min-height: 100vh;
      padding: 1.2rem 1rem;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #1e3c4c, #0f2b3a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .header p {
      color: #2c4f6e;
      font-weight: 500;
      font-size: 0.8rem;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(30, 60, 76, 0.1);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.green { background-color: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .status-dot.red { background-color: #ef4444; box-shadow: 0 0 4px #ef4444; }
    .status-dot.yellow { background-color: #eab308; box-shadow: 0 0 4px #eab308; }

    .tabs {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 1rem 0 1.2rem;
    }
    .tab-btn {
      background: rgba(255,255,255,0.7);
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    .tab-btn.active {
      background: #2c7da0;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }

    .rooms-board {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
    }

    .section {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1rem 1.2rem 1.5rem;
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
      flex: 1;
      min-width: 300px;
    }

    .male-section { background: linear-gradient(135deg, rgba(43, 110, 158, 0.15), rgba(255, 255, 255, 0.85)); border-left: 5px solid #2b6e9e; }
    .male-section h2 { color: #2b6e9e; border-bottom: 3px solid #2b6e9e; text-align: center; font-size: 1.4rem; margin-bottom: 1rem; }
    .female-section { background: linear-gradient(135deg, rgba(181, 71, 110, 0.15), rgba(255, 255, 255, 0.85)); border-left: 5px solid #b5476e; }
    .female-section h2 { color: #b5476e; border-bottom: 3px solid #b5476e; text-align: center; font-size: 1.4rem; margin-bottom: 1rem; }

    .room-cards {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .room-card {
      border-radius: 1.2rem;
      padding: 0.8rem 0.6rem;
      width: 260px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .room-card:hover { transform: translateY(-4px); box-shadow: 0 14px 22px -8px rgba(0, 0, 0, 0.2); }
    .room-occupied { background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); border-left: 6px solid #dc2626; }
    .room-vacant-dirty { background: linear-gradient(135deg, #fef9c3 0%, #fde047 100%); border-left: 6px solid #ca8a04; }
    .room-cleaning-progress { background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%); border-left: 6px solid #4f46e5; }
    .room-vacant-clean { background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%); border-left: 6px solid #059669; }

    .room-name { font-weight: 800; font-size: 1.1rem; background: rgba(255,255,255,0.6); display: inline-block; padding: 0.1rem 0.8rem; border-radius: 30px; margin-bottom: 0.5rem; }
    .status-badge { margin: 0.2rem 0; font-size: 0.7rem; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 40px; display: inline-block; }
    .clean-badge { background: #065f46; color: white; }
    .dirty-badge { background: #854d0e; color: white; }
    .cleaning-badge { background: #4338ca; color: white; }
    .occupied-badge { background: #991b1b; color: white; }
    .vacant-badge { background: #065a60; color: white; }

    .timer-box { background: rgba(255,255,255,0.8); border-radius: 1rem; padding: 0.3rem; margin: 0.4rem 0; font-size: 0.7rem; font-weight: 600; }
    .timer-passenger { color: #991b1b; border-left: 3px solid #dc2626; background: rgba(254,226,226,0.9); }
    .timer-cleaning { color: #3730a3; border-left: 3px solid #4f46e5; background: rgba(224,231,255,0.9); }
    .return-btn, .complete-clean-btn { margin-top: 0.4rem; background: rgba(255,255,255,0.9); border: none; padding: 0.25rem 0.5rem; border-radius: 30px; font-size: 0.65rem; font-weight: 600; cursor: pointer; width: 90%; }
    .return-btn:hover { background: #fee2e2; }
    .complete-clean-btn:hover { background: #c7d2fe; }

    /* History Panel */
    .history-panel {
      background: white;
      border-radius: 1.5rem;
      padding: 1.2rem;
      margin-top: 0.5rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .history-card {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1rem;
      border-left: 5px solid #2c7da0;
    }
    .history-card h4 { margin-bottom: 0.5rem; color: #1e3c4c; }
    .history-detail { font-size: 0.85rem; color: #334155; margin-top: 0.3rem; display: flex; flex-wrap: wrap; gap: 0.8rem; }
    .badge-history { background: #e2e8f0; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; }

    .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; }
    .modal-card { background: white; border-radius: 1.5rem; width: 90%; max-width: 480px; padding: 1.5rem; animation: fadeSlide 0.2s ease; }
    @keyframes fadeSlide { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    .form-group { margin-bottom: 0.8rem; display: flex; flex-direction: column; }
    .form-group label { font-weight: 600; font-size: 0.8rem; margin-bottom: 0.2rem; }
    .form-group input, .form-group select { padding: 0.6rem; border-radius: 1rem; border: 1px solid #cbd5e6; }
    .modal-buttons { display: flex; gap: 0.8rem; margin-top: 1rem; }
    .btn { padding: 0.5rem 1rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; flex:1; }
    .btn-primary { background: #2c7da0; color: white; }
    .btn-secondary { background: #e2e8f0; color: #1f3a4b; }
    .btn-warning { background: #ea580c; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .info-panel { background: #f0f6fa; padding: 0.6rem; border-radius: 1rem; margin-bottom: 0.8rem; font-size: 0.8rem; }

    footer { text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: #2b5c7a; }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>🚿 Shower Manager</h1>
    <p>⚡ Local-first | Auto-sync to Firebase</p>
    <div class="sync-status"><span class="status-dot" id="statusDot"></span><span id="syncText">Synced</span></div>
  </div>
  
  <div class="tabs">
    <button class="tab-btn active" data-tab="rooms">🚪 Rooms & Keys</button>
    <button class="tab-btn" data-tab="history">📜 Last Transaction</button>
  </div>

  <div id="roomsTab" class="tab-content active">
    <div class="rooms-board">
      <div class="section male-section"><h2>🚹 Male Shower</h2><div class="room-cards" id="maleRoomsContainer"></div></div>
      <div class="section female-section"><h2>🚺 Female Shower</h2><div class="room-cards" id="femaleRoomsContainer"></div></div>
    </div>
  </div>

  <div id="historyTab" class="tab-content">
    <div class="history-panel" id="historyContainer">
      <p style="text-align:center; color:#5f7d9c;">Loading latest transaction...</p>
    </div>
  </div>
  <footer>🟢 Clean Vacant | 🟡 Dirty Vacant | 🔵 Cleaning | 🔴 Occupied · Tap card → action</footer>
</div>

<!-- MODALS -->
<div id="issueModal" class="modal"><div class="modal-card"><h3>🔑 Issue Key</h3><div id="issueRoomInfo" class="info-panel"></div>
<form id="issueForm"><div class="form-group"><label>🧑 Passenger Name *</label><input type="text" id="passengerName" required></div>
<div class="form-group"><label>✈️ Flight Number</label><input type="text" id="flightNumber"></div>
<div class="form-group"><label>👤 Issuer (Officer) *</label><select id="issuerSelect" required></select></div>
<div class="form-group"><label>🔐 Password *</label><input type="password" id="issuerPassword" required></div>
<div class="modal-buttons"><button type="submit" class="btn btn-primary">✅ Issue Key</button><button type="button" class="btn btn-secondary" id="closeIssueModal">Cancel</button></div></form></div></div>

<div id="allocateModal" class="modal"><div class="modal-card"><h3>🧹 Assign Housekeeper</h3><div id="allocateRoomInfo" class="info-panel"></div>
<form id="allocateForm"><div class="form-group"><label>🧼 Housekeeper *</label><select id="hkSelect" required></select></div>
<div class="form-group"><label>🔐 Your Password *</label><input type="password" id="allocatorPassword" required></div>
<div class="modal-buttons"><button type="submit" class="btn btn-warning">⏱️ Start Cleaning</button><button type="button" class="btn btn-secondary" id="closeAllocateModal">Cancel</button></div></form></div></div>

<div id="returnModal" class="modal"><div class="modal-card"><h3>🔁 Return Key</h3><div id="returnRoomInfo" class="info-panel"></div><div id="issuedDetailsDisplay" class="info-panel"></div>
<form id="returnForm"><div class="form-group"><label>📋 Receiver (Officer) *</label><select id="receiverSelect" required></select></div>
<div class="form-group"><label>🔐 Password *</label><input type="password" id="receiverPassword" required></div>
<div class="modal-buttons"><button type="submit" class="btn btn-danger">Confirm Return</button><button type="button" class="btn btn-secondary" id="closeReturnModal">Cancel</button></div></form></div></div>

<div id="completeCleanModal" class="modal"><div class="modal-card"><h3>✅ Complete Cleaning</h3><div id="completeRoomInfo" class="info-panel"></div>
<form id="completeCleanForm"><div class="form-group"><label>🔐 Password *</label><input type="password" id="cleanPassword" required></div>
<div class="modal-buttons"><button type="submit" class="btn btn-primary">Confirm Complete</button><button type="button" class="btn btn-secondary" id="closeCompleteModal">Cancel</button></div></form></div></div>

<script type="module">
  // ======================== STAFF DATA (Embedded for demo) ========================
  const staffList = [
    { id: "off1", name: "Captain Smith", role: "officer", pass: "capt123", contact: "+1 555 1010" },
    { id: "off2", name: "Lt. Davis", role: "officer", pass: "lt456", contact: "+1 555 1011" },
    { id: "hk1", name: "Maria G.", role: "housekeeping", pass: "hkpass1", contact: "+1 555 2020" },
    { id: "hk2", name: "John K.", role: "housekeeping", pass: "hkpass2", contact: "+1 555 2021" }
  ];
  function getOfficers() { return staffList.filter(s => s.role === 'officer'); }
  function getHousekeepingStaff() { return staffList.filter(s => s.role === 'housekeeping'); }
  function getStaffById(id) { return staffList.find(s => s.id === id); }
  function verifyStaffPassword(password, staffId = null) {
    if (staffId) { const s = getStaffById(staffId); return s && s.pass === password; }
    return staffList.some(s => s.pass === password);
  }

  // ======================== ROOMS DATA (Initial) ========================
  const roomsData = [
    { id: "M1", name: "Shower 1", gender: "male", cleanStatus: "clean", occupiedStatus: "vacant", currentPassenger: null, flightNumber: null, currentIssuerId: null, currentIssuerName: null, issueTimestamp: null, housekeeperId: null, housekeeperName: null, housekeeperContact: null, allocationTimestamp: null },
    { id: "M2", name: "Shower 2", gender: "male", cleanStatus: "dirty", occupiedStatus: "vacant", currentPassenger: null, flightNumber: null, currentIssuerId: null, currentIssuerName: null, issueTimestamp: null, housekeeperId: null, housekeeperName: null, housekeeperContact: null, allocationTimestamp: null },
    { id: "F1", name: "Shower 1", gender: "female", cleanStatus: "clean", occupiedStatus: "vacant", currentPassenger: null, flightNumber: null, currentIssuerId: null, currentIssuerName: null, issueTimestamp: null, housekeeperId: null, housekeeperName: null, housekeeperContact: null, allocationTimestamp: null },
    { id: "F2", name: "Shower 2", gender: "female", cleanStatus: "dirty", occupiedStatus: "vacant", currentPassenger: null, flightNumber: null, currentIssuerId: null, currentIssuerName: null, issueTimestamp: null, housekeeperId: null, housekeeperName: null, housekeeperContact: null, allocationTimestamp: null }
  ];

  // Transaction history (only latest per type: key_issue, key_return, cleaning_start, cleaning_complete)
  let transactionHistory = {
    lastKeyIssue: null,      // { passenger, flight, issuerName, roomName, timestamp }
    lastKeyReturn: null,     // { receiverName, passenger, roomName, timestamp }
    lastCleaningStart: null, // { hkName, roomName, allocatorName, timestamp }
    lastCleaningComplete: null // { supervisorName, roomName, timestamp }
  };

  let timerInterval = null, currentDate = new Date().toDateString();
  let pendingCleanRoomId = null, syncQueue = false;

  // Helper functions
  function getCurrentISO() { return new Date().toISOString(); }
  function formatTimeSince(timestampISO) {
    if (!timestampISO) return null;
    const diffMs = Date.now() - new Date(timestampISO).getTime();
    if (diffMs < 0) return { minutes: 0, seconds: 0 };
    return { minutes: Math.floor(diffMs / 60000), seconds: Math.floor((diffMs % 60000) / 1000) };
  }
  function formatTimeAgoString(timestampISO) { return timestampISO ? new Date(timestampISO).toLocaleTimeString() : ""; }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  // ---------- LOCALSTORAGE ----------
  const STORAGE_KEY = 'shower_manager_data_v2';
  function saveToLocalStorage() {
    const data = {
      rooms: roomsData,
      transactionHistory: transactionHistory,
      lastUpdated: getCurrentISO()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadFromLocalStorage() {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    try {
      const data = JSON.parse(raw);
      if (data.rooms && Array.isArray(data.rooms) && data.rooms.length === 4) {
        for (let i = 0; i < data.rooms.length; i++) {
          Object.assign(roomsData[i], data.rooms[i]);
        }
      }
      if (data.transactionHistory) transactionHistory = data.transactionHistory;
      return true;
    } catch(e) { return false; }
  }

  // ---------- FIREBASE (background sync) ----------
  import { db } from './firebase-config.js';
  import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  let firestoreEnabled = true;
  function updateConnectionStatus(connected) {
    const dot = document.getElementById("statusDot");
    const textSpan = document.getElementById("syncText");
    if (connected) { dot.className = "status-dot green"; textSpan.innerText = "Live Sync"; }
    else { dot.className = "status-dot red"; textSpan.innerText = "Offline (local)"; }
  }

  async function syncToFirebase() {
    if (!firestoreEnabled) return;
    const today = new Date().toISOString().split('T')[0];
    const docRef = doc(db, 'showerRooms', today);
    const historyRef = doc(db, 'showerHistory', 'latest');
    try {
      await setDoc(docRef, { rooms: roomsData, lastUpdated: getCurrentISO() }, { merge: true });
      await setDoc(historyRef, { transactionHistory, updatedAt: getCurrentISO() }, { merge: true });
      updateConnectionStatus(true);
    } catch (error) {
      console.warn("Firebase sync error (background):", error);
      updateConnectionStatus(false);
      firestoreEnabled = false;
      setTimeout(() => { firestoreEnabled = true; syncToFirebase(); }, 15000);
    }
  }

  async function loadFromFirebaseBackground() {
    const today = new Date().toISOString().split('T')[0];
    const docRef = doc(db, 'showerRooms', today);
    const historyRef = doc(db, 'showerHistory', 'latest');
    try {
      const [roomSnap, histSnap] = await Promise.all([getDoc(docRef), getDoc(historyRef)]);
      if (roomSnap.exists()) {
        const fbRooms = roomSnap.data().rooms;
        if (fbRooms && fbRooms.length === 4) {
          for (let i=0; i<4; i++) Object.assign(roomsData[i], fbRooms[i]);
        }
      }
      if (histSnap.exists() && histSnap.data().transactionHistory) {
        transactionHistory = histSnap.data().transactionHistory;
      }
      saveToLocalStorage(); // persist after load
      renderRooms();
      renderHistory();
      updateConnectionStatus(true);
    } catch(e) { console.warn("Firebase initial load failed, using local", e); updateConnectionStatus(false); }
  }

  // Save both localStorage + background firebase (non-blocking)
  function persistState() {
    saveToLocalStorage();
    syncToFirebase().catch(e => console.warn("bg sync error", e));
  }

  // Update transaction helpers
  function setLastKeyIssue(passenger, flight, issuerName, roomName) {
    transactionHistory.lastKeyIssue = { passenger, flight: flight || '', issuerName, roomName, timestamp: getCurrentISO() };
    persistState(); renderHistory();
  }
  function setLastKeyReturn(receiverName, passenger, roomName) {
    transactionHistory.lastKeyReturn = { receiverName, passenger, roomName, timestamp: getCurrentISO() };
    persistState(); renderHistory();
  }
  function setLastCleaningStart(hkName, roomName, allocatorName) {
    transactionHistory.lastCleaningStart = { hkName, roomName, allocatorName, timestamp: getCurrentISO() };
    persistState(); renderHistory();
  }
  function setLastCleaningComplete(supervisorName, roomName) {
    transactionHistory.lastCleaningComplete = { supervisorName, roomName, timestamp: getCurrentISO() };
    persistState(); renderHistory();
  }

  // Render history tab
  function renderHistory() {
    const container = document.getElementById("historyContainer");
    if (!container) return;
    let html = '<div style="display:flex; flex-direction:column; gap:1rem;">';
    
    if (transactionHistory.lastKeyIssue) {
      const h = transactionHistory.lastKeyIssue;
      html += `<div class="history-card"><h4>🔑 Last Key Issued</h4><div class="history-detail">🧑 ${escapeHtml(h.passenger)} ✈️ ${escapeHtml(h.flight) || '—'} | 👔 ${escapeHtml(h.issuerName)} | 🚪 ${escapeHtml(h.roomName)}</div><div class="badge-history">🕒 ${new Date(h.timestamp).toLocaleString()}</div></div>`;
    }
    if (transactionHistory.lastKeyReturn) {
      const h = transactionHistory.lastKeyReturn;
      html += `<div class="history-card"><h4>🔁 Last Key Return</h4><div class="history-detail">📋 ${escapeHtml(h.receiverName)} received from 🧑 ${escapeHtml(h.passenger)} | 🚪 ${escapeHtml(h.roomName)}</div><div class="badge-history">🕒 ${new Date(h.timestamp).toLocaleString()}</div></div>`;
    }
    if (transactionHistory.lastCleaningStart) {
      const h = transactionHistory.lastCleaningStart;
      html += `<div class="history-card"><h4>🧹 Last Cleaning Started</h4><div class="history-detail">HK ${escapeHtml(h.hkName)} assigned by ${escapeHtml(h.allocatorName)} | 🚪 ${escapeHtml(h.roomName)}</div><div class="badge-history">🕒 ${new Date(h.timestamp).toLocaleString()}</div></div>`;
    }
    if (transactionHistory.lastCleaningComplete) {
      const h = transactionHistory.lastCleaningComplete;
      html += `<div class="history-card"><h4>✅ Last Cleaning Completed</h4><div class="history-detail">Supervisor ${escapeHtml(h.supervisorName)} | 🚪 ${escapeHtml(h.roomName)} now CLEAN</div><div class="badge-history">🕒 ${new Date(h.timestamp).toLocaleString()}</div></div>`;
    }
    if (!transactionHistory.lastKeyIssue && !transactionHistory.lastKeyReturn && !transactionHistory.lastCleaningStart && !transactionHistory.lastCleaningComplete) {
      html += '<p style="text-align:center;">No transactions recorded yet.</p>';
    }
    html += '</div>';
    container.innerHTML = html;
  }

  // Render rooms (UI identical to original but with timer updates)
  function getRoomCardClass(room) {
    if (room.occupiedStatus === "occupied") return "room-occupied";
    if (room.occupiedStatus === "vacant" && room.cleanStatus === "dirty" && !room.allocationTimestamp) return "room-vacant-dirty";
    if (room.occupiedStatus === "vacant" && room.cleanStatus === "dirty" && room.allocationTimestamp) return "room-cleaning-progress";
    return "room-vacant-clean";
  }
  function getStatusText(room) {
    if (room.occupiedStatus === "occupied") return "🔴 OCCUPIED";
    if (room.occupiedStatus === "vacant" && room.cleanStatus === "dirty" && room.allocationTimestamp) return "🔵 CLEANING IN PROGRESS";
    if (room.occupiedStatus === "vacant" && room.cleanStatus === "dirty") return "🟡 DIRTY · VACANT";
    return "🟢 CLEAN · VACANT";
  }
  function renderTimerDisplay(room) {
    let passengerTimerHtml = '', cleaningTimerHtml = '', completeCleanBtn = '';
    if (room.occupiedStatus === 'occupied' && room.issueTimestamp) {
      const td = formatTimeSince(room.issueTimestamp);
      if (td) passengerTimerHtml = `<div class="timer-box timer-passenger">🧑 Occupied: <span id="timer-pass-${room.id}">${td.minutes}m ${td.seconds}s</span></div>`;
    }
    if (room.cleanStatus === 'dirty' && room.occupiedStatus === 'vacant' && room.allocationTimestamp && room.housekeeperName) {
      const td = formatTimeSince(room.allocationTimestamp);
      if (td) cleaningTimerHtml = `<div class="timer-box timer-cleaning">🧹 Cleaning: <span id="timer-clean-${room.id}">${td.minutes}m ${td.seconds}s</span><br><span style="font-size:0.6rem;">HK: ${escapeHtml(room.housekeeperName)}</span></div>`;
      completeCleanBtn = `<button class="complete-clean-btn" data-room-id="${room.id}">✅ Complete Cleaning</button>`;
    }
    return { passengerTimerHtml, cleaningTimerHtml, completeCleanBtn };
  }
  function updateLiveTimers() {
    roomsData.forEach(room => {
      if (room.occupiedStatus === 'occupied' && room.issueTimestamp) {
        const span = document.getElementById(`timer-pass-${room.id}`);
        if (span) { const td = formatTimeSince(room.issueTimestamp); if (td) span.innerText = `${td.minutes}m ${td.seconds}s`; }
      }
      if (room.cleanStatus === 'dirty' && room.occupiedStatus === 'vacant' && room.allocationTimestamp) {
        const span = document.getElementById(`timer-clean-${room.id}`);
        if (span) { const td = formatTimeSince(room.allocationTimestamp); if (td) span.innerText = `${td.minutes}m ${td.seconds}s`; }
      }
    });
  }

  function renderRooms() {
    const maleContainer = document.getElementById("maleRoomsContainer");
    const femaleContainer = document.getElementById("femaleRoomsContainer");
    if (!maleContainer) return;
    maleContainer.innerHTML = ""; femaleContainer.innerHTML = "";
    roomsData.forEach(room => {
      const card = document.createElement("div");
      card.className = `room-card ${getRoomCardClass(room)}`;
      const timers = renderTimerDisplay(room);
      let passengerInfo = "";
      if (room.occupiedStatus === "occupied" && room.currentPassenger) {
        passengerInfo = `<div style="font-size:0.65rem; margin-top:4px;">👤 ${escapeHtml(room.currentPassenger)} ${room.flightNumber ? `✈️ ${escapeHtml(room.flightNumber)}` : ''}<br>👔 ${escapeHtml(room.currentIssuerName || '')}</div>`;
      }
      card.innerHTML = `
        <div class="room-name">${room.name}</div>
        <div style="font-size:0.7rem; font-weight:600;">${getStatusText(room)}</div>
        <div><span class="status-badge ${room.cleanStatus === 'clean' ? 'clean-badge' : (room.allocationTimestamp ? 'cleaning-badge' : 'dirty-badge')}">${room.cleanStatus === 'clean' ? 'Clean' : (room.allocationTimestamp ? 'Cleaning' : 'Dirty')}</span>
        <span class="status-badge ${room.occupiedStatus === 'occupied' ? 'occupied-badge' : 'vacant-badge'}">${room.occupiedStatus === 'occupied' ? 'Occupied' : 'Vacant'}</span></div>
        ${timers.passengerTimerHtml}
        ${timers.cleaningTimerHtml}
        ${passengerInfo}
        ${room.occupiedStatus === "occupied" ? `<button class="return-btn" data-room-id="${room.id}">🔁 Return Key</button>` : ''}
        ${timers.completeCleanBtn}
      `;
      card.addEventListener("click", (e) => {
        if (e.target.classList?.contains("return-btn") || e.target.classList?.contains("complete-clean-btn")) return;
        handleRoomClick(room.id);
      });
      const retBtn = card.querySelector(".return-btn");
      if (retBtn) retBtn.addEventListener("click", (e) => { e.stopPropagation(); handleReturnClick(room.id); });
      const compBtn = card.querySelector(".complete-clean-btn");
      if (compBtn) compBtn.addEventListener("click", (e) => { e.stopPropagation(); handleCompleteCleaningClick(room.id); });
      (room.gender === "male" ? maleContainer : femaleContainer).appendChild(card);
    });
  }

  // Handlers (core logic with history update)
  let currentIssueRoom, currentAllocateRoom, currentReturnRoom;
  function handleRoomClick(roomId) {
    const room = roomsData.find(r => r.id === roomId);
    if (!room) return;
    if (room.occupiedStatus === "occupied") { alert(`🔴 ${room.name} is OCCUPIED. Use Return Key.`); return; }
    if (room.occupiedStatus === "vacant") {
      if (room.cleanStatus === "clean") openIssueModal(room);
      else if (room.cleanStatus === "dirty") {
        if (room.allocationTimestamp) alert(`🧹 Cleaning in progress by ${room.housekeeperName}.`);
        else openAllocateModal(room);
      }
    }
  }
  function handleReturnClick(roomId) { const room = roomsData.find(r => r.id === roomId); if (room?.occupiedStatus === "occupied") openReturnModal(room); else alert("Room not occupied"); }
  function handleCompleteCleaningClick(roomId) { const room = roomsData.find(r => r.id === roomId); if (room?.allocationTimestamp && room.cleanStatus === 'dirty') { pendingCleanRoomId = roomId; openCompleteCleanModal(room); } else alert("Not in cleaning progress"); }

  async function executeCompleteCleaning(password) {
    const room = roomsData.find(r => r.id === pendingCleanRoomId);
    if (!room) return false;
    if (!verifyStaffPassword(password)) { alert("❌ Invalid password."); return false; }
    const supervisor = staffList.find(s => s.pass === password);
    const supervisorName = supervisor ? supervisor.name : "Authorized Staff";
    room.cleanStatus = "clean";
    room.housekeeperId = null; room.housekeeperName = null; room.housekeeperContact = null; room.allocationTimestamp = null;
    setLastCleaningComplete(supervisorName, room.name);
    persistState(); renderRooms();
    return true;
  }

  async function onSubmitIssue(e) {
    e.preventDefault();
    if (!currentIssueRoom) return;
    const passenger = document.getElementById("passengerName").value.trim();
    const flight = document.getElementById("flightNumber").value.trim() || null;
    const issuerId = document.getElementById("issuerSelect").value;
    const password = document.getElementById("issuerPassword").value;
    if (!passenger || !issuerId || !password) { alert("All fields required"); return; }
    const issuer = getStaffById(issuerId);
    if (!issuer || !verifyStaffPassword(password, issuerId)) { alert("Invalid issuer password"); return; }
    const now = getCurrentISO();
    currentIssueRoom.occupiedStatus = "occupied";
    currentIssueRoom.currentPassenger = passenger;
    currentIssueRoom.flightNumber = flight;
    currentIssueRoom.currentIssuerId = issuer.id;
    currentIssueRoom.currentIssuerName = issuer.name;
    currentIssueRoom.issueTimestamp = now;
    currentIssueRoom.housekeeperId = null; currentIssueRoom.allocationTimestamp = null;
    setLastKeyIssue(passenger, flight, issuer.name, currentIssueRoom.name);
    persistState(); renderRooms(); closeIssueModal();
  }

  async function onSubmitAllocate(e) {
    e.preventDefault();
    if (!currentAllocateRoom) return;
    const hkId = document.getElementById("hkSelect").value;
    const password = document.getElementById("allocatorPassword").value;
    if (!hkId || !password || !verifyStaffPassword(password)) { alert("Invalid password or HK missing"); return; }
    const hk = getStaffById(hkId);
    if (!hk) return;
    const allocator = staffList.find(s => s.pass === password);
    const allocName = allocator ? allocator.name : "Authorized";
    currentAllocateRoom.housekeeperId = hk.id;
    currentAllocateRoom.housekeeperName = hk.name;
    currentAllocateRoom.housekeeperContact = hk.contact || '';
    currentAllocateRoom.allocationTimestamp = getCurrentISO();
    setLastCleaningStart(hk.name, currentAllocateRoom.name, allocName);
    persistState(); renderRooms(); closeAllocateModal();
  }

  async function onSubmitReturn(e) {
    e.preventDefault();
    if (!currentReturnRoom) return;
    const receiverId = document.getElementById("receiverSelect").value;
    const password = document.getElementById("receiverPassword").value;
    if (!receiverId || !password) return;
    const receiver = getStaffById(receiverId);
    if (!receiver || !verifyStaffPassword(password, receiverId)) { alert("Invalid officer password"); return; }
    const passengerName = currentReturnRoom.currentPassenger || "Unknown";
    setLastKeyReturn(receiver.name, passengerName, currentReturnRoom.name);
    currentReturnRoom.occupiedStatus = "vacant";
    currentReturnRoom.cleanStatus = "dirty";
    currentReturnRoom.currentPassenger = null; currentReturnRoom.flightNumber = null;
    currentReturnRoom.currentIssuerId = null; currentReturnRoom.currentIssuerName = null;
    currentReturnRoom.issueTimestamp = null;
    currentReturnRoom.housekeeperId = null; currentReturnRoom.allocationTimestamp = null;
    persistState(); renderRooms(); closeReturnModal();
  }

  // Modal open & close helpers
  function openIssueModal(room) { currentIssueRoom = room; const officers = getOfficers(); document.getElementById("issuerSelect").innerHTML = officers.map(o => `<option value="${o.id}">${escapeHtml(o.name)}</option>`).join(''); document.getElementById("issueRoomInfo").innerHTML = `<strong>${room.name}</strong> · Issue key`; document.getElementById("issueModal").style.display = "flex"; }
  function openAllocateModal(room) { currentAllocateRoom = room; const hks = getHousekeepingStaff(); document.getElementById("hkSelect").innerHTML = hks.map(h => `<option value="${h.id}">${escapeHtml(h.name)} 📞 ${h.contact}</option>`).join(''); document.getElementById("allocateRoomInfo").innerHTML = `<strong>${room.name}</strong> · Assign cleaning`; document.getElementById("allocateModal").style.display = "flex"; }
  function openReturnModal(room) { currentReturnRoom = room; const officers = getOfficers(); document.getElementById("receiverSelect").innerHTML = officers.map(o => `<option value="${o.id}">${escapeHtml(o.name)}</option>`).join(''); document.getElementById("returnRoomInfo").innerHTML = `<strong>${room.name}</strong> · Return key`; document.getElementById("issuedDetailsDisplay").innerHTML = `🧑 Passenger: ${escapeHtml(room.currentPassenger)} ${room.flightNumber ? `✈️ ${room.flightNumber}` : ''}<br>Issued by: ${escapeHtml(room.currentIssuerName)}`; document.getElementById("returnModal").style.display = "flex"; }
  function openCompleteCleanModal(room) { document.getElementById("completeRoomInfo").innerHTML = `<strong>${room.name}</strong> cleaning by ${escapeHtml(room.housekeeperName)}`; document.getElementById("completeCleanModal").style.display = "flex"; }
  function closeIssueModal() { document.getElementById("issueModal").style.display = "none"; currentIssueRoom=null; }
  function closeAllocateModal() { document.getElementById("allocateModal").style.display = "none"; currentAllocateRoom=null; }
  function closeReturnModal() { document.getElementById("returnModal").style.display = "none"; currentReturnRoom=null; }
  function closeCompleteModal() { document.getElementById("completeCleanModal").style.display = "none"; pendingCleanRoomId=null; }

  function bindEvents() {
    document.getElementById("closeIssueModal")?.addEventListener("click", closeIssueModal);
    document.getElementById("closeAllocateModal")?.addEventListener("click", closeAllocateModal);
    document.getElementById("closeReturnModal")?.addEventListener("click", closeReturnModal);
    document.getElementById("closeCompleteModal")?.addEventListener("click", closeCompleteModal);
    document.getElementById("issueForm")?.addEventListener("submit", onSubmitIssue);
    document.getElementById("allocateForm")?.addEventListener("submit", onSubmitAllocate);
    document.getElementById("returnForm")?.addEventListener("submit", onSubmitReturn);
    document.getElementById("completeCleanForm")?.addEventListener("submit", async (e) => { e.preventDefault(); const pwd = document.getElementById("cleanPassword").value; if (await executeCompleteCleaning(pwd)) closeCompleteModal(); });
    document.querySelectorAll(".tab-btn").forEach(btn => { btn.addEventListener("click", () => { document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); document.getElementById("roomsTab").classList.toggle("active", btn.dataset.tab === "rooms"); document.getElementById("historyTab").classList.toggle("active", btn.dataset.tab === "history"); if(btn.dataset.tab === "history") renderHistory(); }); });
    window.addEventListener("click", (e) => { if(e.target.classList.contains("modal")) closeIssueModal(); if(e.target===document.getElementById("allocateModal")) closeAllocateModal(); if(e.target===document.getElementById("returnModal")) closeReturnModal(); if(e.target===document.getElementById("completeCleanModal")) closeCompleteModal(); });
  }

  function startTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { updateLiveTimers(); }, 1000); }

  async function init() {
    loadFromLocalStorage();
    await loadFromFirebaseBackground(); // non-blocking
    bindEvents();
    startTimer();
    renderRooms();
    renderHistory();
    setInterval(() => { checkDateReset(); }, 60000);
  }
  function checkDateReset() { const today = new Date().toDateString(); if(today !== currentDate) { roomsData.forEach(r => { if(r.occupiedStatus !== "occupied") { r.cleanStatus = "clean"; r.occupiedStatus = "vacant"; r.currentPassenger=null; r.flightNumber=null; r.issueTimestamp=null; r.allocationTimestamp=null; r.housekeeperId=null; } }); roomsData[1].cleanStatus = "dirty"; roomsData[3].cleanStatus = "dirty"; currentDate = today; persistState(); renderRooms(); } }
  init();
</script>
</body>
</html>
